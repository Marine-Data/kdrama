<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 드라마 일지 — Mon carnet de k-dramas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>

  :root {
    --ink: #2b3a55;
    --ink-soft: #5b6c8a;
    --ink-faint: #93a6c2;
    --paper: #dceaf8;
    --paper-raised: #ffffff;
    --paper-sunken: #eaf2fb;
    --line: #aecbe8;
    --seal: #e07a96;
    --seal-soft: #fbdde6;
    --celadon: #6fb8b0;
    --celadon-soft: #e0f3f0;
    --gold: #e3b94f;
    --gold-soft: #fbf0d6;
    --blue-deep: #3f5f96;
    --pink-deep: #d96585;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 0 0 90px; position: relative; min-height: 100vh; }

  /* ---------- Header ---------- */
  .app-header {
    padding: 26px 18px 14px; text-align: center; border-bottom: 1px solid var(--line);
    background: radial-gradient(circle at 50% 0%, var(--seal-soft) 0%, transparent 60%), var(--paper);
    position: sticky; top: 0; z-index: 30;
  }
  .app-seal { width: 48px; height: 48px; margin: 0 auto 8px; color: var(--seal); }
  .app-seal svg circle { fill: none; stroke: currentColor; }
  .app-eyebrow { font-family: 'Noto Sans KR', sans-serif; font-weight: 700; font-size: 18px; color: var(--pink-deep); margin: 0 0 4px; letter-spacing: 0.03em; }
  .app-header h1 { font-family: 'Press Start 2P', cursive; font-size: 15px; font-weight: 400; margin: 0; line-height: 1.6; color: var(--blue-deep); }

  .tabbar { display: flex; gap: 6px; padding: 14px 16px 0; }
  .tab-btn {
    flex: 1; border: 1px solid var(--line); background: var(--paper-raised); border-radius: 11px;
    padding: 10px; font-size: 13.5px; font-weight: 600; color: var(--ink-soft); cursor: pointer; font-family: inherit;
  }
  .tab-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .hero-stats { display: flex; justify-content: center; gap: 22px; padding: 14px 16px 4px; flex-wrap: wrap; }
  .hero-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .hero-stat .num { font-family: 'Press Start 2P', cursive; font-size: 15px; font-weight: 400; color: var(--blue-deep); }
  .hero-stat .lbl { font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.04em; }

  /* ---------- List controls ---------- */
  .kt-controls { display: flex; gap: 8px; padding: 14px 16px 0; flex-wrap: wrap; }
  .filters-panel { margin: 10px 16px 0; padding: 12px; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 12px; display: flex; flex-direction: column; gap: 8px; }
  .filter-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .filter-label { font-size: 12px; color: var(--ink-soft); font-weight: 500; flex-shrink: 0; }
  .filter-row select, .filter-row input { border: 1px solid var(--line); background: var(--paper-sunken); border-radius: 8px; padding: 6px 9px; font-size: 12.5px; color: var(--ink); font-family: inherit; flex: 1; max-width: 60%; }
  .kt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 14px 16px 8px; }
  .grid-cell { display: flex; flex-direction: column; gap: 4px; cursor: pointer; position: relative; }
  .grid-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; border: 1px solid var(--line); background: var(--paper-sunken); }
  .grid-poster-empty { display: flex; align-items: center; justify-content: center; color: var(--ink-faint); }
  .grid-poster-empty svg { width: 40%; height: 40%; }
  .grid-stamp { position: absolute; top: 4px; right: 4px; width: 26px; height: 26px; }
  .grid-stamp .stamp { width: 26px; height: 26px; background: var(--paper-raised); border-radius: 50%; }
  .grid-title { font-size: 11px; font-weight: 600; line-height: 1.25; margin: 0; }
  .search-box {
    flex: 1; display: flex; align-items: center; gap: 8px; background: var(--paper-raised);
    border: 1px solid var(--line); border-radius: 11px; padding: 10px 12px; color: var(--ink-soft);
  }
  .search-box input { border: none; background: transparent; outline: none; font-size: 14px; flex: 1; color: var(--ink); font-family: inherit; }
  .clear-q { border: none; background: none; color: var(--ink-soft); cursor: pointer; display: flex; padding: 2px; }
  .sort-box { position: relative; display: flex; align-items: center; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 11px; }
  .sort-box select { border: none; background: transparent; font-size: 13px; padding: 10px 26px 10px 12px; color: var(--ink); appearance: none; font-family: inherit; cursor: pointer; }
  .sort-chevron { position: absolute; right: 10px; pointer-events: none; color: var(--ink-faint); font-size: 11px; }

  .icon-btn {
    border: 1px solid var(--line); background: var(--paper-raised); border-radius: 50%;
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    color: var(--ink); cursor: pointer; flex-shrink: 0;
  }
  .add-btn { background: var(--ink); color: var(--paper); border-color: var(--ink); position: absolute; top: 16px; right: 16px; }

  .kt-list { padding: 14px 16px 8px; display: flex; flex-direction: column; gap: 10px; }
  .empty-state { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 40px 24px; color: var(--ink-faint); text-align: center; font-size: 13px; }

  .drama-card { background: var(--paper-raised); border: 1px solid var(--line); border-radius: 16px; padding: 12px; cursor: pointer; }
  .drama-card.is-open { border-color: var(--seal); }
  .card-row { display: flex; align-items: center; gap: 12px; }
  .poster-thumb { width: 56px; height: 80px; object-fit: cover; flex-shrink: 0; border: 2px solid var(--line); }
  .stamp { position: relative; width: 44px; height: 44px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--seal); }
  .stamp svg circle { fill: none; stroke: currentColor; stroke-width: 1.6; }
  .stamp-text { position: absolute; font-family: 'Press Start 2P', cursive; font-weight: 400; font-size: 12px; }
  .stamp.empty { color: var(--ink-faint); opacity: 0.5; }
  .stamp.mini { width: 26px; height: 26px; }
  .stamp.mini .stamp-text { font-size: 10.5px; }
  .card-main { flex: 1; min-width: 0; }
  .card-main h2 { font-family: 'Inter', sans-serif; font-size: 14.5px; font-weight: 700; margin: 0 0 2px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-main h2 .year { font-weight: 400; color: var(--ink-faint); font-size: 12px; }
  .kr { font-size: 11.5px; color: var(--pink-deep); margin: 0 0 2px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; }
  .cast { font-size: 12px; color: var(--ink-faint); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chevron { color: var(--ink-faint); flex-shrink: 0; font-size: 13px; transition: transform 0.2s; }
  .chevron.rot { transform: rotate(180deg); }

  .card-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); cursor: default; }
  .poster-full { width: 100%; max-height: 360px; object-fit: contain; background: var(--paper-sunken); border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--line); }
  .card-detail dl { display: flex; flex-direction: column; gap: 7px; margin: 0 0 12px; }
  .card-detail dl > div { display: flex; justify-content: space-between; gap: 12px; font-size: 12.5px; }
  .card-detail dt { color: var(--ink-faint); flex-shrink: 0; }
  .card-detail dd { margin: 0; text-align: right; }
  .card-actions { display: flex; gap: 14px; }
  .text-btn { display: flex; align-items: center; gap: 5px; border: none; background: none; color: var(--ink-faint); font-size: 12.5px; cursor: pointer; padding: 3px 0; font-family: inherit; }
  .text-btn.danger { color: var(--seal); }
  .text-btn.confirm { font-weight: 600; }

  /* ---------- Form sheet ---------- */
  .sheet-overlay { position: fixed; inset: 0; background: rgba(33,28,26,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 60; }
  .sheet { background: var(--paper); width: 100%; max-width: 480px; border-radius: 20px 20px 0 0; max-height: 92vh; display: flex; flex-direction: column; animation: sheet-up 0.2s ease-out; }
  @keyframes sheet-up { from { transform: translateY(20px); opacity: 0.7; } to { transform: translateY(0); opacity: 1; } }
  .sheet-handle { width: 36px; height: 4px; background: var(--line); border-radius: 2px; margin: 10px auto 0; }
  .sheet-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px 6px; }
  .sheet-header h3 { font-family: 'Press Start 2P', cursive; font-size: 12px; font-weight: 400; margin: 0; color: var(--blue-deep); }
  .sheet-body { padding: 6px 18px 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 11px; }
  .sheet-body label { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--ink-soft); font-weight: 500; }
  .sheet-body input { border: 1px solid var(--line); background: var(--paper-raised); border-radius: 10px; padding: 10px 11px; font-size: 14.5px; color: var(--ink); font-family: inherit; outline: none; }
  .sheet-body input:focus { border-color: var(--seal); }
  .field-pair { display: flex; gap: 10px; }
  .field-pair label { flex: 1; }
  .field-label-wrap { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 12px; color: var(--ink-soft); font-weight: 500; }
  .sheet-footer { display: flex; gap: 10px; padding: 12px 18px 20px; border-top: 1px solid var(--line); }
  .ghost-btn, .primary-btn { flex: 1; border-radius: 11px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; border: 1px solid transparent; }
  .ghost-btn { background: transparent; border-color: var(--line); color: var(--ink-soft); }
  .primary-btn { background: var(--seal); color: #fff; }
  .primary-btn:disabled { opacity: 0.6; }

  .poster-upload { margin-top: 2px; }
  .poster-dropzone { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; border: 1.5px dashed var(--line); border-radius: 12px; padding: 20px 12px; cursor: pointer; color: var(--ink-faint); font-size: 12.5px; background: var(--paper-sunken); }
  .poster-dropzone:hover { border-color: var(--seal); color: var(--seal); }
  .poster-preview { position: relative; width: 110px; }
  .poster-preview img { width: 110px; height: 146px; object-fit: cover; border-radius: 10px; border: 1px solid var(--line); display: block; }
  .poster-remove { position: absolute; top: -8px; right: -8px; width: 24px; height: 24px; border-radius: 50%; background: var(--ink); color: var(--paper); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 9px 16px; border-radius: 30px; font-size: 12.5px; z-index: 100; max-width: 88%; text-align: center; }

  /* ---------- Trends ---------- */
  .trends-wrap { padding: 14px 16px 24px; }
  .tr-section { margin-bottom: 26px; }
  .tr-title { font-family: 'Press Start 2P', cursive; font-size: 13px; font-weight: 400; margin: 0 0 9px; color: var(--blue-deep); }
  .tr-note { font-size: 12px; color: var(--ink-faint); margin: 0 0 11px; line-height: 1.5; }
  .tr-subhead { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; margin: 14px 0 7px; color: var(--blue-deep); }
  .tr-records-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .tr-record { background: var(--paper-raised); border: 1px solid var(--line); border-radius: 12px; padding: 11px; }
  .tr-rk-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--ink-faint); margin: 0 0 4px; }
  .tr-rk-title { font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 700; margin: 0 0 2px; line-height: 1.3; }
  .tr-rk-meta { font-size: 10.5px; color: var(--seal); font-weight: 600; margin: 0; }
  .tr-card { background: var(--paper-raised); border: 1px solid var(--line); border-radius: 14px; padding: 13px; }
  .tr-dist-chart { display: flex; align-items: flex-end; gap: 5px; height: 110px; }
  .tr-dist-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 5px; height: 100%; }
  .tr-dist-bar { width: 100%; max-width: 22px; border-radius: 4px 4px 2px 2px; background: var(--celadon); }
  .tr-dist-bar.warm { background: var(--seal); }
  .tr-dist-num { font-size: 9.5px; color: var(--ink-faint); font-weight: 600; }
  .tr-dist-lbl { font-size: 9.5px; color: var(--ink-soft); }
  .tr-insight { background: var(--celadon-soft); border: 1px solid #c9d8cd; border-radius: 12px; padding: 11px 13px; font-size: 12px; line-height: 1.55; margin-top: 11px; }
  .tr-role-toggle { display: flex; gap: 6px; margin-bottom: 11px; flex-wrap: wrap; }
  .tr-role-toggle button { border: 1px solid var(--line); background: var(--paper-raised); border-radius: 20px; padding: 6px 11px; font-size: 11.5px; color: var(--ink-soft); cursor: pointer; font-family: inherit; font-weight: 500; }
  .tr-role-toggle button.active { background: var(--seal); color: #fff; border-color: var(--seal); }
  .tr-person-row, .tr-eff-row { display: flex; align-items: center; gap: 10px; padding: 9px 11px; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 11px; margin-bottom: 7px; cursor: pointer; font-size: 12.5px; }
  .tr-person-avatar { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid var(--line); }
  .tr-rank { font-family: 'Press Start 2P', cursive; color: var(--ink-faint); width: 18px; text-align: center; flex-shrink: 0; font-size: 11px; }
  .tr-person-info { flex: 1; min-width: 0; }
  .tr-person-name { font-weight: 600; margin: 0 0 1px; font-size: 12.5px; }
  .tr-role-tag { font-weight: 400; color: var(--ink-faint); font-size: 10.5px; }
  .tr-person-sub { font-size: 10.5px; color: var(--ink-faint); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tr-person-score, .tr-eff-score { font-family: 'Press Start 2P', cursive; font-weight: 400; color: var(--pink-deep); flex-shrink: 0; font-size: 12px; }
  .tr-eff-score { color: var(--gold); }
  .tr-highlight { background: linear-gradient(135deg, var(--seal-soft), var(--gold-soft)); border: 1px solid var(--seal); border-radius: 14px; padding: 13px; }
  .tr-hc-names { font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 700; margin: 0 0 7px; }
  .tr-hc-names span { font-weight: 400; color: var(--ink-faint); }
  .tr-hc-detail { font-size: 11.5px; color: var(--ink-soft); line-height: 1.6; margin: 0; }
  .tr-year-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; overflow-x: auto; padding-bottom: 2px; }
  .tr-year-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 5px; height: 100%; min-width: 26px; flex-shrink: 0; }
  .tr-year-bar { width: 17px; border-radius: 4px 4px 2px 2px; background: var(--gold); }
  .tr-year-note { font-size: 9px; font-weight: 700; }
  .tr-year-lbl { font-size: 8.5px; color: var(--ink-faint); }

  .badge { display: inline-flex; font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; margin: 8px 0 4px; }
  .badge.b1 { background: #f1e6e0; color: #9a6a52; }
  .badge.b2 { background: var(--gold-soft); color: #8c6b2c; }
  .badge.b3 { background: var(--celadon-soft); color: #4f6657; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(33,28,26,0.5); z-index: 70; display: flex; align-items: flex-end; justify-content: center; }
  .modal-sheet { background: var(--paper); width: 100%; max-width: 480px; max-height: 86vh; border-radius: 20px 20px 0 0; overflow-y: auto; animation: sheet-up 0.2s ease-out; padding-bottom: 22px; }
  .modal-handle { width: 36px; height: 4px; background: var(--line); border-radius: 2px; margin: 10px auto 12px; }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 0 18px 6px; gap: 12px; }
  .modal-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 1px solid var(--line); flex-shrink: 0; }
  .modal-header h3 { font-family: 'Press Start 2P', cursive; font-size: 13px; margin: 0; color: var(--blue-deep); }
  .modal-role { font-size: 11.5px; color: var(--seal); font-weight: 600; margin: 2px 0 0; }
  .modal-body { padding: 0 18px; }
  .modal-stat-row { display: flex; gap: 8px; margin: 10px 0 11px; }
  .modal-stat { flex: 1; background: var(--paper-sunken); border-radius: 11px; padding: 9px; text-align: center; display: flex; flex-direction: column; gap: 2px; }
  .modal-stat .v { font-family: 'Press Start 2P', cursive; font-size: 13px; font-weight: 400; color: var(--blue-deep); }
  .modal-stat .l { font-size: 9.5px; color: var(--ink-faint); text-transform: uppercase; }
  .modal-section-h { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; color: var(--ink-faint); margin: 15px 0 7px; }
  .modal-title-row, .modal-collab-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 12.5px; }
  .modal-collab-row { cursor: pointer; }
  .modal-title-row:last-child, .modal-collab-row:last-child { border-bottom: none; }
  .modal-note { font-weight: 400; color: var(--pink-deep); font-family: 'Press Start 2P', cursive; font-size: 11px; flex-shrink: 0; }
  .modal-year { color: var(--ink-faint); font-weight: 400; }
  .modal-photo-upload { margin: 4px 0 0; }

  .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 12px; color: var(--ink-faint); font-size: 13px; }

  /* ---------- Retro gaming overrides (sharp corners, thick borders, hard shadows) ---------- */
  .drama-card, .tr-card, .tr-record, .tr-person-row, .tr-eff-row, .tr-highlight,
  .search-box, .sort-box, .sheet, .modal-sheet, .poster-dropzone, .poster-preview img,
  .poster-thumb, .poster-full, .badge, .tab-btn, .ghost-btn, .primary-btn,
  .sheet-body input, .palmares-row {
    border-radius: 3px !important;
  }
  .drama-card, .tr-card, .tr-record, .search-box, .sort-box, .tab-btn,
  .sheet-body input, .ghost-btn, .primary-btn, .role-toggle button, .tr-role-toggle button {
    border-width: 2px !important;
  }
  .drama-card, .tr-card, .tr-record, .tr-person-row, .tr-eff-row {
    box-shadow: 3px 3px 0 var(--line);
  }
  .drama-card.is-open { box-shadow: 3px 3px 0 var(--seal); }
  .tab-btn.active { box-shadow: 3px 3px 0 var(--blue-deep); }
  .primary-btn { box-shadow: 3px 3px 0 var(--pink-deep); border: 2px solid var(--pink-deep) !important; }
  .sheet, .modal-sheet { border-top: 3px solid var(--blue-deep); border-radius: 6px 6px 0 0 !important; }
  .app-seal { color: var(--blue-deep); }
  .stamp { color: var(--pink-deep); }
  .stamp.empty { color: var(--ink-faint); opacity: 0.7; }
  .add-btn { background: var(--blue-deep) !important; border-color: var(--blue-deep) !important; box-shadow: 3px 3px 0 var(--pink-deep); border-radius: 50% !important; }
  .icon-btn:not(.add-btn) { border-width: 2px; }

  /* Motif: traditional blue-and-white porcelain flower, used as "missing image" placeholder */
  .motif-flower { display: flex; align-items: center; justify-content: center; }
  .motif-flower svg { width: 70%; height: 70%; }

  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }
</style>

async function loadData() {

  render();

  const p = state.people.find((pp) => pp.nom === nom && (!role || pp.role === role));
  return p ? p.photo_url : null;
}

// ============== IMAGE UPLOAD ==============
function resizeImageFile(file, maxDim, quality) {
  maxDim = maxDim || 480;
  quality = quality || 0.8;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Lecture impossible."));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Image illisible."));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => resolve(blob), "image/jpeg", quality);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadImage(file, pathPrefix) {
  const blob = await resizeImageFile(file);
  const fileName = `${pathPrefix}/${Date.now()}.jpg`;
  const { error } = await sb.storage.from(BUCKET).upload(fileName, blob, { contentType: "image/jpeg", upsert: true });
  if (error) throw error;
  const { data } = sb.storage.from(BUCKET).getPublicUrl(fileName);
  return data.publicUrl;
}

// ============== TRENDS CALCULATIONS ==============
function splitPeople(s) {
  if (!s) return [];
  return String(s).replace(/ et /g, ",").split(",").map((p) => p.trim()).filter(Boolean);
}

function computeTrends(entries) {
  if (!entries || entries.length === 0) return null;

  const titles = entries.map((d) => {
    const people = [];
    if (d.acteur) people.push([d.acteur.trim(), "acteur"]);
    splitPeople(d.actrice).forEach((n) => people.push([n, "actrice"]));
    splitPeople(d.scenariste).forEach((n) => people.push([n, "scenariste"]));
    splitPeople(d.realisateur).forEach((n) => people.push([n, "realisateur"]));
    const note = d.note === null || d.note === undefined || d.note === "" ? null : Number(d.note);
    return { ...d, note, people };
  });

  const rated = titles.filter((t) => t.note !== null);
  const withEp = titles.filter((t) => t.episodes && Number(t.episodes) >= 2);

  const KNOWN_RELEASE_DATES = {
    "Boyfriend on Demand": 20260306,
    "Can this love be translated ?": 20260116,
    "Perfect Crown": 20260410,
    "We are all trying here": 20260418,
  };
  const sortKey = (t) => KNOWN_RELEASE_DATES[t.titre] || (t.annee ? t.annee * 10000 : 0);

  const records = rated.length
    ? {
        best: rated.reduce((a, b) => (b.note > a.note ? b : a)),
        worst: rated.reduce((a, b) => (b.note < a.note ? b : a)),
        oldest: titles.reduce((a, b) => (b.annee && (!a.annee || sortKey(b) < sortKey(a)) ? b : a)),
        newest: titles.reduce((a, b) => (b.annee && (!a.annee || sortKey(b) > sortKey(a)) ? b : a)),
        longest: withEp.length ? withEp.reduce((a, b) => (Number(b.episodes) > Number(a.episodes) ? b : a)) : null,
        shortest: withEp.length ? withEp.reduce((a, b) => (Number(b.episodes) < Number(a.episodes) ? b : a)) : null,
      }
    : null;

  const distribution = {};
  for (let n = 0; n <= 10; n++) distribution[n] = 0;
  rated.forEach((t) => { const r = Math.round(t.note); distribution[r] = (distribution[r] || 0) + 1; });
  const coupsDeCoeur = rated.filter((t) => t.note >= 9).length;
  const deceptions = rated.filter((t) => t.note <= 4).length;
  const avgNote = rated.length ? rated.reduce((s, t) => s + t.note, 0) / rated.length : null;

  const profileMap = new Map();
  titles.forEach((t) => {
    t.people.forEach(([name, role]) => {
      const key = name + "||" + role;
      if (!profileMap.has(key)) profileMap.set(key, { name, role, titles: [] });
      profileMap.get(key).titles.push({ titre: t.titre, note: t.note, annee: t.annee });
    });
  });
  const peopleProfiles = Array.from(profileMap.values()).map((p) => {
    const notes = p.titles.map((t) => t.note).filter((n) => n !== null);
    const avg_note = notes.length ? notes.reduce((s, n) => s + n, 0) / notes.length : null;
    let variance = null;
    if (notes.length >= 2) {
      const m = avg_note;
      variance = Math.sqrt(notes.reduce((s, n) => s + (n - m) * (n - m), 0) / notes.length);
    }
    return { ...p, count: p.titles.length, avg_note, variance };
  });

  const collabMap = new Map();
  titles.forEach((t) => {
    const ppl = t.people;
    for (let i = 0; i < ppl.length; i++) {
      for (let j = i + 1; j < ppl.length; j++) {
        const [n1, r1] = ppl[i], [n2, r2] = ppl[j];
        const pair = [{ name: n1, role: r1 }, { name: n2, role: r2 }].sort((a, b) => (a.name + a.role).localeCompare(b.name + b.role));
        const key = pair.map((p) => p.name + "||" + p.role).join("::");
        if (!collabMap.has(key)) collabMap.set(key, { p1: pair[0].name, role1: pair[0].role, p2: pair[1].name, role2: pair[1].role, titles: [] });
        collabMap.get(key).titles.push({ titre: t.titre, note: t.note });
      }
    }
  });
  const allCollabs = Array.from(collabMap.values()).map((c) => {
    const notes = c.titles.map((t) => t.note).filter((n) => n !== null);
    const avg_note = notes.length ? notes.reduce((s, n) => s + n, 0) / notes.length : null;
    return { ...c, count: c.titles.length, avg_note };
  });
  const recurringCollabs = allCollabs.filter((c) => c.count >= 2).sort((a, b) => b.count - a.count);

  const byYear = new Map();
  titles.forEach((t) => {
    if (!t.annee) return;
    if (!byYear.has(t.annee)) byYear.set(t.annee, []);
    byYear.get(t.annee).push(t);
  });
  const yearStats = Array.from(byYear.entries())
    .map(([annee, list]) => {
      const notes = list.map((t) => t.note).filter((n) => n !== null);
      return { annee, count: list.length, avg_note: notes.length ? notes.reduce((s, n) => s + n, 0) / notes.length : null };
    })
    .sort((a, b) => a.annee - b.annee);
  const yearsWithNotes = yearStats.filter((y) => y.avg_note !== null);
  const mostGenerousYear = yearsWithNotes.length ? yearsWithNotes.reduce((a, b) => (b.avg_note > a.avg_note ? b : a)) : null;
  const mostSevereYear = yearsWithNotes.length ? yearsWithNotes.reduce((a, b) => (b.avg_note < a.avg_note ? b : a)) : null;

  const efficiency = titles
    .filter((t) => t.note !== null && t.episodes && t.duree)
    .map((t) => {
      const totalMin = Number(t.episodes) * Number(t.duree);
      return { titre: t.titre, note: t.note, total_min: totalMin, score: (t.note / totalMin) * 1000 };
    })
    .sort((a, b) => b.score - a.score);

  const withFormat = titles.filter((t) => t.note !== null && t.episodes && t.duree);
  const shortFormat = withFormat.filter((t) => Number(t.episodes) <= 12);
  const longFormat = withFormat.filter((t) => Number(t.episodes) > 12);
  const avgOf = (arr) => (arr.length ? arr.reduce((s, t) => s + t.note, 0) / arr.length : null);

  // Acting duos only (acteur + actrice pairs), separate from writer/director collaborations.
  const actingDuos = allCollabs
    .filter((c) => (c.role1 === "acteur" && c.role2 === "actrice") || (c.role1 === "actrice" && c.role2 === "acteur"))
    .sort((a, b) => b.count - a.count || (b.avg_note || 0) - (a.avg_note || 0));

  // Personal taste profile: dominant actor/actress, favorite scenariste, format leaning.
  const topActor = peopleProfiles.filter((p) => p.role === "acteur").sort((a, b) => b.count - a.count)[0] || null;
  const topActress = peopleProfiles.filter((p) => p.role === "actrice").sort((a, b) => b.count - a.count)[0] || null;
  const topScenariste = peopleProfiles.filter((p) => p.role === "scenariste" && p.count >= 2 && p.avg_note !== null).sort((a, b) => b.avg_note - a.avg_note)[0] || null;
  const formatLean = (shortFormat.length || 0) >= (longFormat.length || 0) ? "courts" : "longs";

  // Viewing history based on date_visionnage (when available).
  const withViewDate = titles.filter((t) => t.date_visionnage);
  const monthCounts = {};
  const moisNoms = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"];
  withViewDate.forEach((t) => {
    const m = Number(t.date_visionnage.split("-")[1]) - 1;
    monthCounts[m] = (monthCounts[m] || 0) + 1;
  });
  let busiestMonth = null;
  Object.keys(monthCounts).forEach((m) => {
    if (!busiestMonth || monthCounts[m] > monthCounts[busiestMonth]) busiestMonth = m;
  });
  const viewingStats = withViewDate.length >= 2
    ? { busiestMonthName: busiestMonth !== null ? moisNoms[busiestMonth] : null, busiestMonthCount: busiestMonth !== null ? monthCounts[busiestMonth] : 0, totalWithDate: withViewDate.length }
    : null;

  return {
    records, distribution, coupsDeCoeur, deceptions, avgNote, peopleProfiles, allCollabs, recurringCollabs,
    yearStats, mostGenerousYear, mostSevereYear, efficiency,
    formats: { short: { avg: avgOf(shortFormat), count: shortFormat.length }, long: { avg: avgOf(longFormat), count: longFormat.length } },
    totalPeople: peopleProfiles.length,
    actingDuos,
    tasteProfile: { topActor, topActress, topScenariste, formatLean },
    viewingStats,
  };
}

function findProfile(trends, name, role) {
  return trends ? trends.peopleProfiles.find((p) => p.name === name && p.role === role) || null : null;

function findCollabsFor(trends, name, role) {
  if (!trends) return [];
  return trends.allCollabs.filter((c) => (c.p1 === name && c.role1 === role) || (c.p2 === name && c.role2 === role)).sort((a, b) => b.count - a.count);

// ============== FILTER / SORT ==============
function getFilteredEntries() {
  let list = state.entries;
  const q = state.query.trim().toLowerCase();
  if (q) {
    list = list.filter((d) => [d.titre, d.titre_kr, d.acteur, d.actrice, d.scenariste, d.realisateur].filter(Boolean).some((f) => String(f).toLowerCase().includes(q)));
  }
  if (state.filterDecade) {
    const decade = Number(state.filterDecade);
    list = list.filter((d) => d.annee && Number(d.annee) >= decade && Number(d.annee) < decade + 10);
  }
  if (state.filterMinNote) {
    const minN = Number(state.filterMinNote);
    list = list.filter((d) => d.note !== null && d.note !== undefined && Number(d.note) >= minN);
  }
  if (state.filterScenariste) {
    list = list.filter((d) => (d.scenariste || "").toLowerCase().includes(state.filterScenariste.toLowerCase()));
  }
  const byNum = (a, b, key, dir) => {
    const av = a[key] === null || a[key] === undefined || a[key] === "" ? -Infinity : Number(a[key]);
    const bv = b[key] === null || b[key] === undefined || b[key] === "" ? -Infinity : Number(b[key]);
    return dir === "asc" ? av - bv : bv - av;
  };
  const sorted = [...list];
  switch (state.sortBy) {
    case "note-desc": sorted.sort((a, b) => byNum(a, b, "note", "desc")); break;
    case "note-asc": sorted.sort((a, b) => byNum(a, b, "note", "asc")); break;
    case "annee-desc": sorted.sort((a, b) => byNum(a, b, "annee", "desc")); break;
    case "annee-asc": sorted.sort((a, b) => byNum(a, b, "annee", "asc")); break;
    case "az": sorted.sort((a, b) => a.titre.localeCompare(b.titre)); break;
  }
  return sorted;
}

function getAvailableDecades() {
  const years = state.entries.map((d) => d.annee).filter(Boolean);
  const decades = new Set(years.map((y) => Math.floor(Number(y) / 10) * 10));
  return Array.from(decades).sort((a, b) => b - a);
}

function getStats() {
  const rated = state.entries.filter((d) => d.note !== null && d.note !== undefined && d.note !== "");
  const avg = rated.length ? rated.reduce((s, d) => s + Number(d.note), 0) / rated.length : 0;
  const totalMin = state.entries.reduce((s, d) => s + (Number(d.episodes) || 0) * (Number(d.duree) || 0), 0);
  return { count: state.entries.length, avg, totalMin };
}

        </dl>
        <div class="card-actions">
          <button class="text-btn" data-edit-id="${esc(d.id)}">✎ Modifier</button>
          <button class="text-btn" data-share-id="${esc(d.id)}">🔗 Partager</button>
          ${state.confirmDeleteId === d.id
            ? `<button class="text-btn danger confirm" data-confirm-delete-id="${esc(d.id)}">✓ Confirmer la suppression</button>`
            : `<button class="text-btn danger" data-ask-delete-id="${esc(d.id)}">🗑 Supprimer</button>`}
        </div>
      </div>` : ""}
    </article>`;
  });

  html += `</main>`;
  return html;
}

function renderGridContent(filtered) {
  return `<div class="kt-grid">
    ${filtered.map((d) => `
      <div class="grid-cell" data-grid-id="${esc(d.id)}">
        ${d.poster_url ? `<img src="${esc(d.poster_url)}" alt="" class="grid-poster">` : `<div class="grid-poster grid-poster-empty motif-flower">${FLOWER_MOTIF_SVG}</div>`}
        <div class="grid-stamp">${stampHtml(d.note, true)}</div>
        <p class="grid-title">${esc(d.titre)}</p>
      </div>`).join("")}
  </div>`;
}

function formatDateFr(isoDate) {
  if (!isoDate) return "";
  const [y, m, d] = isoDate.split("-");
  const mois = ["janv.", "févr.", "mars", "avr.", "mai", "juin", "juil.", "août", "sept.", "oct.", "nov.", "déc."];
  return `${Number(d)} ${mois[Number(m) - 1]} ${y}`;
}

function renderYearDramaList(year) {
  const dramasOfYear = state.entries.filter((d) => Number(d.annee) === Number(year));
  if (dramasOfYear.length === 0) return "";
  return `<div class="tr-year-list">
    <p class="tr-subhead">Titres de ${year}</p>
    ${dramasOfYear.map((d) => `
      <div class="tr-person-row" data-drama-titre="${esc(d.titre)}">
        ${d.poster_url ? `<img src="${esc(d.poster_url)}" class="tr-person-avatar">` : `<span class="tr-rank motif-flower" style="width:24px;height:24px;">${FLOWER_MOTIF_SVG}</span>`}
        <div class="tr-person-info">
          <p class="tr-person-name">${esc(d.titre)}</p>
          <p class="tr-person-sub">${esc([d.acteur, d.actrice].filter(Boolean).join(" · "))}</p>
        </div>
        <span class="tr-person-score">${fmtNote(d.note)}</span>
      </div>`).join("")}
  </div>`;
}

// ============== RENDER: TRENDS VIEW ==============
function renderTrendsView() {
  const trends = computeTrends(state.entries);
  if (!trends || !trends.records) {
    return `<div class="trends-wrap"><div class="empty-state"><p>Note au moins un drama pour voir apparaître tes tendances.</p></div></div>`;
  }
  const { records, distribution, coupsDeCoeur, deceptions, avgNote, peopleProfiles, allCollabs, recurringCollabs, yearStats, mostGenerousYear, mostSevereYear, efficiency, formats, totalPeople, actingDuos, tasteProfile, viewingStats } = trends;

  const ranked = peopleProfiles.filter((p) => p.role === state.trendsRole && p.count >= 2 && p.avg_note !== null).sort((a, b) => b.avg_note - a.avg_note).slice(0, 8);
  const topRecurring = recurringCollabs[0] || null;
  const distMax = Math.max(1, ...Object.values(distribution));
  const yearMax = Math.max(1, ...yearStats.map((y) => y.count));
  const varianced = peopleProfiles.filter((p) => p.variance !== null);
  const sortedByVar = [...varianced].sort((a, b) => a.variance - b.variance);
  const mostConsistent = sortedByVar.slice(0, 5);
  const mostVariable = sortedByVar.slice(-5).reverse();

  const personRow = (p, tag) => {
    const photo = findPersonPhoto(p.name, p.role);
    const avatarHtml = photo ? `<img src="${esc(photo)}" class="tr-person-avatar">` : `<span class="tr-rank" style="${tag ? `color:${tag === "steady" ? "var(--celadon)" : "var(--seal)"}` : ""}">${tag ? (tag === "steady" ? "◆" : "◇") : ""}</span>`;
    const scoreVal = tag ? p.variance.toFixed(1) : fmtNote(p.avg_note);
    const scoreColor = tag === "steady" ? "var(--celadon)" : tag === "variable" ? "var(--seal)" : "";
    return `<div class="tr-person-row" data-person-name="${esc(p.name)}" data-person-role="${esc(p.role)}">
      ${avatarHtml}
      <div class="tr-person-info">
        <p class="tr-person-name">${esc(p.name)} ${tag ? `<span class="tr-role-tag">(${roleLabel(p.role)})</span>` : ""}</p>
        <p class="tr-person-sub">${esc(p.titles.map((t) => (tag ? fmtNote(t.note) : t.titre)).join(tag ? " · " : ", "))}</p>
      </div>
      <span class="tr-person-score" style="${scoreColor ? `color:${scoreColor}` : ""}">${scoreVal}</span>
    </div>`;
  };

  // Build a one-line personal taste sentence from available signals.
  const tasteParts = [];
  if (tasteProfile.topActor && tasteProfile.topActor.count >= 2) tasteParts.push(`tu adores ${tasteProfile.topActor.name}`);
  if (tasteProfile.topActress && tasteProfile.topActress.count >= 2) tasteParts.push(`tu suis ${tasteProfile.topActress.name} partout`);
  if (tasteProfile.topScenariste) tasteParts.push(`la plume de ${tasteProfile.topScenariste.name} te réussit (${fmtNote(tasteProfile.topScenariste.avg_note)}/10 en moyenne)`);
  tasteParts.push(`tu préfères les formats ${tasteProfile.formatLean}`);
  const tasteSentence = tasteParts.length ? `Toi, en quelques mots : ${tasteParts.join(", ")}.` : null;

  let html = `<div class="trends-wrap">
    ${tasteSentence ? `
    <section class="tr-section">
      <div class="tr-highlight" style="background: linear-gradient(135deg, var(--paper-sunken), var(--seal-soft));">
        <p class="tr-hc-detail" style="font-size:13px;">${tasteSentence}</p>
      </div>
    </section>` : ""}
    <section class="tr-section">
      <h2 class="tr-title">Les extrêmes</h2>
      <div class="tr-records-grid">
        <div class="tr-record" data-drama-titre="${esc(records.best?.titre)}"><p class="tr-rk-label">Mieux noté</p><p class="tr-rk-title">${esc(records.best?.titre)}</p><p class="tr-rk-meta">${fmtNote(records.best?.note)}/10</p></div>
        <div class="tr-record" data-drama-titre="${esc(records.worst?.titre)}"><p class="tr-rk-label">Moins bien noté</p><p class="tr-rk-title">${esc(records.worst?.titre)}</p><p class="tr-rk-meta">${fmtNote(records.worst?.note)}/10</p></div>
        <div class="tr-record" data-drama-titre="${esc(records.oldest?.titre)}"><p class="tr-rk-label">Le plus ancien</p><p class="tr-rk-title">${esc(records.oldest?.titre)}</p><p class="tr-rk-meta">${esc(records.oldest?.annee)}</p></div>
        <div class="tr-record" data-drama-titre="${esc(records.newest?.titre)}"><p class="tr-rk-label">Le plus récent</p><p class="tr-rk-title">${esc(records.newest?.titre)}</p><p class="tr-rk-meta">${esc(records.newest?.annee)}</p></div>
        ${records.longest ? `<div class="tr-record" data-drama-titre="${esc(records.longest.titre)}"><p class="tr-rk-label">Le plus long</p><p class="tr-rk-title">${esc(records.longest.titre)}</p><p class="tr-rk-meta">${esc(records.longest.episodes)} ép.</p></div>` : ""}
        ${records.shortest ? `<div class="tr-record" data-drama-titre="${esc(records.shortest.titre)}"><p class="tr-rk-label">Le plus court</p><p class="tr-rk-title">${esc(records.shortest.titre)}</p><p class="tr-rk-meta">${esc(records.shortest.episodes)} ép.</p></div>` : ""}
      </div>
    </section>

    <section class="tr-section">
      <h2 class="tr-title">La notation</h2>
      <div class="tr-card"><div class="tr-dist-chart">
        ${Object.keys(distribution).map((n) => {
          const count = distribution[n];
          const h = count ? Math.max(8, (count / distMax) * 100) : 4;
          return `<div class="tr-dist-col"><span class="tr-dist-num">${count || ""}</span><div class="tr-dist-bar ${Number(n) >= 9 ? "warm" : ""}" style="height:${h}px"></div><span class="tr-dist-lbl">${n}</span></div>`;
        }).join("")}
      </div></div>
      <div class="tr-insight"><b>${coupsDeCoeur} coups de cœur</b> (note ≥ 9) contre <b>${deceptions} déceptions</b> (note ≤ 4). Note moyenne : <b>${fmtNote(avgNote)}/10</b>.</div>
    </section>

    <section class="tr-section">
      <h2 class="tr-title">Les valeurs sûres</h2>
      <p class="tr-note">Sur ${totalPeople} personnes recensées, triées par note moyenne (minimum 2 titres).</p>
      <div class="tr-role-toggle">
        ${["acteur", "actrice", "scenariste", "realisateur"].map((r) => `<button class="${state.trendsRole === r ? "active" : ""}" data-trends-role="${r}">${roleLabel(r)}s</button>`).join("")}
      </div>
      ${ranked.length === 0 ? `<p class="tr-note">Pas encore 2 titres en commun pour cette catégorie.</p>` : ranked.map((p, i) => `
        <div class="tr-person-row" data-person-name="${esc(p.name)}" data-person-role="${esc(p.role)}">
          ${findPersonPhoto(p.name, p.role) ? `<img src="${esc(findPersonPhoto(p.name, p.role))}" class="tr-person-avatar">` : `<span class="tr-rank">${i + 1}</span>`}
          <div class="tr-person-info"><p class="tr-person-name">${esc(p.name)}</p><p class="tr-person-sub">${esc(p.titles.map((t) => t.titre).join(", "))}</p></div>
          <span class="tr-person-score">${fmtNote(p.avg_note)}</span>
        </div>`).join("")}
    </section>

    ${topRecurring ? `
    <section class="tr-section">
      <h2 class="tr-title">La seule collaboration qui s'est répétée</h2>
      <div class="tr-highlight">
        <p class="tr-hc-names">${esc(topRecurring.p1)} <span>(${roleLabel(topRecurring.role1)})</span> + ${esc(topRecurring.p2)} <span>(${roleLabel(topRecurring.role2)})</span></p>
        <p class="tr-hc-detail">${esc(topRecurring.titles.map((t) => `${t.titre} — ${fmtNote(t.note)}/10`).join(" · "))}<br><br>
        Sur ${allCollabs.length} paires recensées, c'est la seule à s'être reformée — la note dépend surtout du titre, pas du tandem.</p>
      </div>
    </section>` : ""}

    ${actingDuos.length > 0 ? `
    <section class="tr-section">
      <h2 class="tr-title">Duos à l'écran</h2>
      <p class="tr-note">Paires acteur-actrice, classées par nombre de titres ensemble.</p>
      ${actingDuos.slice(0, 5).map((c, i) => `
        <div class="tr-person-row">
          <span class="tr-rank">${i + 1}</span>
          <div class="tr-person-info">
            <p class="tr-person-name">${esc(c.p1)} + ${esc(c.p2)}</p>
            <p class="tr-person-sub">${esc(c.titles.map((t) => t.titre).join(", "))}</p>
          </div>
          <span class="tr-person-score">${fmtNote(c.avg_note)}</span>
        </div>`).join("")}
    </section>` : ""}

    <section class="tr-section">
      <h2 class="tr-title">Réguliers vs imprévisibles</h2>
      <p class="tr-note">Écart entre le meilleur et le pire titre d'une même personne (min. 2 titres).</p>
      ${mostConsistent.length > 0 ? `<p class="tr-subhead">Les plus réguliers</p>${mostConsistent.map((p) => personRow(p, "steady")).join("")}` : ""}
      ${mostVariable.length > 0 ? `<p class="tr-subhead">Les plus imprévisibles</p>${mostVariable.map((p) => personRow(p, "variable")).join("")}` : ""}
    </section>

    <section class="tr-section">
      <h2 class="tr-title">Année par année</h2>
      <p class="tr-note">Touche une année pour voir les titres correspondants.</p>
      <div class="tr-card"><div class="tr-year-chart">
        ${yearStats.map((y) => {
          const h = Math.max(16, (y.count / yearMax) * 100);
          const isSelected = state.selectedYear === y.annee;
          return `<div class="tr-year-col ${isSelected ? "selected" : ""}" data-year="${y.annee}"><span class="tr-year-note">${y.avg_note !== null ? fmtNote(y.avg_note) : "—"}</span><div class="tr-year-bar" style="height:${h}px"></div><span class="tr-year-lbl">${y.annee}</span></div>`;
        }).join("")}
      </div></div>
      ${mostGenerousYear && mostSevereYear ? `<div class="tr-insight">Année la mieux notée : <b>${mostGenerousYear.annee}</b> (${fmtNote(mostGenerousYear.avg_note)}/10, ${mostGenerousYear.count} titre${mostGenerousYear.count > 1 ? "s" : ""}). Année la moins bien notée : <b>${mostSevereYear.annee}</b> (${fmtNote(mostSevereYear.avg_note)}/10${mostSevereYear.count === 1 ? " — un seul titre, donc peu représentatif" : `, ${mostSevereYear.count} titres`}).</div>` : ""}
      ${state.selectedYear ? renderYearDramaList(state.selectedYear) : ""}
    </section>

    <section class="tr-section">
      <h2 class="tr-title">Formats</h2>
      <div class="tr-records-grid" style="grid-template-columns:1fr 1fr">
        <div class="tr-record"><p class="tr-rk-label">Courts (≤12 ép.)</p><p class="tr-rk-title">${fmtNote(formats.short.avg)}/10</p><p class="tr-rk-meta">sur ${formats.short.count} titres</p></div>
        <div class="tr-record"><p class="tr-rk-label">Longs (&gt;12 ép.)</p><p class="tr-rk-title">${fmtNote(formats.long.avg)}/10</p><p class="tr-rk-meta">sur ${formats.long.count} titres</p></div>
      </div>
    </section>

    <section class="tr-section">
      <h2 class="tr-title">Rendement note / temps</h2>
      <p class="tr-note">(note ÷ durée totale en minutes) × 1000.</p>
      ${efficiency.slice(0, 8).map((e, i) => `
        <div class="tr-eff-row">
          <span class="tr-rank">${i + 1}</span>
          <div class="tr-person-info"><p class="tr-person-name">${esc(e.titre)}</p><p class="tr-person-sub">${fmtNote(e.note)}/10 · ${e.total_min} min</p></div>
          <span class="tr-eff-score">${e.score.toFixed(1)}</span>
        </div>`).join("")}
    </section>

    ${viewingStats && viewingStats.busiestMonthName ? `
    <section class="tr-section">
      <h2 class="tr-title">Tes habitudes</h2>
      <div class="tr-insight">Sur ${viewingStats.totalWithDate} titres avec une date de visionnage renseignée, c'est en <b>${viewingStats.busiestMonthName}</b> que tu regardes le plus de dramas (${viewingStats.busiestMonthCount} titre${viewingStats.busiestMonthCount > 1 ? "s" : ""}).</div>
    </section>` : ""}
  </div>`;

  return html;
}

function renderAVoirView() {
  let html = `<main class="kt-list">
    <p class="tr-note" style="padding:0 16px 4px;">Les dramas que tu veux regarder. Marque-les comme vus une fois terminés pour leur donner une note dans Ma liste.</p>`;

  if (state.aVoir.length > 0) {
    html += `<div style="padding:0 16px 10px;"><button class="primary-btn" id="surpriseMeBtn" style="width:100%;">🎲 Surprends-moi</button></div>`;
  }

  if (state.aVoir.length === 0) {
    html += `<div class="empty-state"><p>Ta liste à voir est vide pour l'instant.</p></div>`;
  }

  state.aVoir.forEach((d) => {
    const isOpen = state.expandedAVoirId === d.id;
    html += `<article class="drama-card ${isOpen ? "is-open" : ""}" data-avoir-card-id="${esc(d.id)}">
      <div class="card-row">
        ${d.poster_url ? `<img src="${esc(d.poster_url)}" alt="" class="poster-thumb">` : `<div class="stamp empty motif-flower">${FLOWER_MOTIF_SVG}</div>`}
        <div class="card-main">
          <h2>${esc(d.titre)}${d.annee ? `<span class="year"> · ${esc(d.annee)}</span>` : ""}</h2>
          ${d.titre_kr ? `<p class="kr">${esc(d.titre_kr)}</p>` : ""}
          <p class="cast">${esc([d.acteur, d.actrice].filter(Boolean).join("  ·  ") || "Casting non renseigné")}</p>
        </div>
        <span class="chevron ${isOpen ? "rot" : ""}">▾</span>
      </div>
      ${isOpen ? `
      <div class="card-detail" data-stop-propagation="1">
        ${d.poster_url ? `<img src="${esc(d.poster_url)}" alt="" class="poster-full">` : ""}
        ${d.resume ? `<p style="font-size:12.5px; color:var(--ink-soft); line-height:1.5; margin:0 0 12px;">${esc(d.resume)}</p>` : ""}
        <dl>
          <div><dt>Scénariste</dt><dd>${esc(d.scenariste || "—")}</dd></div>
          <div><dt>Réalisateur</dt><dd>${esc(d.realisateur || "—")}</dd></div>
        </dl>
        <div class="card-actions">
          <button class="text-btn" data-watched-id="${esc(d.id)}" style="color:var(--celadon); font-weight:600;">✓ Marquer comme vu</button>
          <button class="text-btn" data-edit-avoir-id="${esc(d.id)}">✎ Modifier</button>
          ${state.confirmDeleteAVoirId === d.id
            ? `<button class="text-btn danger confirm" data-confirm-delete-avoir-id="${esc(d.id)}">✓ Confirmer</button>`
            : `<button class="text-btn danger" data-ask-delete-avoir-id="${esc(d.id)}">🗑</button>`}
        </div>
      </div>` : ""}
    </article>`;
  });

  html += `</main>`;
  return html;
}

  </div>`;
}

// ============== RENDER: PERSON MODAL ==============
function renderPersonModal() {
  if (!state.personModal) return "";
  const { nom, role } = state.personModal;
  const trends = computeTrends(state.entries);
  const profile = findProfile(trends, nom, role);
  if (!profile) return "";
  const collabs = findCollabsFor(trends, nom, role);
  const badge = reliabilityBadge(profile.count);
  const photo = findPersonPhoto(nom, role);

  return `<div class="modal-overlay" id="personModalOverlay">
    <div class="modal-sheet" id="personModalSheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        ${photo ? `<img src="${esc(photo)}" class="modal-avatar">` : ""}
        <div style="flex:1;">
          <h3>${esc(profile.name)}</h3>
          <p class="modal-role">${roleLabel(profile.role)}</p>
        </div>
        <button class="icon-btn" id="personModalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-stat-row">
          <div class="modal-stat"><span class="v">${profile.count}</span><span class="l">Titres</span></div>
          <div class="modal-stat"><span class="v">${fmtNote(profile.avg_note)}</span><span class="l">Note moy.</span></div>
          <div class="modal-stat"><span class="v">${profile.variance !== null ? profile.variance.toFixed(1) : "—"}</span><span class="l">Écart-type</span></div>
        </div>
        <span class="badge ${badge.cls}">${badge.label}</span>

        <div class="field-label-wrap modal-photo-upload">
          <span class="field-label">Photo de cette personne</span>
          <div class="poster-upload">
            ${photo
              ? `<div class="poster-preview"><img src="${esc(photo)}"></div>`
              : `<label class="poster-dropzone">📷<span>${state.imageProcessing ? "Traitement…" : "Ajouter une photo"}</span><input type="file" accept="image/*" style="display:none" id="personPhotoInput"></label>`}
          </div>
        </div>

        <p class="modal-section-h">Ses titres</p>
        ${profile.titles.map((t) => `<div class="modal-title-row"><span>${esc(t.titre)} ${t.annee ? `<span class="modal-year">(${esc(t.annee)})</span>` : ""}</span><span class="modal-note">${fmtNote(t.note)}</span></div>`).join("")}
        <p class="modal-section-h">A travaillé avec (${collabs.length})</p>
        ${collabs.length === 0 ? `<p class="tr-note">Aucune collaboration recensée.</p>` : collabs.map((c) => {
          const other = c.p1 === profile.name && c.role1 === profile.role ? { name: c.p2, role: c.role2 } : { name: c.p1, role: c.role1 };
          return `<div class="modal-collab-row" data-person-name="${esc(other.name)}" data-person-role="${esc(other.role)}"><span>${esc(other.name)} <span class="modal-year">(${roleLabel(other.role)})</span></span><span class="modal-note">${fmtNote(c.avg_note)}</span></div>`;
        }).join("")}
      </div>
    </div>
  </div>`;
}

// ============== RENDER: DRAMA MODAL (from Tendances) ==============
function renderDramaModal() {
  if (!state.dramaModal) return "";
  const d = state.entries.find((e) => e.titre === state.dramaModal);
  if (!d) return "";

  return `<div class="modal-overlay" id="dramaModalOverlay">
    <div class="modal-sheet" id="dramaModalSheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <div style="flex:1;">
          <h3>${esc(d.titre)}</h3>
          ${d.titre_kr ? `<p class="modal-role kr" style="color:var(--pink-deep); font-family:'Noto Sans KR',sans-serif;">${esc(d.titre_kr)}</p>` : ""}
        </div>
        <button class="icon-btn" id="dramaModalClose">✕</button>
      </div>
      <div class="modal-body">
        ${d.poster_url ? `<img src="${esc(d.poster_url)}" alt="" class="poster-full">` : ""}
        <div class="modal-stat-row">
          <div class="modal-stat"><span class="v">${fmtNote(d.note)}</span><span class="l">Note</span></div>
          <div class="modal-stat"><span class="v">${esc(d.annee || "—")}</span><span class="l">Année</span></div>
          <div class="modal-stat"><span class="v">${d.episodes ? esc(d.episodes) : "—"}</span><span class="l">Épisodes</span></div>
        </div>
        <p class="modal-section-h">Casting & équipe</p>
        <div class="modal-title-row"><span>Acteur principal</span><span class="modal-note" style="color:var(--ink); font-family:'Inter',sans-serif; font-weight:600;">${esc(d.acteur || "—")}</span></div>
        <div class="modal-title-row"><span>Actrice principale</span><span class="modal-note" style="color:var(--ink); font-family:'Inter',sans-serif; font-weight:600;">${esc(d.actrice || "—")}</span></div>
        <div class="modal-title-row"><span>Scénariste</span><span class="modal-note" style="color:var(--ink); font-family:'Inter',sans-serif; font-weight:600;">${esc(d.scenariste || "—")}</span></div>
        <div class="modal-title-row"><span>Réalisateur</span><span class="modal-note" style="color:var(--ink); font-family:'Inter',sans-serif; font-weight:600;">${esc(d.realisateur || "—")}</span></div>
        ${d.episodes && d.duree ? `<div class="modal-title-row"><span>Format</span><span class="modal-note" style="color:var(--ink); font-family:'Inter',sans-serif; font-weight:600;">${esc(d.episodes)} × ${esc(d.duree)} min</span></div>` : ""}
      </div>
    </div>
  </div>`;
}

// ============== MAIN RENDER ==============
function render() {
  const root = document.getElementById("app");
  if (state.loading) {
    root.innerHTML = `<div class="loading-screen"><div class="app-seal motif-flower">${FLOWER_MOTIF_SVG}</div><p>Ouverture du carnet…</p></div>`;
    return;
  }

  const stats = getStats();
  root.innerHTML = `
    <header class="app-header">
      <div class="app-seal motif-flower">${FLOWER_MOTIF_SVG}</div>
      <p class="app-eyebrow">내 드라마 일지</p>
      <h1>Mon carnet de k-dramas</h1>
      ${state.activeTab !== "tendances" ? `<button class="icon-btn add-btn" id="openNewBtn">＋</button>` : `<button class="icon-btn" id="exportBtn" style="position:absolute; top:16px; right:16px;" aria-label="Exporter mes données">⇩</button>`}
      <div class="hero-stats">
        <div class="hero-stat"><span class="num">${stats.count}</span><span class="lbl">vus</span></div>
        <div class="hero-stat"><span class="num">${stats.avg ? stats.avg.toFixed(1) : "–"}</span><span class="lbl">note moy.</span></div>
        <div class="hero-stat"><span class="num">${Math.round(stats.totalMin / 60)}</span><span class="lbl">heures</span></div>
      </div>
      <div class="tabbar">
        <button class="tab-btn ${state.activeTab === "tendances" ? "active" : ""}" data-tab="tendances">Tendances</button>
        <button class="tab-btn ${state.activeTab === "liste" ? "active" : ""}" data-tab="liste">Ma liste</button>
        <button class="tab-btn ${state.activeTab === "avoir" ? "active" : ""}" data-tab="avoir">À voir</button>
      </div>
    </header>
    ${state.activeTab === "liste" ? renderListView() : state.activeTab === "avoir" ? renderAVoirView() : renderTrendsView()}
    ${renderFormSheet()}
    ${renderAVoirFormSheet()}
    ${renderPersonModal()}
    ${renderDramaModal()}
    ${state.toastMsg ? `<div class="toast">${esc(state.toastMsg)}</div>` : ""}
  `;

  attachListeners();
}

// ============== EVENT LISTENERS ==============
function attachListeners() {
  document.querySelectorAll("[data-tab]").forEach((btn) => {
    btn.addEventListener("click", () => setState({ activeTab: btn.dataset.tab }));
  });

  const addBtn = document.getElementById("openNewBtn");
  if (addBtn) addBtn.addEventListener("click", () => { state.activeTab === "avoir" ? openNewAVoir() : openNew(); });
  const exportBtn = document.getElementById("exportBtn");
  if (exportBtn) exportBtn.addEventListener("click", exportData);

  // List view
  const searchInput = document.getElementById("searchInput");
  if (searchInput) {
    searchInput.addEventListener("input", (e) => setState({ query: e.target.value }));
    if (state.searchHadFocus) {
      searchInput.focus();
      searchInput.setSelectionRange(searchInput.value.length, searchInput.value.length);
    }
    searchInput.addEventListener("focus", () => { state.searchHadFocus = true; });
    searchInput.addEventListener("blur", () => { state.searchHadFocus = false; });
  }
  const clearSearch = document.getElementById("clearSearch");
  if (clearSearch) clearSearch.addEventListener("click", () => setState({ query: "" }));
  const sortSelect = document.getElementById("sortSelect");
  if (sortSelect) sortSelect.addEventListener("change", (e) => setState({ sortBy: e.target.value }));

  const viewModeToggleBtn = document.getElementById("viewModeToggleBtn");
  if (viewModeToggleBtn) viewModeToggleBtn.addEventListener("click", () => setState({ viewMode: state.viewMode === "liste" ? "grille" : "liste" }));
  const filterToggleBtn = document.getElementById("filterToggleBtn");
  if (filterToggleBtn) filterToggleBtn.addEventListener("click", () => setState({ showFilters: !state.showFilters }));
  const filterDecadeSelect = document.getElementById("filterDecadeSelect");
  if (filterDecadeSelect) filterDecadeSelect.addEventListener("change", (e) => setState({ filterDecade: e.target.value }));
  const filterNoteSelect = document.getElementById("filterNoteSelect");
  if (filterNoteSelect) filterNoteSelect.addEventListener("change", (e) => setState({ filterMinNote: e.target.value }));
  const filterScenaristeInput = document.getElementById("filterScenaristeInput");
  if (filterScenaristeInput) filterScenaristeInput.addEventListener("input", (e) => { state.filterScenariste = e.target.value; });
  const clearFiltersBtn = document.getElementById("clearFiltersBtn");
  if (clearFiltersBtn) clearFiltersBtn.addEventListener("click", () => setState({ filterDecade: "", filterMinNote: "", filterScenariste: "" }));

  document.querySelectorAll("[data-grid-id]").forEach((cell) => {
    cell.addEventListener("click", () => {
      const d = state.entries.find((x) => String(x.id) === cell.dataset.gridId);
      if (d) setState({ dramaModal: d.titre });
    });
  });
  document.querySelectorAll("[data-share-id]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const d = state.entries.find((x) => String(x.id) === btn.dataset.shareId);
      if (d) shareDrama(d);
    });
  });

  document.querySelectorAll("[data-card-id]").forEach((card) => {
    card.addEventListener("click", (e) => {
      if (e.target.closest("[data-stop-propagation]")) return;
      const id = card.dataset.cardId;
      setState({ expandedId: state.expandedId === id ? null : id });
    });
  });
  document.querySelectorAll("[data-edit-id]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const d = state.entries.find((x) => String(x.id) === btn.dataset.editId);
      if (d) openEdit(d);
    });
  });
  document.querySelectorAll("[data-ask-delete-id]").forEach((btn) => {
    btn.addEventListener("click", (e) => { e.stopPropagation(); setState({ confirmDeleteId: btn.dataset.askDeleteId }); });
  });
  document.querySelectorAll("[data-confirm-delete-id]").forEach((btn) => {
    btn.addEventListener("click", (e) => { e.stopPropagation(); deleteEntry(btn.dataset.confirmDeleteId); });
  });

  // Trends view
  document.querySelectorAll("[data-trends-role]").forEach((btn) => {
    btn.addEventListener("click", () => setState({ trendsRole: btn.dataset.trendsRole }));
  });
  document.querySelectorAll("[data-year]").forEach((el) => {
    el.addEventListener("click", () => {
      const y = Number(el.dataset.year);
      setState({ selectedYear: state.selectedYear === y ? null : y });
    });
  });
  document.querySelectorAll("[data-person-name]").forEach((el) => {
    el.addEventListener("click", () => setState({ personModal: { nom: el.dataset.personName, role: el.dataset.personRole } }));
  });
  document.querySelectorAll("[data-drama-titre]").forEach((el) => {
    el.addEventListener("click", () => {
      const titre = el.dataset.dramaTitre;
      if (titre) setState({ dramaModal: titre });
    });
  });

  // Person modal
  const personModalOverlay = document.getElementById("personModalOverlay");
  if (personModalOverlay) {
    personModalOverlay.addEventListener("click", (e) => { if (e.target === personModalOverlay) setState({ personModal: null }); });
  }
  const personModalClose = document.getElementById("personModalClose");
  if (personModalClose) personModalClose.addEventListener("click", () => setState({ personModal: null }));
  const personPhotoInput = document.getElementById("personPhotoInput");
  if (personPhotoInput) {
    personPhotoInput.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (file && state.personModal) uploadPersonPhoto(file, state.personModal.nom, state.personModal.role);
    });
  }

  // Drama modal (from Tendances)
  const dramaModalOverlay = document.getElementById("dramaModalOverlay");
  if (dramaModalOverlay) {
    dramaModalOverlay.addEventListener("click", (e) => { if (e.target === dramaModalOverlay) setState({ dramaModal: null }); });
  }
  const dramaModalClose = document.getElementById("dramaModalClose");
  if (dramaModalClose) dramaModalClose.addEventListener("click", () => setState({ dramaModal: null }));

  // Form sheet
  const formOverlay = document.getElementById("formOverlay");
  if (formOverlay) formOverlay.addEventListener("click", (e) => { if (e.target === formOverlay) closeForm(); });
  const formClose = document.getElementById("formClose");
  if (formClose) formClose.addEventListener("click", closeForm);
  const formCancel = document.getElementById("formCancel");
  if (formCancel) formCancel.addEventListener("click", closeForm);
  const formSave = document.getElementById("formSave");
  if (formSave) formSave.addEventListener("click", saveDraft);

  const fieldMap = { "f-titre": "titre", "f-titre_kr": "titre_kr", "f-annee": "annee", "f-note": "note", "f-acteur": "acteur", "f-actrice": "actrice", "f-scenariste": "scenariste", "f-realisateur": "realisateur", "f-episodes": "episodes", "f-duree": "duree", "f-date_visionnage": "date_visionnage" };
  Object.keys(fieldMap).forEach((id) => {
    const input = document.getElementById(id);
    if (input) {
      input.addEventListener("input", (e) => {
        state.draft = { ...state.draft, [fieldMap[id]]: e.target.value };
        // Avoid full re-render on every keystroke to keep focus; update state silently.
      });
    }
  });

  const posterInput = document.getElementById("posterInput");
  if (posterInput) posterInput.addEventListener("change", (e) => handlePosterUpload(e.target.files && e.target.files[0]));
  const posterRemove = document.getElementById("posterRemove");
  if (posterRemove) posterRemove.addEventListener("click", removePoster);
  const searchPosterBtn = document.getElementById("searchPosterBtn");
  if (searchPosterBtn) {
    searchPosterBtn.addEventListener("click", () => {
      const titreInput = document.getElementById("f-titre");
      searchPosterOnline(titreInput ? titreInput.value : state.draft.titre);
    });
  }

  // A voir (wishlist) view
  const surpriseMeBtn = document.getElementById("surpriseMeBtn");
  if (surpriseMeBtn) surpriseMeBtn.addEventListener("click", surpriseMe);
  document.querySelectorAll("[data-avoir-card-id]").forEach((card) => {
    card.addEventListener("click", (e) => {
      if (e.target.closest("[data-stop-propagation]")) return;
      const id = card.dataset.avoirCardId;
      setState({ expandedAVoirId: state.expandedAVoirId === id ? null : id });
    });
  });
  document.querySelectorAll("[data-watched-id]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const d = state.aVoir.find((x) => String(x.id) === btn.dataset.watchedId);
      if (d) markAsWatched(d);
    });
  });
  document.querySelectorAll("[data-edit-avoir-id]").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const d = state.aVoir.find((x) => String(x.id) === btn.dataset.editAvoirId);
      if (d) openEditAVoir(d);
    });
  });
  document.querySelectorAll("[data-ask-delete-avoir-id]").forEach((btn) => {
    btn.addEventListener("click", (e) => { e.stopPropagation(); setState({ confirmDeleteAVoirId: btn.dataset.askDeleteAvoirId }); });
  });
  document.querySelectorAll("[data-confirm-delete-avoir-id]").forEach((btn) => {
    btn.addEventListener("click", (e) => { e.stopPropagation(); deleteAVoirEntry(btn.dataset.confirmDeleteAvoirId); });
  });

  // A voir form sheet
  const avoirFormOverlay = document.getElementById("avoirFormOverlay");
  if (avoirFormOverlay) avoirFormOverlay.addEventListener("click", (e) => { if (e.target === avoirFormOverlay) closeAVoirForm(); });
  const avoirFormClose = document.getElementById("avoirFormClose");
  if (avoirFormClose) avoirFormClose.addEventListener("click", closeAVoirForm);
  const avoirFormCancel = document.getElementById("avoirFormCancel");
  if (avoirFormCancel) avoirFormCancel.addEventListener("click", closeAVoirForm);
  const avoirFormSave = document.getElementById("avoirFormSave");
  if (avoirFormSave) avoirFormSave.addEventListener("click", saveAVoirDraft);

  const avoirFieldMap = { "av-titre": "titre", "av-titre_kr": "titre_kr", "av-annee": "annee", "av-acteur": "acteur", "av-actrice": "actrice", "av-scenariste": "scenariste", "av-realisateur": "realisateur", "av-resume": "resume" };
  Object.keys(avoirFieldMap).forEach((id) => {
    const input = document.getElementById(id);
    if (input) {
      input.addEventListener("input", (e) => {
        state.aVoirDraft = { ...state.aVoirDraft, [avoirFieldMap[id]]: e.target.value };
      });
    }
  });
  const avoirPosterInput = document.getElementById("avoirPosterInput");
  if (avoirPosterInput) avoirPosterInput.addEventListener("change", (e) => handleAVoirPosterUpload(e.target.files && e.target.files[0]));
  const avoirPosterRemove = document.getElementById("avoirPosterRemove");
  if (avoirPosterRemove) avoirPosterRemove.addEventListener("click", removeAVoirPoster);
  const searchAVoirPosterBtn = document.getElementById("searchAVoirPosterBtn");
  if (searchAVoirPosterBtn) {
    searchAVoirPosterBtn.addEventListener("click", () => {
      const titreInput = document.getElementById("av-titre");
      searchPosterOnline(titreInput ? titreInput.value : state.aVoirDraft.titre);
    });
  }
}

// ============== INIT ==============
loadData();
</script>
</body>
</html>
