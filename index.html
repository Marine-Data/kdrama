// ---- builder (glisser-déposer) ----
// Construit le pool d'éléments disponibles pour un rôle donné
// (drama/acteur/actrice), en excluant ceux déjà présents dans
// `dejaPlaces` (element_label des items déjà classés dans la
// tierlist) — sinon un même drama/acteur pourrait apparaître à la
// fois dans le réservoir ET déjà placé dans un niveau.
function construirePoolPourType(sourceType, dejaPlaces) {
  const exclus = new Set(dejaPlaces);
  if (sourceType === "acteur") {
    const noms = new Set();
    state.entries.forEach((d) => { if (d.acteur) noms.add(d.acteur); });
    return Array.from(noms).filter((nom) => !exclus.has(nom)).map((nom) => ({
      element_type: "acteur", element_id: null, element_label: nom, element_image_url: findPersonPhoto(nom, "acteur"),
    }));
  }
  if (sourceType === "actrice") {
    const noms = new Set();
    state.entries.forEach((d) => { if (d.actrice) splitPeople(d.actrice).forEach((n) => noms.add(n)); });
    return Array.from(noms).filter((nom) => !exclus.has(nom)).map((nom) => ({
      element_type: "actrice", element_id: null, element_label: nom, element_image_url: findPersonPhoto(nom, "actrice"),
    }));
  }
  // "drama" par défaut.
  return state.entries.filter((d) => !exclus.has(d.titre)).map((d) => ({
    element_type: "drama", element_id: d.id, element_label: d.titre, element_image_url: d.poster_url,
  }));
}

async function openTierlistBuilder(tierlistId, sourceType) {
  const { items, error } = await loadItemsForTierlist(tierlistId);
  if (error) {
    // Ne JAMAIS ouvrir le builder dans un état trompeur : si le
    // chargement des items existants a échoué, on refuse d'ouvrir
    // plutôt que de risquer d'écraser le contenu déjà sauvegardé au
    // prochain "Enregistrer" (voir le commentaire sur loadItemsForTierlist).
    showToast("Impossible de charger cette tierlist (problème réseau) — réessaie dans un instant.");
    return;
  }

  let pool;
  if (items.length === 0) {
    // Tierlist toute neuve : rien à analyser pour deviner le type, on
    // se base donc sur le choix fait dans le formulaire de création
    // (sourceType), comme avant.
    pool = construirePoolPourType(sourceType || "drama", []);
  } else {
    // Reprise d'une tierlist déjà commencée : le type est déjà
    // déterminé par ce qu'elle contient — on ne redemande plus rien
    // (voir la demande "il ne faut pas que la personne choisisse entre
    // drama et acteurs/actrices mais que ce soit automatique"). On
    // exclut du réservoir les éléments déjà classés, pour ne pas les
    // proposer une deuxième fois.
    const typeDetecte = items[0].element_type;
    const dejaPlaces = items.map((it) => it.element_label);
    pool = construirePoolPourType(typeDetecte, dejaPlaces);
  }

  // Les niveaux personnalisés sont stockés sur la tierlist elle-même en
  // base (colonne `niveaux`) — on les relit depuis state.tierlists plutôt
  // que de dépendre d'un paramètre, pour couvrir création/édition/duplication.
  const tierlistEnBase = state.tierlists.find((t) => t.id === tierlistId);
  const niveauxPerso = (tierlistEnBase && tierlistEnBase.niveaux) || null;

  setState({
    editingTierlistId: tierlistId,
    editingTierlistNiveaux: niveauxPerso,
    builderItems: items.map((it) => ({ ...it })),
    builderPool: pool,
    activeTab: "tierlist-builder",
  });
}

function closeTierlistBuilder() {
  setState({ editingTierlistId: null, editingTierlistNiveaux: null, builderItems: [], builderPool: [], builderSearchQuery: "", activeTab: "communaute" });
}

function moveItemToNiveau(item, niveau, fromPool) {
  if (fromPool) {
    state.builderPool = state.builderPool.filter((p) => p !== item);
  } else {
    state.builderItems = state.builderItems.filter((it) => it !== item);
  }
  const itemsInNiveau = state.builderItems.filter((it) => it.niveau === niveau).length;
  state.builderItems.push({ ...item, niveau, position: itemsInNiveau, tierlist_id: state.editingTierlistId });
  render();
}

function moveItemBackToPool(item) {
  state.builderItems = state.builderItems.filter((it) => it !== item);
  state.builderPool.push(item);
  render();
}

async function sauvegarderTierlistBuilder() {
  try {
    // Stratégie simple et robuste : on supprime tous les items existants
    // de cette tierlist puis on réinsère l'état courant du builder.
    // Le volume par tierlist est faible (quelques dizaines d'items max),
    // donc le coût de ce remplacement complet est négligeable.
    const { error: delError } = await sb.from("tierlist_items").delete().eq("tierlist_id", state.editingTierlistId);
    if (delError) throw delError;

    if (state.builderItems.length > 0) {
      const payload = state.builderItems.map((it, i) => ({
        tierlist_id: state.editingTierlistId,
        element_type: it.element_type,
        element_id: it.element_id || null,
        element_label: it.element_label,
        element_image_url: it.element_image_url || null,
        niveau: it.niveau,
        position: it.position ?? i,
      }));
      const { error: insError } = await sb.from("tierlist_items").insert(payload);
      if (insError) throw insError;
    }
    showToast("Tierlist enregistrée.");
    await loadTierlists();
    closeTierlistBuilder();
  } catch (e) {
    console.error(e);
    showToast("Enregistrement impossible.");
    return; // on ne tente pas de cadeau si l'enregistrement a échoué
  }
  // Volontairement HORS du try/catch ci-dessus, et déjà protégé par
  // son propre try/catch interne : le système de cadeaux ne doit
  // JAMAIS pouvoir affecter le message de succès/échec de la
  // sauvegarde de la tierlist, qui est l'action principale ici.
  await tenterGagnerCadeau("tierlist");
}

async function dupliquerTierlist(tierlistId) {
  if (!isLoggedIn()) { showToast("Connecte-toi pour dupliquer une tierlist."); return; }
  try {
    const original = state.tierlists.find((t) => t.id === tierlistId);
    if (!original) return;
    const { items, error: errLoad } = await loadItemsForTierlist(tierlistId);
    if (errLoad) throw errLoad;
    const { data: newTierlist, error } = await sb.from("tierlists").insert([{
      user_id: currentUserId(),
      titre: `${original.titre} (copie)`,
      theme: original.theme,
      description: original.description,
      est_publique: false,
      niveaux: original.niveaux || null,
    }]).select().single();
    if (error) throw error;
    if (items.length > 0) {
      const payload = items.map((it) => ({
        tierlist_id: newTierlist.id, element_type: it.element_type, element_id: it.element_id,
        element_label: it.element_label, element_image_url: it.element_image_url,
        niveau: it.niveau, position: it.position,
      }));
      await sb.from("tierlist_items").insert(payload);
    }
    await loadTierlists();
    showToast("Tierlist dupliquée dans tes brouillons (privée).");
    openTierlistBuilder(newTierlist.id, null);
  } catch (e) {
    console.error(e);
    showToast("Duplication impossible.");
  }
}

// Normalise les niveaux d'une tierlist : soit S/A/B/C/D classiques (avec
// NIVEAU_COLORS), soit une liste personnalisée [{emoji, coreen, romanise,
// fr, desc}] stockée sur la tierlist, à laquelle on attribue une couleur
// de la palette générique dans l'ordre. `value` est ce qui est réellement
// stocké en base dans `tierlist_items.niveau` — on utilise le mot coréen
// comme identifiant pour les niveaux personnalisés (unique au sein d'un
// même modèle), et la lettre pour S/A/B/C/D.
function getNiveauxDeTierlist(niveauxPerso) {
  if (niveauxPerso && niveauxPerso.length > 0) {
    return niveauxPerso.map((n, i) => ({
      value: n.coreen,
      emoji: n.emoji || "",
      coreen: n.coreen,
      romanise: n.romanise || "",
      fr: n.fr || "",
      desc: n.desc || "",
      color: PALETTE_NIVEAUX_PERSO[i % PALETTE_NIVEAUX_PERSO.length],
    }));
  }
  return NIVEAUX.map((niv) => ({ value: niv, emoji: "", coreen: niv, romanise: "", fr: "", desc: "", color: NIVEAU_COLORS[niv] }));
}

// Génère le HTML interne d'un label de niveau : pour les niveaux
// personnalisés, emoji + coréen + romanisation, puis séparateur et
// traduction française ; pour S/A/B/C/D classiques, juste la lettre.
function niveauLabelHtml(niv) {
  if (!niv.romanise && !niv.fr) return esc(niv.coreen);
  return `
    ${niv.emoji ? `<span class="niveau-emoji">${esc(niv.emoji)}</span>` : ""}
    <span class="niveau-coreen">${esc(niv.coreen)}</span>
    ${niv.romanise ? `<span class="niveau-romanise">${esc(niv.romanise)}</span>` : ""}
    ${niv.fr ? `<span class="niveau-fr">${esc(niv.fr)}</span>` : ""}
  `;
}

/* ============================================================
   MODULE QUIZ QUOTIDIEN
   Questions générées depuis les dramas existants, une tentative/jour,
   points + bonus, leaderboard jour/semaine/mois.
   ============================================================ */

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

// ---- génération de questions à partir des données existantes ----
// Ces questions sont générées côté client à la demande (pas stockées
// par défaut, cf. note dans schema.sql sur les policies d'écriture de
// `questions`). Si vous voulez les persister pour que tout le monde
// ait le MÊME quiz un jour donné, il faut soit :
//  - les insérer manuellement une fois par jour dans l'éditeur SQL, soit
//  - ouvrir temporairement une policy INSERT authenticated sur `questions`
//    et appeler `genererEtSauvegarderQuizDuJour()` une fois.
function genererQuestionsDepuisCatalogue(entries, n) {
  n = n || 6;
  const candidats = entries.filter((d) => d.acteur || d.actrice || d.realisateur || d.scenariste);
  if (candidats.length < 4) return [];

  const shuffled = [...candidats].sort(() => Math.random() - 0.5);
  const questions = [];
  const typesUtilises = [];

  function pickWrongAnswers(correctValue, pool, count) {
    const wrongs = pool.filter((v) => v && v !== correctValue);
    const unique = Array.from(new Set(wrongs));
    const shuffled2 = unique.sort(() => Math.random() - 0.5);
    return shuffled2.slice(0, count);
  }

  for (const d of shuffled) {
    if (questions.length >= n) break;
    const typeRoll = Math.floor(Math.random() * 3);

    if (typeRoll === 0 && d.acteur) {
      const wrongs = pickWrongAnswers(d.acteur, entries.map((x) => x.acteur), 3);
      if (wrongs.length < 3) continue;
      const options = shuffleWithCorrect(d.acteur, wrongs);
      questions.push({
        texte: `Quel acteur a joué dans "${d.titre}" ?`,
        options: options.choices,
        bonne_reponse: options.correctIndex + 1,
        categorie: "casting",
      });
    } else if (typeRoll === 1 && d.annee) {
      const wrongAnnees = pickWrongAnswers(String(d.annee), entries.map((x) => String(x.annee)), 3);
      if (wrongAnnees.length < 3) continue;
      const options = shuffleWithCorrect(String(d.annee), wrongAnnees);
      questions.push({
        texte: `En quelle année est sorti "${d.titre}" ?`,
        options: options.choices,
        bonne_reponse: options.correctIndex + 1,
        categorie: "annee",
      });
    } else if (d.realisateur) {
      const wrongs = pickWrongAnswers(d.realisateur, entries.map((x) => x.realisateur), 3);
      if (wrongs.length < 3) continue;
      const options = shuffleWithCorrect(d.realisateur, wrongs);
      questions.push({
        texte: `Qui a réalisé "${d.titre}" ?`,
        options: options.choices,
        bonne_reponse: options.correctIndex + 1,
        categorie: "realisation",
      });
    }
  }
  return questions.slice(0, n);
}

// Persiste le quiz du jour en base, pour que TOUS les utilisateurs
// voient exactement les mêmes questions ce jour-là (au lieu d'un quiz
// généré indépendamment dans chaque navigateur, comme le fait le repli
// local de loadQuizDuJour()).
//
// Pré-requis : la table `questions` n'a aucune policy INSERT ouverte
// par défaut (cf. schema.sql) pour éviter que n'importe quel compte
// authentifié ne puisse écrire le quiz de tout le monde. Pour utiliser
// cette fonction vous devez donc, une fois :
//   1) Exécuter dans l'éditeur SQL Supabase :
//        create policy "Admin insere les questions du jour"
//          on public.questions for insert to authenticated
//          with check (true);
//   2) Appeler genererEtSauvegarderQuizDuJour() une fois par jour
//      (manuellement depuis la console du navigateur, ou via un appel
//      programmé), avec un compte authentifié.
//   3) Idéalement, retirer ensuite cette policy et migrer vers une
//      Edge Function planifiée (cron) utilisant la service_role key,
//      pour ne plus dépendre d'un compte utilisateur classique.
async function genererEtSauvegarderQuizDuJour(nombreDeQuestions) {
  const date = todayISO();

  // Évite d'écraser un quiz déjà généré aujourd'hui.
  const { data: existantes, error: errCheck } = await sb.from("questions").select("id").eq("date_quiz", date);
  if (errCheck) {
    console.error(errCheck);
    showToast("Impossible de vérifier le quiz existant.");
    return;
  }
  if (existantes && existantes.length > 0) {
    showToast(`Un quiz existe déjà pour le ${date} (${existantes.length} questions).`);
    return;
  }

  const questions = genererQuestionsDepuisCatalogue(state.entries, nombreDeQuestions || 6);
  if (questions.length === 0) {
    showToast("Pas assez de données dans le catalogue pour générer un quiz.");
    return;
  }

  const payload = questions.map((q) => ({
    texte: q.texte,
    choix1: q.options[0], choix2: q.options[1], choix3: q.options[2], choix4: q.options[3],
    bonne_reponse: q.bonne_reponse,
    categorie: q.categorie,
    date_quiz: date,
  }));

  try {
    const { error } = await sb.from("questions").insert(payload);
    if (error) throw error;
    showToast(`Quiz du ${date} enregistré (${payload.length} questions).`);
    await loadQuizDuJour();
    render();
  } catch (e) {
    console.error(e);
    showToast("Enregistrement du quiz impossible (policy INSERT manquante sur `questions` ?).");
  }
}

function shuffleWithCorrect(correctValue, wrongValues) {
  const all = [correctValue, ...wrongValues];
  // mélange Fisher-Yates simple
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return { choices: all, correctIndex: all.indexOf(correctValue) };
}

// ---- chargement du quiz du jour (depuis la table `questions`) ----
async function loadQuizDuJour() {
  try {
    const { data, error } = await sb.from("questions").select("*").eq("date_quiz", todayISO());
    if (error) throw error;
    if (data && data.length > 0) {
      state.questionsAujourdhui = data;
    } else {
      // Repli : génération à la volée côté client si rien n'est en base
      // pour aujourd'hui (cf. note ci-dessus sur la persistance).
      const generees = genererQuestionsDepuisCatalogue(state.entries, 6);
      state.questionsAujourdhui = generees.map((q, i) => ({
        id: `local-${todayISO()}-${i}`,
        texte: q.texte,
        choix1: q.options[0], choix2: q.options[1], choix3: q.options[2], choix4: q.options[3],
        bonne_reponse: q.bonne_reponse,
        categorie: q.categorie,
        date_quiz: todayISO(),
        _local: true, // ces questions ne peuvent pas être référencées par reponses_quiz (pas de vraie ligne en base)
      }));
    }
  } catch (e) {
    console.error("Erreur chargement quiz", e);
    state.questionsAujourdhui = [];
  }

  if (isLoggedIn()) {
    try {
      const { data, error } = await sb.from("scores_quiz").select("*").eq("user_id", currentUserId()).eq("date_quiz", todayISO()).maybeSingle();
      if (error) throw error;
      state.quizScoreDuJour = data || null;
    } catch (e) {
      state.quizScoreDuJour = null;
    }
  }
}

// Charge le détail des réponses données aujourd'hui, pour permettre de
// revoir bonne/mauvaise réponse après coup (sans pouvoir rejouer — la
// contrainte unique sur scores_quiz empêche toujours un 2e essai noté).
async function loadReponsesDuJour() {
  if (!isLoggedIn()) { state.quizReponsesDuJour = null; return; }
  const idsQuestionsDuJour = state.questionsAujourdhui.filter((q) => !q._local).map((q) => q.id);
  if (idsQuestionsDuJour.length === 0) { state.quizReponsesDuJour = []; return; }
  try {
    const { data, error } = await sb
      .from("reponses_quiz")
      .select("*")
      .eq("user_id", currentUserId())
      .in("question_id", idsQuestionsDuJour);
    if (error) throw error;
    state.quizReponsesDuJour = data || [];
  } catch (e) {
    console.error("Erreur chargement réponses du jour", e);
    state.quizReponsesDuJour = null;
  }
}

// ---- historique de tous les quiz passés ("Revoir mes réponses") ----
// Construit, pour chaque jour où l'utilisateur a joué (scores_quiz),
// le détail complet des questions/réponses/bonnes réponses, en
// joignant reponses_quiz -> questions côté client (questions.date_quiz
// permet de regrouper les réponses par jour).
async function ouvrirHistoriqueQuiz() {
  if (!isLoggedIn()) { showToast("Connecte-toi pour voir ton historique de quiz."); return; }
  setState({ historiqueQuizModal: { loading: true, quizPasses: [] } });
  try {
    const { data: scores, error: e1 } = await sb
      .from("scores_quiz")
      .select("*")
      .eq("user_id", currentUserId())
      .order("date_quiz", { ascending: false });
    if (e1) throw e1;

    const { data: mesReponses, error: e2 } = await sb
      .from("reponses_quiz")
      .select("*, questions(*)")
      .eq("user_id", currentUserId());
    if (e2) throw e2;

    const quizPasses = (scores || []).map((score) => {
      const reponsesDeCeJour = (mesReponses || []).filter((r) => r.questions && r.questions.date_quiz === score.date_quiz);
      return {
        date: score.date_quiz,
        score: score.score_total,
        bonnesReponses: score.bonnes_reponses,
        totalQuestions: score.total_questions,
        detailVisible: false,
        reponses: reponsesDeCeJour,
      };
    });
    setState({ historiqueQuizModal: { loading: false, quizPasses } });
  } catch (e) {
    console.error("Erreur chargement historique quiz", e);
    showToast("Impossible de charger ton historique de quiz.");
    setState({ historiqueQuizModal: null });
  }
}
function fermerHistoriqueQuiz() {
  setState({ historiqueQuizModal: null });
}
function toggleDetailQuizPasse(date) {
  if (!state.historiqueQuizModal) return;
  const quizPasses = state.historiqueQuizModal.quizPasses.map((q) =>
    q.date === date ? { ...q, detailVisible: !q.detailVisible } : q
  );
  setState({ historiqueQuizModal: { ...state.historiqueQuizModal, quizPasses } });
}

async function loadLeaderboardQuiz() {
  try {
    let dateMin;
    const now = new Date();
    if (state.leaderboardPeriode === "jour") {
      dateMin = todayISO();
    } else if (state.leaderboardPeriode === "semaine") {
      const d = new Date(now); d.setDate(d.getDate() - 7);
      dateMin = d.toISOString().slice(0, 10);
    } else {
      const d = new Date(now); d.setMonth(d.getMonth() - 1);
      dateMin = d.toISOString().slice(0, 10);
    }
    const { data, error } = await sb
      .from("scores_quiz")
      .select("*, profils(pseudo, avatar_url)")
      .gte("date_quiz", dateMin)
      .order("score_total", { ascending: false })
      .limit(20);
    if (error) throw error;
    state.leaderboardQuiz = data || [];
  } catch (e) {
    console.error(e);
    state.leaderboardQuiz = [];
  }
}

// ---- déroulement du quiz ----
function startQuiz() {
  if (state.quizScoreDuJour) { showToast("Tu as déjà fait le quiz d'aujourd'hui !"); return; }
  setState({ quizEnCours: true, quizIndex: 0, quizReponses: [], quizChoixActuel: null, quizTermine: false });
}

function answerQuizQuestion(choixIndex) {
  if (state.quizChoixActuel !== null) return; // déjà répondu, on attend la transition automatique
  const q = state.questionsAujourdhui[state.quizIndex];
  const correcte = choixIndex === q.bonne_reponse;
  state.quizReponses.push({ question_id: q.id, reponse_donnee: choixIndex, correcte, isLocal: !!q._local });
  setState({ quizChoixActuel: choixIndex });

  setTimeout(() => {
    if (state.quizIndex + 1 >= state.questionsAujourdhui.length) {
      finishQuiz();
    } else {
      setState({ quizIndex: state.quizIndex + 1, quizChoixActuel: null });
    }
  }, 1400);
}

async function finishQuiz() {
  const bonnes = state.quizReponses.filter((r) => r.correcte).length;
  const total = state.quizReponses.length;
  let score = bonnes * 10;
  if (bonnes === total && total > 0) score += 20; // bonus sans faute

  setState({ quizTermine: true, quizEnCours: false });

  if (!isLoggedIn()) {
    showToast(`Score : ${score} pts — connecte-toi pour l'enregistrer au classement !`);
    return;
  }

  try {
    const { data, error } = await sb.from("scores_quiz").upsert({
      user_id: currentUserId(),
      date_quiz: todayISO(),
      score_total: score,
      bonnes_reponses: bonnes,
      total_questions: total,
    }, { onConflict: "user_id,date_quiz" }).select().single();
    if (error) throw error;
    state.quizScoreDuJour = data;

    // Enregistre aussi le détail des réponses, pour l'historique
    // consultable ("Revoir mes réponses"). On ignore les questions
    // générées localement (pas de vraie ligne `questions` à
    // référencer — ne devrait plus arriver maintenant que le quiz du
    // jour est généré automatiquement en base, voir generer_quiz_du_jour()).
    const reponsesAEnregistrer = state.quizReponses.filter((r) => !r.isLocal);
    if (reponsesAEnregistrer.length > 0) {
      const { error: errReponses } = await sb.from("reponses_quiz").insert(
        reponsesAEnregistrer.map((r) => ({ user_id: currentUserId(), question_id: r.question_id, reponse_donnee: r.reponse_donnee }))
      );
      // Ne fait volontairement pas échouer tout le quiz si cette
      // insertion rate (le score, lui, est déjà bien enregistré) —
      // mais on le signale clairement dans la console plutôt que de
      // l'ignorer en silence comme avant, ce qui rendait le bug
      // invisible et empêchait tout historique de se construire.
      if (errReponses) console.error("Erreur enregistrement détail des réponses du quiz", errReponses);
    }
    showToast(`Quiz terminé : ${score} points !`);
    await loadLeaderboardQuiz();
    render();
  } catch (e) {
    console.error(e);
    showToast("Score calculé mais non enregistré (déjà joué aujourd'hui ?).");
    return; // on ne tente pas de cadeau si le score n'a pas pu être enregistré
  }
  // Volontairement HORS du try/catch ci-dessus, et déjà protégé par
  // son propre try/catch interne : voir le même commentaire dans
  // sauvegarderTierlistBuilder().
  await tenterGagnerCadeau("quiz");
}

// ---- rendu ----
function renderQuizView() {
  if (state.quizEnCours) return renderQuizEnCours();
  if (state.quizTermine) return renderQuizResultat();

  const dejaJoue = !!state.quizScoreDuJour;
  return `<div class="trends-wrap">
    <section class="tr-section">
      <h2 class="tr-title">Quiz du jour</h2>
      <div class="tr-highlight">
        <p class="tr-hc-names">${state.questionsAujourdhui.length} questions</p>
        <p class="tr-hc-detail">10 points par bonne réponse, +20 points bonus si tu fais un sans-faute.</p>
      </div>
      ${dejaJoue
        ? `<div class="tr-insight" style="margin-top:11px;">Tu as déjà joué aujourd'hui : <b>${state.quizScoreDuJour.score_total} points</b> (${state.quizScoreDuJour.bonnes_reponses}/${state.quizScoreDuJour.total_questions} bonnes réponses). Reviens demain pour un nouveau quiz !</div>
           <button class="ghost-btn" id="toggleQuizRecapBtn" style="width:100%; margin-top:10px;">${state.quizRecapVisible ? "Masquer mes réponses" : "👁 Revoir mes réponses"}</button>`
        : `<button class="primary-btn" id="startQuizBtn" style="width:100%; margin-top:14px;" ${state.questionsAujourdhui.length === 0 ? "disabled" : ""}>Commencer le quiz</button>`
      }

// ============================================================
// MODE ÉCOUTE — Lien direct vers la playlist Deezer
// ------------------------------------------------------------
// Le mode "widget intégré" (iframe avec liste masquée et minuteur)
// a été retiré : le widget.deezer.com appelle lui-même api.deezer.com
// en interne pour charger sa tracklist, et cet appel est bloqué par
// CORS (confirmé en conditions réelles, pas seulement en théorie).
// C'est une limitation du widget Deezer lui-même, hors de notre
// contrôle — pas un bug réparable côté app.
//
// À la place : un simple lien qui ouvre la playlist normalement sur
// Deezer (lecture complète, gratuite, sans jeu). Fiable à 100% car
// ça ne fait qu'ouvrir une page Deezer standard dans un nouvel onglet.
// ============================================================

function extractDeezerPlaylistId(lien) {
  const match = lien.match(/playlist\/(\d+)/);
  return match ? match[1] : null;
}

function ecouterPlaylistDeezer(lien) {
  const playlistId = extractDeezerPlaylistId(lien);
  if (!playlistId) {
    setState({ ostError: "Lien de playlist Deezer invalide. Format attendu : https://www.deezer.com/playlist/XXXXXXXXX" });
    return;
  }
  setState({ ostError: null });
  window.open(`https://www.deezer.com/playlist/${playlistId}`, "_blank", "noopener");
}

// Widget Deezer intégré, sans aucune option ajoutée (pas de
// tracklist=false, pas de minuteur) — version la plus simple
// possible, identique à celle que Deezer affiche sur sa propre page
// de génération de widget. Testé en conditions réelles avec le mode
// "widget + tracklist masquée + minuteur" précédent, qui a échoué par
// CORS : cette version minimale n'a pas encore été testée par nous —
// à vérifier directement dans l'app une fois ce code en place.
function chargerWidgetSimple(lien) {
  const playlistId = extractDeezerPlaylistId(lien);
  if (!playlistId) {
    setState({ ostError: "Lien de playlist Deezer invalide. Format attendu : https://www.deezer.com/playlist/XXXXXXXXX" });
    return;
  }
  setState({ ostError: null, widgetSimplePlaylistId: playlistId });
}

// ============================================================
// MINI-LECTEUR DEEZER FLOTTANT (persistant, ne coupe jamais le son)
// ------------------------------------------------------------
// Bouton replié sur le bord droit de l'écran, visible sur tous les
// onglets. Au clic, déplie un petit panneau avec le widget Deezer
// (contrôles play/pause natifs visibles dans l'iframe elle-même) et
// un champ pour changer de playlist.
//
// IMPORTANT : ce bloc ne doit JAMAIS être mis à jour par render(),
// sinon l'iframe serait détruite et recréée à chaque setState() (donc
// à chaque frappe ou changement d'onglet n'importe où dans l'app), ce
// qui couperait le son — exactement le problème signalé. On appelle
// donc renderDeezerMiniPlayer() séparément, uniquement après les
// actions qui le concernent vraiment (ouvrir/fermer, changer de
// playlist), jamais depuis setState()/render().
// ============================================================

function renderDeezerMiniPlayer() {
  const root = document.getElementById("deezer-mini-player");
  if (!root) return;
  const playlistId = state.miniPlayerPlaylistId || state.widgetSimplePlaylistId || OST_PLAYLIST_DEFAUT;
  root.innerHTML = `
    <button class="deezer-mini-tab" id="deezerMiniTabBtn" aria-label="${state.miniPlayerOpen ? "Fermer le lecteur" : "Ouvrir le lecteur de musique"}">
      <span>🎵</span>
    </button>
    <div class="deezer-mini-panel ${state.miniPlayerOpen ? "open" : ""}">
      <div class="deezer-mini-panel-header">
        <span>Écoute en fond</span>
        <button class="icon-btn" id="deezerMiniCloseBtn" aria-label="Réduire">✕</button>
      </div>
      <iframe title="deezer-mini-widget" src="https://widget.deezer.com/widget/dark/playlist/${playlistId}" width="100%" height="260" frameborder="0" allowtransparency="true" allow="encrypted-media; clipboard-write" style="border-radius:10px;"></iframe>
      <button class="text-btn" id="deezerMiniChangeBtn" style="margin-top:6px;">🔄 Changer de playlist</button>
      <div id="deezerMiniChangeBlock" style="display:${state.miniPlayerShowChange ? "block" : "none"};">
        <label style="display:flex; flex-direction:column; gap:5px; font-size:12px; color:var(--ink-soft); font-weight:500; margin-top:6px;">
          Lien playlist Deezer publique
          <input id="deezer-mini-lien-input" value="${esc(state.miniPlayerLienInput)}" placeholder="https://www.deezer.com/playlist/...">
        </label>
        <p id="deezerMiniErrorMsg" style="color:var(--seal); font-size:12px; margin-top:4px; ${state.miniPlayerError ? "" : "display:none;"}">${esc(state.miniPlayerError || "")}</p>
        <button class="primary-btn" id="deezerMiniLoadBtn" style="width:100%; margin-top:6px;">Charger cette playlist</button>
      </div>
    </div>
  `;
  attachDeezerMiniPlayerListeners();
}

function attachDeezerMiniPlayerListeners() {
  const tabBtn = document.getElementById("deezerMiniTabBtn");
  if (tabBtn) tabBtn.addEventListener("click", () => toggleDeezerMiniPlayer(!state.miniPlayerOpen));
  const closeBtn = document.getElementById("deezerMiniCloseBtn");
  if (closeBtn) closeBtn.addEventListener("click", () => toggleDeezerMiniPlayer(false));
  const changeBtn = document.getElementById("deezerMiniChangeBtn");
  if (changeBtn) {
    changeBtn.addEventListener("click", () => {
      state.miniPlayerShowChange = !state.miniPlayerShowChange;
      const block = document.getElementById("deezerMiniChangeBlock");
      if (block) block.style.display = state.miniPlayerShowChange ? "block" : "none";
    });
  }
  const lienInput = document.getElementById("deezer-mini-lien-input");
  if (lienInput) lienInput.addEventListener("input", (e) => { state.miniPlayerLienInput = e.target.value; });
  const loadBtn = document.getElementById("deezerMiniLoadBtn");
  if (loadBtn) {
    loadBtn.addEventListener("click", () => {
      const playlistId = extractDeezerPlaylistId(state.miniPlayerLienInput);
      const errorMsg = document.getElementById("deezerMiniErrorMsg");
      if (!playlistId) {
        state.miniPlayerError = "Lien de playlist Deezer invalide. Format attendu : https://www.deezer.com/playlist/XXXXXXXXX";
        if (errorMsg) { errorMsg.textContent = state.miniPlayerError; errorMsg.style.display = ""; }
        return;
      }
      state.miniPlayerError = null;
      state.miniPlayerPlaylistId = playlistId;
      state.miniPlayerShowChange = false;
      // Ici on change vraiment la playlist : l'iframe DOIT être
      // recréée avec la nouvelle src, donc renderDeezerMiniPlayer()
      // complet est légitime (et le seul cas où on l'appelle après
      // l'ouverture initiale).
      renderDeezerMiniPlayer();
    });
  }
}

// Ouvre/ferme le panneau SANS jamais toucher au HTML de l'iframe : on
// ne fait que basculer la classe CSS "open" sur le panneau déjà
// présent dans le DOM. Un renderDeezerMiniPlayer() complet ici
// détruirait l'iframe à chaque ouverture/fermeture et couperait le
// son — exactement ce qu'on veut éviter.
function toggleDeezerMiniPlayer(open) {
  state.miniPlayerOpen = open;
  const panel = document.querySelector(".deezer-mini-panel");
  const tabBtn = document.getElementById("deezerMiniTabBtn");
  if (panel) panel.classList.toggle("open", open);
  if (tabBtn) tabBtn.setAttribute("aria-label", open ? "Fermer le lecteur" : "Ouvrir le lecteur de musique");
}

// ============================================================
// MODE CORRESPONDANCE — Jeu de correspondance (sans audio)
// ------------------------------------------------------------
// Fonctionne entierement avec des donnees stockees nous-memes (zero
// dependance externe, zero risque de panne tierce). L'utilisateur
// voit le nom d'une chanson d'OST et devine le drama associe.
// ============================================================

// Jeu de donnees de demonstration — a remplacer par une vraie table
// `ost_titres` (chanson, drama_id) si vous retenez ce mode.
// Playlist Deezer publique affichée par défaut dans l'onglet "Écouter
// sur Deezer", modifiable via le bouton "Changer de playlist".
const OST_PLAYLIST_DEFAUT = "8954525442";

const OST_DEMO_DATA = [
  { chanson: "Stay With Me", artiste: "Chanyeol, Punch", drama: "Goblin" },
  { chanson: "Always", artiste: "Yoon Mi-rae", drama: "Descendants of the Sun" },
  { chanson: "Beautiful", artiste: "Crush", drama: "Goblin" },
  { chanson: "Can't Help Falling in Love", artiste: "Haily Cho", drama: "Crash Landing on You" },
  { chanson: "I Love You", artiste: "MAMAMOO (Wheein)", drama: "Hotel del Luna" },
  { chanson: "Carmen", artiste: "Diana Lee", drama: "Hotel del Luna" },
];

function genererQuestionsOstCorrespondance(data, n) {
  n = Math.min(n || 6, data.length);
  const shuffled = [...data].sort(() => Math.random() - 0.5).slice(0, n);
  return shuffled.map((item) => {
    const autres = data.filter((x) => x.drama !== item.drama).sort(() => Math.random() - 0.5).slice(0, 3);
    const { choices, correctIndex } = shuffleWithCorrect(item.drama, autres.map((a) => a.drama));
    return { item, choices, correctIndex };
  });
}

function startOstChallengeCorrespondance() {
  const questions = genererQuestionsOstCorrespondance(OST_DEMO_DATA, 6);
  setState({ ostQuestions: questions, ostEnCours: true, ostIndex: 0, ostScore: 0, ostTermine: false });
}

// ============================================================

async function answerOstQuestion(choixIndex) {
  const q = state.ostQuestions[state.ostIndex];
  const correct = choixIndex === q.correctIndex;
  if (correct) state.ostScore += 1;

  if (state.ostIndex + 1 >= state.ostQuestions.length) {
    await finishOstChallenge();
  } else {
    setState({ ostIndex: state.ostIndex + 1 });
  }
}

async function finishOstChallenge() {
  setState({ ostEnCours: false, ostTermine: true });
  if (!isLoggedIn()) {
    showToast(`Score : ${state.ostScore}/${state.ostQuestions.length || state.ostRoundsTotal} — connecte-toi pour l'enregistrer !`);
    return;
  }
  try {
    const { error } = await sb.from("scores_ost").insert([{
      user_id: currentUserId(),
      score: state.ostScore,
      mode: "solo",
    }]);
    if (error) throw error;
    await loadOstLeaderboard();
    render();
  } catch (e) {
    console.error(e);
    showToast("Score non enregistré.");
  }
}

async function loadOstLeaderboard() {
  try {
    const oneWeekAgo = new Date(); oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
    const { data, error } = await sb
      .from("scores_ost")
      .select("*, profils(pseudo, avatar_url)")
      .gte("date_partie", oneWeekAgo.toISOString())
      .order("score", { ascending: false })
      .limit(20);
    if (error) throw error;
    state.ostLeaderboard = data || [];
  } catch (e) {
    console.error(e);
    state.ostLeaderboard = [];
  }
}

// Construit castingSelection à partir de personnes_liees (ajouté par
// enrichirDramasAvecPersonnes en étape 1), trié par ordre de saisie.
function castingSelectionDepuisDrama(d) {
  const liens = (d.personnes_liees || []).slice().sort((a, b) => a.ordre - b.ordre);
  const parRole = (role) => liens.filter((l) => l.role === role).map((l) => ({ id: l.id, nom: l.nom }));
  return {
    acteur: parRole("acteur"),
    actrice: parRole("actrice"),
    scenariste: parRole("scenariste"),
    realisateur: parRole("realisateur"),
  };
}
// Convertit le casting texte renvoyé par TMDB (chargerDetailsTmdb,
// un nom pour acteur/actrice, plusieurs noms séparés par virgule pour
// scenariste/realisateur) en castingSelection structuré, en
// retrouvant l'id existant dans state.people si le nom correspond
// déjà à une personne connue (id null sinon, créée à l'enregistrement
// du drama — voir synchroniserCastingDrama).
function castingSelectionDepuisTexteTmdb(details) {
  const resoudre = (nom, role) => {
    const existante = state.people.find((p) => p.role === role && p.nom.toLowerCase() === nom.toLowerCase());
    // Si une correspondance existe déjà en base, on garde SON nom
    // (casse/orthographe potentiellement déjà corrigée via la fiche
    // personne) plutôt que la graphie brute renvoyée par TMDB.
    return existante ? { id: existante.id, nom: existante.nom } : { id: null, nom };
  };
  return {
    acteur: details.acteur ? [resoudre(details.acteur, "acteur")] : [],
    actrice: details.actrice ? [resoudre(details.actrice, "actrice")] : [],
    scenariste: splitPeople(details.scenariste).map((n) => resoudre(n, "scenariste")),
    realisateur: splitPeople(details.realisateur).map((n) => resoudre(n, "realisateur")),
  };
}

// ---- sélecteur de casting (personnes liées à un drama, par rôle) ----

// Ajoute une personne (existante : {id, nom}, ou nouvelle : {id: null,
// nom}) au rôle donné dans le brouillon en cours, et vide la recherche
// de ce rôle. Empêche les doublons dans la même sélection.
function ajouterPersonneAuCasting(role, personne) {
  const liste = state.draft.castingSelection[role] || [];
  const dejaPresent = personne.id
    ? liste.some((p) => p.id === personne.id)
    : liste.some((p) => p.nom.toLowerCase() === personne.nom.toLowerCase());
  if (dejaPresent) {
    setState({ castingSearchQuery: { ...state.castingSearchQuery, [role]: "" } });
    return;
  }
  setState({
    draft: { ...state.draft, castingSelection: { ...state.draft.castingSelection, [role]: [...liste, personne] } },
    castingSearchQuery: { ...state.castingSearchQuery, [role]: "" },
  });
}

function retirerPersonneDuCasting(role, index) {
  const liste = state.draft.castingSelection[role] || [];
  setState({
    draft: { ...state.draft, castingSelection: { ...state.draft.castingSelection, [role]: liste.filter((_, i) => i !== index) } },
  });
}

// Attache les listeners click sur les boutons de résultats/création
// d'un sélecteur de casting donné, après une mise à jour en DOM direct

// l'appel dans attachListeners()).
function attachCastingResultListeners(wrapper) {

    });
  });
}

// Rend un sélecteur de casting pour un rôle donné : puces déjà
// sélectionnées + champ de recherche parmi les personnes existantes de

        .slice(0, 6);

  return `<div class="field-label-wrap casting-selector" data-casting-role="${role}" data-casting-label="${esc(label)}">
    <span class="field-label">${esc(label)}</span>
    ${selection.length > 0 ? `<div class="casting-chips">
      ${selection.map((p, i) => `<span class="casting-chip">${esc(p.nom)}${!p.id ? ` <em>(nouveau)</em>` : ""}<button type="button" data-casting-remove="${role}:${i}" aria-label="Retirer">✕</button></span>`).join("")}
    </div>` : ""}
    <input class="casting-search-input" data-casting-search="${role}" value="${esc(state.castingSearchQuery[role] || "")}" placeholder="Chercher ou ajouter ${esc(label.toLowerCase())}...">
    ${q.length > 0 ? `<div class="casting-results">
      ${resultats.map((p) => `<button type="button" class="casting-result" data-casting-pick="${role}" data-casting-pick-id="${esc(p.id)}" data-casting-pick-nom="${esc(p.nom)}">${esc(p.nom)}</button>`).join("")}

// Synchronise drama_personnes avec castingSelection du brouillon en
// cours : crée les personnes nouvelles (id null) si besoin, puis
// remplace entièrement les liens existants de ce drama par la
// sélection actuelle (plus simple et plus sûr qu'un diff incrémental).
async function synchroniserCastingDrama(dramaId, castingSelection) {
  const roles = ["acteur", "actrice", "scenariste", "realisateur"];

  // 1) Créer les personnes qui n'ont pas encore d'id (nouvelles,
  // ajoutées via "+ Créer ..."). onConflict: "nom,role" couvre le cas
  // rare où la même personne aurait été créée entre-temps ailleurs.
  for (const role of roles) {
    const liste = castingSelection[role] || [];
    for (let i = 0; i < liste.length; i++) {
      const p = liste[i];
      if (p.id) continue;
      const { data: créée, error } = await sb
        .from("personnes")
        .upsert({ nom: p.nom.trim(), role }, { onConflict: "nom,role" })
        .select()
        .single();
      if (error) throw error;
      liste[i] = { id: créée.id, nom: créée.nom };
    }
  }

  // 2) Remplace tous les liens existants de ce drama par la sélection
  // actuelle (suppression puis insertion, dans une suite d'appels
  // séquentiels — pas de transaction multi-requêtes possible via le
  // client JS Supabase, mais l'ordre delete-puis-insert limite le
  // risque d'incohérence visible).
  const { error: errDelete } = await sb.from("drama_personnes").delete().eq("drama_id", dramaId);
  if (errDelete) throw errDelete;

  const lignes = [];
  roles.forEach((role) => {
    (castingSelection[role] || []).forEach((p, ordre) => {
      if (p.id) lignes.push({ drama_id: dramaId, personne_id: p.id, role, ordre });
    });
  });
  if (lignes.length > 0) {
    const { error: errInsert } = await sb.from("drama_personnes").insert(lignes);
    if (errInsert) throw errInsert;
  }
}

async function saveDraft() {
  if (!isLoggedIn()) { showToast("Connecte-toi pour ajouter un drama à ta liste."); return; }
  const d = state.draft;
  if (!d.titre.trim()) { showToast("Le titre est obligatoire."); return; }

  if (!state.editingId && !state.confirmDuplicateAdd) {
    const normalized = d.titre.trim().toLowerCase();
    const duplicate = state.entries.find((e) => e.titre.trim().toLowerCase() === normalized);
    if (duplicate) {
      state.confirmDuplicateAdd = true;
      showToast(`"${duplicate.titre}" existe déjà dans le catalogue — touche "Ajouter" à nouveau pour confirmer et l'ajouter à ta liste quand même.`);
      return;
    }
  }

  // Métadonnées factuelles : vivent dans le catalogue commun `dramas`.
  // Les colonnes texte acteur/actrice/scenariste/realisateur ne sont
  // PLUS écrites ici : le casting est désormais géré exclusivement via
  // castingSelection -> drama_personnes (synchroniserCastingDrama, ci-
  // dessous). Ces colonnes restent en base, gelées à leur dernière
  // valeur connue, comme filet de sécurité temporaire.
  const metadonnees = {
    titre: d.titre.trim(),
    titre_kr: d.titre_kr.trim() || null,
    annee: d.annee === "" ? null : Number(d.annee),
    episodes: d.episodes === "" ? null : Number(d.episodes),
    duree: d.duree === "" ? null : Number(d.duree),
    poster_url: d.poster_url || null,
  };
  // Données personnelles : vivent dans `mes_visionnages`.
  const noteValue = d.note === "" ? null : Number(d.note);
  const dateValue = d.date_visionnage || null;

  try {
    let dramaId = state.editingId;

    if (dramaId) {
      // Le drama existe déjà dans le catalogue : on met à jour ses métadonnées.
      const { error } = await sb.from("dramas").update(metadonnees).eq("id", dramaId);
      if (error) throw error;
    } else {
      // Nouveau titre : on l'ajoute au catalogue commun.
      const { data: inserted, error } = await sb.from("dramas").insert([metadonnees]).select().single();
      if (error) throw error;
      dramaId = inserted.id;
    }

    await synchroniserCastingDrama(dramaId, d.castingSelection);

    // Mon visionnage personnel : upsert sur (user_id, drama_id).
    const { error: errVisionnage } = await sb.from("mes_visionnages").upsert({
      user_id: currentUserId(),
      drama_id: dramaId,
      note: noteValue,
      date_visionnage: dateValue,
    }, { onConflict: "user_id,drama_id" });
    if (errVisionnage) throw errVisionnage;

    showToast(state.editingId ? "Modifications enregistrées." : "Drama ajouté à ta liste.");
    await loadData();
    closeForm();
  } catch (e) {
    console.error(e);
    showToast("Sauvegarde impossible.");
  }
}

/* ============================================================
   MODULE TMDB — recherche de casting + import en masse de k-dramas
   ------------------------------------------------------------
   TMDB (The Movie Database) a une API gratuite avec clé personnelle.
   Contrairement à Deezer, le preflight CORS de TMDB renvoie
   Access-Control-Allow-Origin: * pour les requêtes simples — vérifié
   via la documentation publique, mais PAS testé directement par moi
   en conditions réelles (mon environnement de développement n'a pas
   accès à api.themoviedb.org). Si vous rencontrez une erreur CORS au
   premier essai, ce point précis est à vérifier en priorité.

   La clé API TMDB est personnelle et gratuite : créez un compte sur
   themoviedb.org puis Paramètres → API → demander une clé (v3).
   Elle est stockée uniquement dans le navigateur (localStorage), pas
   en base de données — elle n'est donc jamais partagée entre
   utilisateurs ni exposée publiquement.
   ============================================================ */

const TMDB_KEY_STORAGE = "kdrama_tmdb_api_key";

function getTmdbApiKey() {
  return localStorage.getItem(TMDB_KEY_STORAGE) || "";
}
function setTmdbApiKey(key) {
  if (key) localStorage.setItem(TMDB_KEY_STORAGE, key);
  else localStorage.removeItem(TMDB_KEY_STORAGE);
}

function demanderCleTmdbSiAbsente() {
  if (getTmdbApiKey()) return true;
  setState({ showTmdbKeyModal: true });
  return false;
}

// ---- recherche TMDB pour pré-remplir le formulaire d'un drama ----
async function rechercherSurTmdb(titre) {
  if (!titre || !titre.trim()) { showToast("Indique d'abord un titre."); return; }
  if (!demanderCleTmdbSiAbsente()) return;
  const apiKey = getTmdbApiKey();

  setState({ tmdbSearchLoading: true });
  try {
    const url = `https://api.themoviedb.org/3/search/tv?api_key=${apiKey}&query=${encodeURIComponent(titre.trim())}&language=fr-FR`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.results || data.results.length === 0) {
      showToast("Aucun résultat TMDB pour ce titre.");
      setState({ tmdbSearchLoading: false });
      return;
    }
    setState({ tmdbSearchResults: data.results.slice(0, 5), tmdbSearchLoading: false });
  } catch (e) {
    console.error(e);
    showToast("Recherche TMDB impossible (clé invalide, ou problème CORS — voir commentaire dans le code).");
    setState({ tmdbSearchLoading: false });
  }
}

// ---- récupère casting + réalisateur pour une série TMDB précise ----
async function chargerDetailsTmdb(tvId) {
  const apiKey = getTmdbApiKey();
  try {
    const url = `https://api.themoviedb.org/3/tv/${tvId}?api_key=${apiKey}&language=fr-FR&append_to_response=aggregate_credits`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    const credits = data.aggregate_credits || { cast: [], crew: [] };
    // TMDB ne distingue pas acteur/actrice par genre de façon fiable
    // sur toutes les fiches ; on prend les deux premiers rôles
    // principaux peu importe le genre, et on les répartit dans les
    // champs acteur/actrice du formulaire existant (vous pourrez
    // toujours corriger à la main si l'ordre ne convient pas).
    const castingPrincipal = (credits.cast || []).slice(0, 2);
    const realisateurs = (credits.crew || []).filter((c) => (c.jobs || []).some((j) => j.job === "Director" || j.job === "Series Directing"));
    const scenaristes = (credits.crew || []).filter((c) => (c.jobs || []).some((j) => j.job === "Writer" || j.job === "Screenplay" || j.job === "Story"));

    return {
      titre: data.name,
      titre_kr: data.original_name !== data.name ? data.original_name : "",
      annee: data.first_air_date ? Number(data.first_air_date.slice(0, 4)) : "",
      acteur: castingPrincipal[0] ? castingPrincipal[0].name : "",
      actrice: castingPrincipal[1] ? castingPrincipal[1].name : "",
      realisateur: realisateurs.map((r) => r.name).join(", "),
      scenariste: scenaristes.map((s) => s.name).join(", "),
      episodes: data.number_of_episodes || "",
      poster_url: data.poster_path ? `https://image.tmdb.org/t/p/w500${data.poster_path}` : "",
    };
  } catch (e) {
    console.error(e);
    showToast("Détails TMDB impossibles à charger.");
    return null;
  }
}

async function appliquerResultatTmdb(tvId, cible) {
  showToast("Récupération du casting…");
  const details = await chargerDetailsTmdb(tvId);
  if (!details) return;

  if (cible === "drama") {
    // Le formulaire drama n'utilise plus les champs texte
    // acteur/actrice/scenariste/realisateur (remplacés par
    // castingSelection, voir l'étape 3 de la refonte personnes) — on
    // alimente donc castingSelection, en plus des autres champs
    // (titre, année, poster...) qui restent du texte simple.
    const { acteur, actrice, scenariste, realisateur, ...autresChamps } = details;
    updateDraft({ ...autresChamps, castingSelection: castingSelectionDepuisTexteTmdb(details) });
  } else if (cible === "avoir") {
    updateAVoirDraft({ ...details, resume: state.aVoirDraft.resume });
  }
  setState({ tmdbSearchResults: [] });
  showToast("Casting récupéré depuis TMDB — vérifie et corrige si besoin.");
}

// ---- import en masse depuis TMDB (catalogue de départ) ----
// S'exécute dans VOTRE navigateur (pas depuis mon environnement de
// développement, qui n'a pas accès à api.themoviedb.org) : vous voyez
// directement si la clé et le réseau fonctionnent.
async function importerCatalogueTmdb(nombrePages) {
  if (!demanderCleTmdbSiAbsente()) return;
  if (!isLoggedIn()) { showToast("Connecte-toi pour importer dans le catalogue."); return; }
  const apiKey = getTmdbApiKey();
  nombrePages = nombrePages || 2;

  setState({ tmdbImportEnCours: true, tmdbImportProgress: 0, tmdbImportTotal: 0 });
  try {
    let tousLesResultats = [];
    for (let page = 1; page <= nombrePages; page++) {
      const url = `https://api.themoviedb.org/3/discover/tv?api_key=${apiKey}&language=fr-FR&sort_by=popularity.desc&with_origin_country=KR&with_original_language=ko&page=${page}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      tousLesResultats = tousLesResultats.concat(data.results || []);
    }

    // Évite de réimporter un titre déjà présent dans le catalogue.
    const titresExistants = new Set(state.entries.map((d) => d.titre.trim().toLowerCase()));
    const nouveaux = tousLesResultats.filter((r) => !titresExistants.has((r.name || "").trim().toLowerCase()));

    setState({ tmdbImportTotal: nouveaux.length });
    let importes = 0;
    for (const serie of nouveaux) {
      const details = await chargerDetailsTmdb(serie.id);
      if (details && details.titre) {
        try {
          // Métadonnées factuelles seules dans "dramas" — le casting
          // est désormais géré via drama_personnes (synchroniserCastingDrama),
          // pas via les colonnes texte acteur/actrice/scenariste/realisateur
          // (gelées, voir l'étape 3 de la refonte personnes).
          const { data: inserted, error } = await sb.from("dramas").insert([{
            titre: details.titre,
            titre_kr: details.titre_kr || null,
            annee: details.annee || null,
            episodes: details.episodes || null,
            poster_url: details.poster_url || null,
          }]).select().single();
          if (error) throw error;
          await synchroniserCastingDrama(inserted.id, castingSelectionDepuisTexteTmdb(details));
          importes++;
        } catch (e) {
          console.error("Erreur import", serie.name, e);
        }
      }
      setState({ tmdbImportProgress: importes });
    }
    showToast(`${importes} dramas importés depuis TMDB.`);
    await loadData();
  } catch (e) {
    console.error(e);
    showToast("Import TMDB impossible (clé invalide, ou problème réseau/CORS).");
  } finally {
    setState({ tmdbImportEnCours: false });
  }
}

// Enregistre une correction de nom et/ou de rôle sur une fiche
// personne existante (identifiée par son id). Met à jour "personnes",
// puis "drama_personnes" (qui duplique le rôle pour faciliter les
// requêtes), et recharge les données pour que la correction se
// propage immédiatement partout dans l'app (fiche drama, tendances,
// quiz...) — c'est tout l'intérêt d'avoir un id stable plutôt que du
// texte dupliqué.
async function enregistrerModificationPersonne() {
  const draft = state.editingPersonneDraft;
  if (!draft || !draft.id) return;
  const nom = (draft.nom || "").trim();
  if (!nom) {
    setState({ editingPersonneError: "Le nom ne peut pas être vide." });
    return;
  }
  setState({ imageProcessing: true, editingPersonneError: null });
  try {
    const { error: e1 } = await sb.from("personnes").update({ nom, role: draft.role }).eq("id", draft.id);
    if (e1) {
      // Conflit probable : (nom, role) existe déjà pour une autre
      // personne (contrainte unique). On affiche un message clair
      // plutôt que de laisser planter silencieusement.
      if (String(e1.message || "").toLowerCase().includes("duplicate") || e1.code === "23505") {
        throw new Error(`Une personne nommée "${nom}" existe déjà avec le rôle "${roleLabel(draft.role)}".`);
      }
      throw e1;
    }
    // drama_personnes.role est redondant avec personnes.role (pour
    // simplifier certaines requêtes) : on le resynchronise si le rôle
    // a changé.
    const { error: e2 } = await sb.from("drama_personnes").update({ role: draft.role }).eq("personne_id", draft.id);
    if (e2) throw e2;

    // Recharge les données nécessaires pour que la correction soit
    // visible immédiatement, sans recharger toute la page.
    const { data: people } = await sb.from("personnes").select("*");
    state.people = people || [];
    await chargerDramaPersonnes();
    const { data: dramasFraisData } = await sb.from("dramas").select("*").order("created_at", { ascending: true });
    state.entries = enrichirDramasAvecPersonnes(dramasFraisData || []);
    if (isLoggedIn()) await chargerMesVisionnages();

    setState({
      editingPersonneDraft: null,
      editingPersonneError: null,
      imageProcessing: false,
      personModal: { nom, role: draft.role },
    });
    showToast("Fiche mise à jour.");
  } catch (e) {
    console.error("Erreur modification personne", e);
    setState({ editingPersonneError: e.message || "Échec de la modification.", imageProcessing: false });
  }
}

// ============== FILTER / SORT ==============
function getFilteredEntries() {
  let list = isLoggedIn() ? state.mesEntries : state.entries;
  const q = state.query.trim().toLowerCase();
  if (q) {
    list = list.filter((d) => [d.titre, d.titre_kr, d.acteur, d.actrice, d.scenariste, d.realisateur].filter(Boolean).some((f) => String(f).toLowerCase().includes(q)));
  }
  if (state.filterDecade) {
    const decade = Number(state.filterDecade);
    list = list.filter((d) => d.annee && Number(d.annee) >= decade && Number(d.annee) < decade + 10);
  }
  if (state.filterMinNote) {
    const minN = Number(state.filterMinNote);
    list = list.filter((d) => d.note !== null && d.note !== undefined && Number(d.note) >= minN);
  }
  if (state.filterScenariste) {
    list = list.filter((d) => (d.scenariste || "").toLowerCase().includes(state.filterScenariste.toLowerCase()));
  }
  const byNum = (a, b, key, dir) => {
    const av = a[key] === null || a[key] === undefined || a[key] === "" ? -Infinity : Number(a[key]);
    const bv = b[key] === null || b[key] === undefined || b[key] === "" ? -Infinity : Number(b[key]);
    return dir === "asc" ? av - bv : bv - av;
  };
  const sorted = [...list];
  switch (state.sortBy) {
    case "note-desc": sorted.sort((a, b) => byNum(a, b, "note", "desc")); break;
    case "note-asc": sorted.sort((a, b) => byNum(a, b, "note", "asc")); break;
    case "annee-desc": sorted.sort((a, b) => byNum(a, b, "annee", "desc")); break;
    case "annee-asc": sorted.sort((a, b) => byNum(a, b, "annee", "asc")); break;
    case "az": sorted.sort((a, b) => a.titre.localeCompare(b.titre)); break;
  }
  return sorted;
}

function getAvailableDecades() {
  const source = isLoggedIn() ? state.mesEntries : state.entries;
  const years = source.map((d) => d.annee).filter(Boolean);
  const decades = new Set(years.map((y) => Math.floor(Number(y) / 10) * 10));
  return Array.from(decades).sort((a, b) => b - a);
}

function getStats() {
  const source = isLoggedIn() ? state.mesEntries : state.entries;
  const rated = source.filter((d) => d.note !== null && d.note !== undefined && d.note !== "");
  const avg = rated.length ? rated.reduce((s, d) => s + Number(d.note), 0) / rated.length : 0;
  const totalMin = source.reduce((s, d) => s + (Number(d.episodes) || 0) * (Number(d.duree) || 0), 0);
  return { count: source.length, avg, totalMin };
}

        ${state.tmdbImportEnCours ? `Import en cours… (${state.tmdbImportProgress}/${state.tmdbImportTotal})` : "📥 Importer des k-dramas populaires depuis TMDB"}
      </button>
    </div>` : ""}
  </div>` : ""}
  <main class="kt-list">`;

  if (filtered.length === 0) {
    html += connecte
      ? `<div class="empty-state"><p>Aucun résultat. Essaie un autre mot, ou ajoute ce drama toi-même.</p></div>`
      : `<div class="empty-state"><p>Aucun résultat dans le catalogue.</p></div>`;
    html += `</main>`;
    return html;
  }

  if (state.viewMode === "grille") {
    html += `</main>` + renderGridContent(filtered);
    return html;
  }

  filtered.forEach((d) => {
    const isOpen = state.expandedId === d.id;
    // Note affichée : la mienne si connecté (déjà dans d.note via mesEntries),
    // sinon la note de référence moyenne du catalogue commun.
    const noteAffichee = connecte ? d.note : getNoteReference(d.id);
    html += `<article class="drama-card ${isOpen ? "is-open" : ""}" data-card-id="${esc(d.id)}">
      <div class="card-row">
        ${d.poster_url ? `<img src="${esc(d.poster_url)}" alt="" class="poster-thumb">` : stampHtml(noteAffichee, false)}
        <div class="card-main">
          <h2>${esc(d.titre)}${d.annee ? `<span class="year"> · ${esc(d.annee)}</span>` : ""}</h2>
          ${d.titre_kr ? `<p class="kr">${esc(d.titre_kr)}</p>` : ""}
          <p class="cast" data-stop-propagation="1">${[castingLinksHtml(d.acteur, "acteur"), castingLinksHtml(d.actrice, "actrice")].filter(Boolean).join("  ·  ") || "Casting non renseigné"}</p>
        </div>
        ${d.poster_url ? stampHtml(noteAffichee, true) : ""}
        <span class="chevron ${isOpen ? "rot" : ""}">▾</span>
      </div>
      ${isOpen ? `
      <div class="card-detail" data-stop-propagation="1">
        ${d.poster_url ? `<img src="${esc(d.poster_url)}" alt="" class="poster-full">` : ""}
        <dl>
          <div><dt>Scénariste</dt><dd>${castingLinksHtml(d.scenariste, "scenariste") || "—"}</dd></div>
          <div><dt>Réalisateur</dt><dd>${castingLinksHtml(d.realisateur, "realisateur") || "—"}</dd></div>
          <div><dt>Épisodes</dt><dd>${d.episodes ? `${esc(d.episodes)} × ${esc(d.duree ?? "?")} min` : "—"}</dd></div>
          ${connecte && d.date_visionnage ? `<div><dt>Vu le</dt><dd>${esc(formatDateFr(d.date_visionnage))}</dd></div>` : ""}
          ${!connecte ? `<div><dt>Vu par</dt><dd>${getNombreVus(d.id)} personne${getNombreVus(d.id) === 1 ? "" : "s"}</dd></div>` : ""}
        </dl>
        <div class="card-actions">
          ${connecte ? `
            <button class="text-btn" data-edit-id="${esc(d.id)}">✎ Modifier</button>
            <button class="text-btn" data-share-id="${esc(d.id)}">🔗 Partager</button>
            ${state.confirmDeleteId === d.id
              ? `<button class="text-btn danger confirm" data-confirm-delete-id="${esc(d.id)}">✓ Confirmer la suppression</button>`
              : `<button class="text-btn danger" data-ask-delete-id="${esc(d.id)}">🗑 Supprimer</button>`}
          ` : `
            <button class="text-btn" data-goto-auth-card="1" style="color:var(--seal); font-weight:600;">🔑 Connecte-toi pour le noter</button>
          `}
        </div>
      </div>` : ""}
    </article>`;
  });

  html += `</main>`;
  return html;
}

function renderGridContent(filtered) {
  const connecte = isLoggedIn();
  return `<div class="kt-grid">
    ${filtered.map((d) => `
      <div class="grid-cell" data-grid-id="${esc(d.id)}">
        ${d.poster_url ? `<img src="${esc(d.poster_url)}" alt="" class="grid-poster">` : `<div class="grid-poster grid-poster-empty motif-flower">${FLOWER_MOTIF_SVG}</div>`}
        <div class="grid-stamp">${stampHtml(connecte ? d.note : getNoteReference(d.id), true)}</div>
        <p class="grid-title">${esc(d.titre)}</p>
      </div>`).join("")}
  </div>`;
}

function formatDateFr(isoDate) {
  if (!isoDate) return "";
  const [y, m, d] = isoDate.split("-");
  const mois = ["janv.", "févr.", "mars", "avr.", "mai", "juin", "juil.", "août", "sept.", "oct.", "nov.", "déc."];
  return `${Number(d)} ${mois[Number(m) - 1]} ${y}`;
}

function renderYearDramaList(year) {
  const dramasOfYear = state.mesEntries.filter((d) => Number(d.annee) === Number(year));
  if (dramasOfYear.length === 0) return "";
  return `<div class="tr-year-list" id="tr-year-list-${esc(year)}">
    <p class="tr-subhead">Titres de ${year}</p>
    ${dramasOfYear.map((d) => `
      <div class="tr-person-row" data-drama-titre="${esc(d.titre)}">
        ${d.poster_url ? `<img src="${esc(d.poster_url)}" class="tr-person-avatar">` : `<span class="tr-rank motif-flower" style="width:24px;height:24px;">${FLOWER_MOTIF_SVG}</span>`}
        <div class="tr-person-info">
          <p class="tr-person-name">${esc(d.titre)}</p>
          <p class="tr-person-sub" data-stop-propagation="1">${[castingLinksHtml(d.acteur, "acteur"), castingLinksHtml(d.actrice, "actrice")].filter(Boolean).join(" · ")}</p>
        </div>
        <span class="tr-person-score">${fmtNote(d.note)}</span>
      </div>`).join("")}
  </div>`;
}

  { id: "tr-sec-extremes", label: "Les extrêmes" },

  { id: "tr-sec-valeurs-sures", label: "Les valeurs sûres" },

  { id: "tr-sec-duos", label: "Duos à l'écran" },
  { id: "tr-sec-reguliers", label: "Réguliers vs imprévisibles" },

  { id: "tr-sec-formats", label: "Formats" },

];

function renderTrendsNavDrawer() {
  if (state.activeTab !== "tendances" || !isLoggedIn()) return "";
  const trends = computeTrends(state.mesEntries);
  if (!trends || !trends.records) return "";
  const topRecurring = trends.recurringCollabs[0] || null;
  const sectionsPresentes = TRENDS_SECTIONS.filter((s) => {
    if (s.id === "tr-sec-collab-repetee") return !!topRecurring;
    if (s.id === "tr-sec-duos") return trends.actingDuos.length > 0;
    if (s.id === "tr-sec-habitudes") return !!(trends.viewingStats && trends.viewingStats.busiestMonthName);
    if (s.id === "tr-sec-rendement") return trends.efficiency.length > 0;
    return true;
  });
  return `
    <button class="trends-nav-tab" id="trendsNavTabBtn" aria-label="Ouvrir le sommaire des tendances">
      <span class="motif-flower" style="width:16px;height:16px;display:block;">${FLOWER_MOTIF_SVG}</span>
      <span>›</span>
    </button>
    ${state.trendsNavOpen ? `
    <div class="trends-nav-overlay" id="trendsNavOverlay">
      <nav class="trends-nav-drawer" id="trendsNavDrawer">
        <p class="trends-nav-title">Aller à…</p>
        ${sectionsPresentes.map((s) => `<button class="trends-nav-link" data-trends-nav-target="${s.id}">${esc(s.label)}</button>`).join("")}
      </nav>
    </div>` : ""}
  `;
}

function attachTrendsNavDrawerListeners() {
  const tabBtn = document.getElementById("trendsNavTabBtn");
  if (tabBtn) tabBtn.addEventListener("click", () => setState({ trendsNavOpen: true }));

  const overlay = document.getElementById("trendsNavOverlay");
  if (overlay) overlay.addEventListener("click", (e) => { if (e.target === overlay) setState({ trendsNavOpen: false }); });

  document.querySelectorAll("[data-trends-nav-target]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const targetId = btn.dataset.trendsNavTarget;
      setState({ trendsNavOpen: false });
      requestAnimationFrame(() => {
        const el = document.getElementById(targetId);
        const header = document.querySelector(".app-header");
        if (!el) return;
        const headerH = header ? header.getBoundingClientRect().height : 0;
        const targetY = el.getBoundingClientRect().top + window.scrollY - headerH - 10;
        window.scrollTo({ top: Math.max(0, targetY), behavior: "smooth" });
      });
    });
  });
}

 // Build a one-line personal taste sentence from available signals.
const tasteParts = [];

        <div class="tr-record" data-drama-titre="${esc(records.oldest?.titre)}"><p class="tr-rk-label">Le plus ancien</p><p class="tr-rk-title">${esc(records.oldest?.titre)}</p><p class="tr-rk-meta">${esc(records.oldest?.annee)}</p></div>

        <div class="tr-eff-row" data-drama-titre="${esc(e.titre)}">

          <div class="tr-person-info"><p class="tr-person-name">${esc(e.titre)}</p><p class="tr-person-sub">${fmtNote(e.note)}/10 · ${e.total_min} min</p></div>
          <span class="tr-eff-score">${e.score.toFixed(1)}</span>
        </div>`).join("")}
    </section>` : ""}

    ${viewingStats && viewingStats.busiestMonthName ? `
    <section class="tr-section" id="tr-sec-habitudes">
      <h2 class="tr-title">Tes habitudes</h2>
      <div class="tr-insight">Sur ${viewingStats.totalWithDate} titres avec une date de visionnage renseignée, c'est en <b>${viewingStats.busiestMonthName}</b> que tu regardes le plus de dramas (${viewingStats.busiestMonthCount} titre${viewingStats.busiestMonthCount > 1 ? "s" : ""}).</div>
    </section>` : ""}
  </div>`;

  return html;
}

function renderAVoirView() {
  const connecte = isLoggedIn();
  const liste = connecte ? state.aVoir : state.aVoirCatalogue;

  let html = `<main class="kt-list">`;
  html += connecte
    ? `<p class="tr-note" style="padding:0 16px 4px;">Les dramas que tu veux regarder. Marque-les comme vus une fois terminés pour leur donner une note dans Ma liste.</p>`
    : `<div style="padding:0 16px 4px;"><div class="tr-insight" style="margin:0;">📖 Catalogue commun de suggestions. <button class="text-btn" id="goToAuthFromAVoirBtn" style="display:inline; color:var(--seal); font-weight:700; padding:0;">Connecte-toi</button> pour construire ta propre liste à voir.</div></div>`;

  if (connecte && liste.length > 0) {
    html += `<div style="padding:0 16px 10px;"><button class="primary-btn" id="surpriseMeBtn" style="width:100%;">🎲 Surprends-moi</button></div>`;
  }

  if (liste.length === 0) {
    html += `<div class="empty-state"><p>${connecte ? "Ta liste à voir est vide pour l'instant." : "Aucune suggestion dans le catalogue pour l'instant."}</p></div>`;
  }

  liste.forEach((d) => {
    const isOpen = state.expandedAVoirId === d.id;
    html += `<article class="drama-card ${isOpen ? "is-open" : ""}" data-avoir-card-id="${esc(d.id)}">
      <div class="card-row">
        ${d.poster_url ? `<img src="${esc(d.poster_url)}" alt="" class="poster-thumb">` : `<div class="stamp empty motif-flower">${FLOWER_MOTIF_SVG}</div>`}
        <div class="card-main">
          <h2>${esc(d.titre)}${d.annee ? `<span class="year"> · ${esc(d.annee)}</span>` : ""}</h2>
          ${d.titre_kr ? `<p class="kr">${esc(d.titre_kr)}</p>` : ""}
          <p class="cast" data-stop-propagation="1">${[castingLinksHtml(d.acteur, "acteur"), castingLinksHtml(d.actrice, "actrice")].filter(Boolean).join("  ·  ") || "Casting non renseigné"}</p>
        </div>
        <span class="chevron ${isOpen ? "rot" : ""}">▾</span>
      </div>
      ${isOpen ? `
      <div class="card-detail" data-stop-propagation="1">
        ${d.poster_url ? `<img src="${esc(d.poster_url)}" alt="" class="poster-full">` : ""}
        ${d.resume ? `<p style="font-size:12.5px; color:var(--ink-soft); line-height:1.5; margin:0 0 12px;">${esc(d.resume)}</p>` : ""}
        <dl>
          <div><dt>Scénariste</dt><dd>${castingLinksHtml(d.scenariste, "scenariste") || "—"}</dd></div>
          <div><dt>Réalisateur</dt><dd>${castingLinksHtml(d.realisateur, "realisateur") || "—"}</dd></div>
        </dl>
        <div class="card-actions">
          ${connecte ? `
            <button class="text-btn" data-watched-id="${esc(d.id)}" style="color:var(--celadon); font-weight:600;">✓ Marquer comme vu</button>
            <button class="text-btn" data-edit-avoir-id="${esc(d.id)}">✎ Modifier</button>
            ${state.confirmDeleteAVoirId === d.id
              ? `<button class="text-btn danger confirm" data-confirm-delete-avoir-id="${esc(d.id)}">✓ Confirmer</button>`
              : `<button class="text-btn danger" data-ask-delete-avoir-id="${esc(d.id)}">🗑</button>`}
          ` : `
            <button class="text-btn" data-goto-auth-avoir="1" style="color:var(--seal); font-weight:600;">🔑 Connecte-toi pour l'ajouter à ta liste</button>
          `}
        </div>
      </div>` : ""}
    </article>`;
  });

  html += `</main>`;
  return html;
}

// ============== RENDER: PERSON MODAL ==============
function renderPersonModal() {
  if (!state.personModal) return "";
  const { nom, role } = state.personModal;
  const trends = computeTrends(entriesPourFichesPersonnes());
  const profile = findProfile(trends, nom, role);
  if (!profile) return "";
  const collabs = findCollabsFor(trends, nom, role);
  const badge = reliabilityBadge(profile.count);
  const photo = findPersonPhoto(nom, role);
  const personneId = findPersonneId(profile.name, profile.role);
  const peutModifier = isLoggedIn() && personneId;
  const enEdition = peutModifier && state.editingPersonneDraft && state.editingPersonneDraft.id === personneId;

  return `<div class="modal-overlay" id="personModalOverlay">
    <div class="modal-sheet" id="personModalSheet">
      <div class="modal-handle"></div>
      <div class="modal-header">
        ${state.modalStack.length > 0 ? `<button class="icon-btn" id="personModalBack" aria-label="Retour">←</button>` : ""}
        ${photo ? `<img src="${esc(photo)}" class="modal-avatar">` : ""}
        <div style="flex:1;">
          <h3>${esc(profile.name)}</h3>
          <p class="modal-role">${roleLabel(profile.role)}</p>
        </div>
        ${peutModifier ? `<button class="icon-btn" id="personModalEdit" aria-label="Modifier">✎</button>` : ""}
        <button class="icon-btn" id="personModalClose">✕</button>
      </div>
      <div class="modal-body">
        ${enEdition ? `
        <div class="field-label-wrap" style="margin-bottom:4px;">
          <span class="field-label">Nom</span>
          <input id="editingPersonneNom" value="${esc(state.editingPersonneDraft.nom)}" placeholder="Nom complet">
        </div>
        <div class="field-label-wrap">
          <span class="field-label">Rôle</span>
          <div class="tr-role-toggle">
            ${["acteur", "actrice", "scenariste", "realisateur"].map((r) => `<button data-editing-personne-role="${r}" class="${state.editingPersonneDraft.role === r ? "active" : ""}">${roleLabel(r)}</button>`).join("")}
          </div>
        </div>
        ${state.editingPersonneError ? `<p style="color:var(--seal); font-size:12.5px; margin-top:8px;">${esc(state.editingPersonneError)}</p>` : ""}
        <p class="tr-note" style="margin-top:6px;">La correction du nom et/ou du rôle s'appliquera automatiquement à tous les dramas liés à cette personne.</p>
        <div class="sheet-footer" style="padding:14px 0 0; border-top:none;">
          <button class="ghost-btn" id="personModalEditCancel">Annuler</button>
          <button class="primary-btn" id="personModalEditSave">${state.imageProcessing ? "Enregistrement…" : "Enregistrer"}</button>
        </div>
        ` : `
        <div class="modal-stat-row">
          <div class="modal-stat"><span class="v">${profile.count}</span><span class="l">Titres</span></div>
          <div class="modal-stat"><span class="v">${fmtNote(profile.avg_note)}</span><span class="l">Note moy.</span></div>
          <div class="modal-stat"><span class="v">${profile.variance !== null ? profile.variance.toFixed(1) : "—"}</span><span class="l">Écart-type</span></div>
        </div>
        <span class="badge ${badge.cls}">${badge.label}</span>

        <div class="field-label-wrap modal-photo-upload">
          <span class="field-label">Photo de cette personne</span>
          <div class="poster-upload">
            ${photo
              ? `<div class="poster-preview"><img src="${esc(photo)}"></div>`
              : `<label class="poster-dropzone">📷<span>${state.imageProcessing ? "Traitement…" : "Ajouter une photo"}</span><input type="file" accept="image/*" style="display:none" id="personPhotoInput"></label>`}
          </div>
          ${!photo ? `<button type="button" class="text-btn" id="searchPersonPhotoBtn" data-search-name="${esc(profile.name)}" style="margin-top:4px;">🔍 Chercher une photo en ligne</button>` : ""}
        </div>

        <p class="modal-section-h">Ses titres</p>
        ${profile.titles.map((t) => `<div class="modal-title-row" data-drama-titre="${esc(t.titre)}" style="cursor:pointer;"><span>${esc(t.titre)} ${t.annee ? `<span class="modal-year">(${esc(t.annee)})</span>` : ""}</span><span class="modal-note">${fmtNote(t.note)}</span></div>`).join("")}
        <p class="modal-section-h">A travaillé avec (${collabs.length})</p>
        ${collabs.length === 0 ? `<p class="tr-note">Aucune collaboration recensée.</p>` : collabs.map((c) => {
          const other = c.p1 === profile.name && c.role1 === profile.role ? { name: c.p2, role: c.role2 } : { name: c.p1, role: c.role1 };
          return `<div class="modal-collab-row" data-person-name="${esc(other.name)}" data-person-role="${esc(other.role)}"><span>${esc(other.name)} <span class="modal-year">(${roleLabel(other.role)})</span></span><span class="modal-note">${fmtNote(c.avg_note)}</span></div>`;
        }).join("")}
        `}
      </div>
    </div>
  </div>`;
}

// ============== MAIN RENDER ==============
// Bouton d'ajout flottant (FAB) : toujours accessible au pouce en bas
// à droite de l'écran, peu importe le défilement — remplace l'ancien
// bouton "+" ancré en haut du header, difficile à atteindre sur
// mobile une fois qu'on a fait défiler la liste.
function renderFabAddBtn() {
  if (state.activeTab === "liste" || state.activeTab === "avoir") {
    return `<button class="fab-add-btn" id="openNewBtn" aria-label="Ajouter">＋</button>`;
  }
  if (state.activeTab === "tierlists") {
    return `<button class="fab-add-btn" id="openNewTierlistBtn" aria-label="Nouvelle tierlist">＋</button>`;
  }
  if (state.activeTab === "communaute") {
    return `<button class="fab-add-btn" id="openComposerBtn" aria-label="Nouvel avis">＋</button>`;
  }
  return "";
}

// ============== ETAT REPLI HEADER (avec hystérésis) ==============
// Un seul seuil (ex: scrollY > 40) peut faire trembler le header :
// dès qu'il se replie, sa hauteur diminue, ce qui peut suffire à
// repasser scrollY sous le seuil -> le header se redéplie -> boucle.
// On utilise donc deux seuils distincts avec une zone tampon entre eux :
// au-dessus de 60px on replie, au-dessous de 20px on déplie, et entre
// les deux on garde l'état précédent (pas de changement = pas de tremblement).
let headerScrolledState = false;
function computeHeaderScrolled() {
  const y = window.scrollY;
  if (y > 60) headerScrolledState = true;
  else if (y < 20) headerScrolledState = false;
  return headerScrolledState;
}

  }
  const tmdbSearchAVoirBtn = document.getElementById("tmdbSearchAVoirBtn");
  if (tmdbSearchAVoirBtn) {
    tmdbSearchAVoirBtn.addEventListener("click", () => {
      const titreInput = document.getElementById("av-titre");
      rechercherSurTmdb(titreInput ? titreInput.value : state.aVoirDraft.titre);
    });
  }

  // TMDB : sélection d'un résultat de recherche (commun aux deux formulaires)
  document.querySelectorAll("[data-tmdb-pick]").forEach((el) => {
    el.addEventListener("click", () => appliquerResultatTmdb(el.dataset.tmdbPick, el.dataset.tmdbCible));
  });

  // TMDB : import en masse
  const tmdbImportBtn = document.getElementById("tmdbImportBtn");
  if (tmdbImportBtn) tmdbImportBtn.addEventListener("click", () => importerCatalogueTmdb(2));

  // TMDB : modal de clé API
  const tmdbKeyModalOverlay = document.getElementById("tmdbKeyModalOverlay");
  if (tmdbKeyModalOverlay) tmdbKeyModalOverlay.addEventListener("click", (e) => { if (e.target === tmdbKeyModalOverlay) setState({ showTmdbKeyModal: false }); });
  const tmdbKeyModalClose = document.getElementById("tmdbKeyModalClose");
  if (tmdbKeyModalClose) tmdbKeyModalClose.addEventListener("click", () => setState({ showTmdbKeyModal: false }));
  const tmdbKeySaveBtn = document.getElementById("tmdbKeySaveBtn");
  if (tmdbKeySaveBtn) {
    tmdbKeySaveBtn.addEventListener("click", () => {
      const input = document.getElementById("tmdb-key-input");
      const key = input ? input.value.trim() : "";
      if (!key) { showToast("Indique une clé API."); return; }
      setTmdbApiKey(key);
      setState({ showTmdbKeyModal: false });
      showToast("Clé TMDB enregistrée dans ce navigateur.");
    });
  }
}

// ============== SCROLL HEADER ==============
// Replie la ligne de stats (vus / note moy. / heures) dès qu'on
// scrolle vers le bas, pour gagner de la place pour le contenu.
// Réapparaît dès qu'on remonte tout en haut.
window.addEventListener("scroll", () => {
  const header = document.querySelector(".app-header");
  if (!header) return;
  header.classList.toggle("scrolled", computeHeaderScrolled());
}, { passive: true });

// ============== INIT ==============
initAuth().then(() => loadData());
// Le mini-lecteur Deezer vit hors de #app (voir le commentaire sur
// #deezer-mini-player) : il est initialisé une seule fois ici, et ne
// sera plus jamais reconstruit par render()/setState() ensuite — seuls
// ses propres listeners le mettent à jour.
renderDeezerMiniPlayer();
</script>
