<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>내 드라마 일지 — Mon carnet de k-dramas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&family=Noto+Sans+KR:wght@500;700&display=swap');

  :root {
    --ink: #2b3a55;
    --ink-soft: #5b6c8a;
    --ink-faint: #93a6c2;
    --paper: #dceaf8;
    --paper-raised: #ffffff;
    --paper-sunken: #eaf2fb;
    --line: #aecbe8;
    --seal: #e07a96;
    --seal-soft: #fbdde6;
    --celadon: #6fb8b0;
    --celadon-soft: #e0f3f0;
    --gold: #e3b94f;
    --gold-soft: #fbf0d6;
    --blue-deep: #3f5f96;
    --pink-deep: #d96585;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--paper); color: var(--ink); -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 0 0 90px; position: relative; min-height: 100vh; }

  /* ---------- Header ---------- */
  .app-header {
    padding: 26px 18px 14px; text-align: center; border-bottom: 1px solid var(--line);
    background: radial-gradient(circle at 50% 0%, var(--seal-soft) 0%, transparent 60%), var(--paper);
    position: sticky; top: 0; z-index: 30;
    transition: padding-top 0.25s ease;
  }
  .app-header.scrolled { padding-top: 10px; }
  .app-header-brand { overflow: hidden; max-height: 130px; transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease; }
  .app-header.scrolled .app-header-brand { max-height: 0; opacity: 0; margin: 0; }
  .app-seal { width: 48px; height: 48px; margin: 0 auto 8px; color: var(--seal); }
  .app-seal svg circle { fill: none; stroke: currentColor; }
  .app-eyebrow { font-family: 'Noto Sans KR', sans-serif; font-weight: 700; font-size: 18px; color: var(--pink-deep); margin: 0 0 4px; letter-spacing: 0.03em; }
  .app-header h1 { font-family: 'Press Start 2P', cursive; font-size: 15px; font-weight: 400; margin: 0; line-height: 1.6; color: var(--blue-deep); }

  .main-nav { display: flex; gap: 8px; padding: 14px 16px 0; }
  .main-nav-btn {
    flex: 1; border: none; background: var(--paper-sunken);
    padding: 11px 8px; font-size: 13.5px; font-weight: 700; color: var(--ink-soft); cursor: pointer;
    font-family: inherit; border-radius: 10px;
  }
  .main-nav-btn.active { background: var(--blue-deep); color: #fff; }

  .tabbar { display: flex; gap: 6px; padding: 14px 16px 0; }
  .tab-btn {
    flex: 1; border: 1px solid var(--line); background: var(--paper-raised); border-radius: 11px;
    padding: 10px; font-size: 13.5px; font-weight: 600; color: var(--ink-soft); cursor: pointer; font-family: inherit;
  }
  .tab-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .hero-stats { display: flex; justify-content: center; gap: 36px; padding: 16px 16px 10px; flex-wrap: wrap; overflow: hidden; max-height: 70px; transition: max-height 0.25s ease, opacity 0.2s ease, padding 0.25s ease; }
  .app-header.scrolled .hero-stats { max-height: 0; padding-top: 0; padding-bottom: 0; opacity: 0; }
  .hero-stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .hero-stat .num { font-family: 'Press Start 2P', cursive; font-size: 17px; font-weight: 400; color: var(--gold); }
  .hero-stat .lbl { font-size: 10px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.06em; }

  /* ---------- Drawer de navigation Tendances ---------- */
  .trends-nav-tab {
    position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 55;
    width: 22px; height: 52px; border: none; border-radius: 0 12px 12px 0;
    background: var(--blue-deep); color: #fff; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    padding: 0; box-shadow: 2px 0 6px rgba(0,0,0,0.15);
  }
  .trends-nav-tab span:last-child { font-size: 13px; line-height: 1; }
  .trends-nav-overlay { position: fixed; inset: 0; background: rgba(33,28,26,0.45); z-index: 65; display: flex; align-items: stretch; justify-content: flex-start; animation: trends-nav-fade 0.18s ease-out; }
  @keyframes trends-nav-fade { from { opacity: 0; } to { opacity: 1; } }
  .trends-nav-drawer {
    background: var(--paper); width: 78%; max-width: 280px; height: 100%;
    padding: 22px 16px; display: flex; flex-direction: column; gap: 6px;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    animation: trends-nav-slide 0.22s ease-out; box-shadow: 3px 0 10px rgba(0,0,0,0.12);
  }
  @keyframes trends-nav-slide { from { transform: translateX(-100%); } to { transform: translateX(0); } }
  .trends-nav-title { font-family: 'Press Start 2P', cursive; font-size: 12px; font-weight: 400; color: var(--blue-deep); margin: 0 0 10px; }
  .trends-nav-link {
    text-align: left; border: none; background: var(--paper-raised); border-radius: 10px;
    padding: 11px 13px; font-size: 13px; font-weight: 600; color: var(--ink-soft);
    cursor: pointer; font-family: inherit;
  }
  .trends-nav-link:active { background: var(--blue-deep); color: #fff; }

  /* ---------- List controls ---------- */
  .kt-controls { display: flex; gap: 8px; padding: 14px 16px 0; flex-wrap: wrap; }
  .filters-panel { margin: 10px 16px 0; padding: 12px; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 12px; display: flex; flex-direction: column; gap: 8px; }
  .filter-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .filter-label { font-size: 12px; color: var(--ink-soft); font-weight: 500; flex-shrink: 0; }
  .filter-row select, .filter-row input { border: 1px solid var(--line); background: var(--paper-sunken); border-radius: 8px; padding: 6px 9px; font-size: 12.5px; color: var(--ink); font-family: inherit; flex: 1; max-width: 60%; }
  .kt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 14px 16px 8px; }
  .grid-cell { display: flex; flex-direction: column; gap: 4px; cursor: pointer; position: relative; }
  .grid-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; border: 1px solid var(--line); background: var(--paper-sunken); }
  .grid-poster-empty { display: flex; align-items: center; justify-content: center; color: var(--ink-faint); }
  .grid-poster-empty svg { width: 40%; height: 40%; }
  .grid-stamp { position: absolute; top: 4px; right: 4px; width: 26px; height: 26px; }
  .grid-stamp .stamp { width: 26px; height: 26px; background: var(--paper-raised); border-radius: 50%; }
  .grid-title { font-size: 11px; font-weight: 600; line-height: 1.25; margin: 0; }
  .search-box {
    flex: 1; display: flex; align-items: center; gap: 8px; background: var(--paper-raised);
    border: 1px solid var(--line); border-radius: 11px; padding: 10px 12px; color: var(--ink-soft);
  }
  .search-box input { border: none; background: transparent; outline: none; font-size: 14px; flex: 1; color: var(--ink); font-family: inherit; }
  .clear-q { border: none; background: none; color: var(--ink-soft); cursor: pointer; display: flex; padding: 2px; }
  .sort-box { position: relative; display: flex; align-items: center; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 11px; }
  .sort-box select { border: none; background: transparent; font-size: 13px; padding: 10px 26px 10px 12px; color: var(--ink); appearance: none; font-family: inherit; cursor: pointer; }
  .sort-chevron { position: absolute; right: 10px; pointer-events: none; color: var(--ink-faint); font-size: 11px; }

  .icon-btn {
    border: 1px solid var(--line); background: var(--paper-raised); border-radius: 50%;
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    color: var(--ink); cursor: pointer; flex-shrink: 0;
  }
  .add-btn { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .fab-add-btn {
    position: fixed; bottom: 88px; right: 20px; width: 56px; height: 56px; border-radius: 50%;
    background: var(--ink); color: var(--paper); border: 2px solid var(--ink); font-size: 26px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 45;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }

  .kt-list { padding: 14px 16px 8px; display: flex; flex-direction: column; gap: 10px; }
  .empty-state { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 40px 24px; color: var(--ink-faint); text-align: center; font-size: 13px; }

  .drama-card { background: var(--paper-raised); border: 1px solid var(--line); border-radius: 16px; padding: 12px; cursor: pointer; }
  .drama-card.is-open { border-color: var(--seal); }
  .card-row { display: flex; align-items: center; gap: 12px; }
  .poster-thumb { width: 68px; height: 96px; object-fit: cover; flex-shrink: 0; border: 2px solid var(--line); border-radius: 4px; }
  .stamp { position: relative; width: 44px; height: 44px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--seal); }
  .stamp svg circle { fill: none; stroke: currentColor; stroke-width: 1.6; }
  .stamp-text { position: absolute; font-family: 'Press Start 2P', cursive; font-weight: 400; font-size: 12px; }
  .stamp.empty { color: var(--ink-faint); opacity: 0.5; }
  .stamp.mini { width: 26px; height: 26px; }
  .stamp.mini .stamp-text { font-size: 10.5px; }
  .card-main { flex: 1; min-width: 0; }
  .card-main h2 { font-family: 'Inter', sans-serif; font-size: 14.5px; font-weight: 700; margin: 0 0 2px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-main h2 .year { font-weight: 400; color: var(--ink-faint); font-size: 12px; }
  .kr { font-size: 11.5px; color: var(--pink-deep); margin: 0 0 2px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; }
  .cast { font-size: 12px; color: var(--ink-faint); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chevron { color: var(--ink-faint); flex-shrink: 0; font-size: 13px; transition: transform 0.2s; }
  .chevron.rot { transform: rotate(180deg); }

  .card-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); cursor: default; }
  .poster-full { width: 100%; max-height: 440px; object-fit: contain; background: var(--paper-sunken); border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--line); }
  .card-detail dl { display: flex; flex-direction: column; gap: 7px; margin: 0 0 12px; }
  .card-detail dl > div { display: flex; justify-content: space-between; gap: 12px; font-size: 12.5px; }
  .card-detail dt { color: var(--ink-faint); flex-shrink: 0; }
  .card-detail dd { margin: 0; text-align: right; }
  .card-actions { display: flex; gap: 14px; }
  .text-btn { display: flex; align-items: center; gap: 5px; border: none; background: none; color: var(--ink-faint); font-size: 12.5px; cursor: pointer; padding: 3px 0; font-family: inherit; }
  .text-btn.danger { color: var(--seal); }
  .text-btn.confirm { font-weight: 600; }

  /* ---------- Form sheet ---------- */
  .sheet-overlay { position: fixed; inset: 0; background: rgba(33,28,26,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 60; }
  .sheet { background: var(--paper); width: 100%; max-width: 480px; border-radius: 20px 20px 0 0; max-height: 92vh; display: flex; flex-direction: column; animation: sheet-up 0.2s ease-out; overflow: hidden; }
  @keyframes sheet-up { from { transform: translateY(20px); opacity: 0.7; } to { transform: translateY(0); opacity: 1; } }
  .sheet-handle { width: 36px; height: 4px; background: var(--line); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
  .sheet-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 18px 6px; flex-shrink: 0; }
  .sheet-header h3 { font-family: 'Press Start 2P', cursive; font-size: 12px; font-weight: 400; margin: 0; color: var(--blue-deep); }
  .sheet-body { padding: 6px 18px 12px; overflow-y: auto; -webkit-overflow-scrolling: touch; display: flex; flex-direction: column; gap: 11px; flex: 1 1 auto; min-height: 0; }
  .sheet-body label { display: flex; flex-direction: column; gap: 5px; font-size: 12px; color: var(--ink-soft); font-weight: 500; }
  .sheet-body input { border: 1px solid var(--line); background: var(--paper-raised); border-radius: 10px; padding: 10px 11px; font-size: 14.5px; color: var(--ink); font-family: inherit; outline: none; }
  .sheet-body input:focus { border-color: var(--seal); }
  .field-pair { display: flex; gap: 10px; }
  .field-pair label { flex: 1; }
  .field-label-wrap { display: flex; flex-direction: column; gap: 5px; }
  .field-label { font-size: 12px; color: var(--ink-soft); font-weight: 500; }
  .sheet-footer { display: flex; gap: 10px; padding: 12px 18px; padding-bottom: max(20px, env(safe-area-inset-bottom)); border-top: 1px solid var(--line); flex-shrink: 0; background: var(--paper); }
  .ghost-btn, .primary-btn { flex: 1; border-radius: 11px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; border: 1px solid transparent; }
  .ghost-btn { background: transparent; border-color: var(--line); color: var(--ink-soft); }
  .primary-btn { background: var(--seal); color: #fff; }
  .primary-btn:disabled { opacity: 0.6; }

  .poster-upload { margin-top: 2px; }
  .poster-dropzone { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; border: 1.5px dashed var(--line); border-radius: 12px; padding: 20px 12px; cursor: pointer; color: var(--ink-faint); font-size: 12.5px; background: var(--paper-sunken); }
  .poster-dropzone:hover { border-color: var(--seal); color: var(--seal); }
  .poster-preview { position: relative; width: 110px; }
  .poster-preview img { width: 110px; height: 146px; object-fit: cover; border-radius: 10px; border: 1px solid var(--line); display: block; }
  .poster-remove { position: absolute; top: -8px; right: -8px; width: 24px; height: 24px; border-radius: 50%; background: var(--ink); color: var(--paper); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--paper); padding: 9px 16px; border-radius: 30px; font-size: 12.5px; z-index: 100; max-width: 88%; text-align: center; }

  /* ---------- Trends ---------- */
  .trends-wrap { padding: 14px 16px 24px; }
  .tr-section { margin-bottom: 26px; }
  .tr-title { font-family: 'Press Start 2P', cursive; font-size: 13px; font-weight: 400; margin: 0 0 9px; color: var(--blue-deep); }
  .tr-note { font-size: 12px; color: var(--ink-faint); margin: 0 0 11px; line-height: 1.5; }
  .tr-subhead { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700; margin: 14px 0 7px; color: var(--blue-deep); }
  .tr-records-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .tr-record { background: var(--paper-raised); border: 1px solid var(--line); border-radius: 12px; padding: 11px; }
  .tr-rk-label { font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--ink-faint); margin: 0 0 4px; }
  .tr-rk-title { font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 700; margin: 0 0 2px; line-height: 1.3; }

  /* ---------- Quiz : révélation des réponses ---------- */
  .quiz-answer-btn { position: relative; transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.15s ease; }
  .quiz-answer-btn:disabled { cursor: default; opacity: 1; }
  .quiz-answer-btn.quiz-correct {
    background: var(--celadon) !important; border-color: var(--celadon) !important; color: #fff !important;
    animation: quiz-pop 0.35s ease;
  }
  .quiz-answer-btn.quiz-incorrect {
    background: var(--seal) !important; border-color: var(--seal) !important; color: #fff !important;
    animation: quiz-shake 0.35s ease;
  }
  .quiz-answer-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-weight: 700; font-size: 15px; }
  @keyframes quiz-pop { 0% { transform: scale(1); } 40% { transform: scale(1.03); } 100% { transform: scale(1); } }
  @keyframes quiz-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(3px); }
  }
  .tr-rk-meta { font-size: 10.5px; color: var(--seal); font-weight: 600; margin: 0; }
  .tr-card { background: var(--paper-raised); border: 1px solid var(--line); border-radius: 14px; padding: 13px; }
  .tr-dist-chart { display: flex; align-items: flex-end; gap: 5px; height: 110px; }
  .tr-dist-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 5px; height: 100%; }
  .tr-dist-bar { width: 100%; max-width: 22px; border-radius: 4px 4px 2px 2px; background: var(--celadon); }
  .tr-dist-bar.warm { background: var(--seal); }
  .tr-dist-num { font-size: 9.5px; color: var(--ink-faint); font-weight: 600; }
  .tr-dist-lbl { font-size: 9.5px; color: var(--ink-soft); }
  .tr-insight { background: var(--celadon-soft); border: 1px solid #c9d8cd; border-radius: 12px; padding: 11px 13px; font-size: 12px; line-height: 1.55; margin-top: 11px; }
  .tr-role-toggle { display: flex; gap: 6px; margin-bottom: 11px; flex-wrap: wrap; }
  .tr-role-toggle button { border: 1px solid var(--line); background: var(--paper-raised); border-radius: 20px; padding: 6px 11px; font-size: 11.5px; color: var(--ink-soft); cursor: pointer; font-family: inherit; font-weight: 500; }
  .tr-role-toggle button.active { background: var(--seal); color: #fff; border-color: var(--seal); }
  .tr-person-row, .tr-eff-row { display: flex; align-items: center; gap: 14px; padding: 12px 14px; background: var(--paper-raised); border: 1px solid var(--line); border-radius: 12px; margin-bottom: 9px; cursor: pointer; font-size: 13.5px; }
  .tr-person-avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid var(--line); }
  .tr-duo-avatars { display: flex; flex-shrink: 0; }
  .tr-duo-avatars .tr-person-avatar { background: var(--paper-sunken); }
  .tr-duo-avatars .tr-person-avatar:last-child { margin-left: -20px; border: 2px solid var(--paper-raised); }
  .tr-avatar-placeholder { background: var(--paper-sunken); }
  .tr-poster-thumb { width: 56px; height: 76px; border-radius: 4px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--line); }
  .tr-rank { font-family: 'Press Start 2P', cursive; color: var(--ink-faint); width: 20px; text-align: center; flex-shrink: 0; font-size: 12px; }
  .tr-person-info { flex: 1; min-width: 0; }
  .tr-person-name { font-weight: 600; margin: 0 0 2px; font-size: 13.5px; }
  .tr-role-tag { font-weight: 400; color: var(--ink-faint); font-size: 11.5px; }
  .tr-person-sub { font-size: 11.5px; color: var(--ink-faint); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tr-person-score, .tr-eff-score { font-family: 'Press Start 2P', cursive; font-weight: 400; color: var(--pink-deep); flex-shrink: 0; font-size: 13px; }
  .tr-eff-score { color: var(--gold); }
  .tr-highlight { background: linear-gradient(135deg, var(--seal-soft), var(--gold-soft)); border: 1px solid var(--seal); border-radius: 14px; padding: 13px; }
  .tr-hc-names { font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 700; margin: 0 0 7px; }
  .tr-hc-names span { font-weight: 400; color: var(--ink-faint); }
  .tr-hc-detail { font-size: 11.5px; color: var(--ink-soft); line-height: 1.6; margin: 0; }
  .tr-year-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; overflow-x: auto; padding-bottom: 2px; }
  .tr-year-col { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 5px; height: 100%; min-width: 26px; flex-shrink: 0; }
  .tr-year-bar { width: 17px; border-radius: 4px 4px 2px 2px; background: var(--gold); }
  .tr-year-note { font-size: 9px; font-weight: 700; }
  .tr-year-lbl { font-size: 8.5px; color: var(--ink-faint); }

  .badge { display: inline-flex; font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; margin: 8px 0 4px; }
  .badge.b1 { background: #f1e6e0; color: #9a6a52; }
  .badge.b2 { background: var(--gold-soft); color: #8c6b2c; }
  .badge.b3 { background: var(--celadon-soft); color: #4f6657; }

  /* ---------- Person modal ---------- */
  .modal-overlay { position: fixed; inset: 0; background: rgba(33,28,26,0.5); z-index: 70; display: flex; align-items: flex-end; justify-content: center; }
  .modal-sheet { background: var(--paper); width: 100%; max-width: 480px; max-height: 86vh; border-radius: 20px 20px 0 0; animation: sheet-up 0.2s ease-out; display: flex; flex-direction: column; overflow: hidden; }
  .modal-handle { width: 36px; height: 4px; background: var(--line); border-radius: 2px; margin: 10px auto 12px; flex-shrink: 0; }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; padding: 0 18px 6px; gap: 12px; flex-shrink: 0; }
  .modal-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 1px solid var(--line); flex-shrink: 0; }
  .avatar-upload-zone { position: relative; display: inline-block; flex-shrink: 0; cursor: pointer; }

// ============== DATA LOADING ==============
async function loadData() {
  try {
    const { data: dramas, error: e1 } = await sb.from("dramas").select("*").order("created_at", { ascending: true });
    if (e1) throw e1;
    state.entries = dramas || []; // CATALOGUE COMMUN (métadonnées factuelles, plus de note/date perso fiable ici)
  } catch (e) {
    console.error("Load error", e);
    state.entries = [];
  }

  try {
    const { data: people, error: e2 } = await sb.from("personnes").select("*");
    if (e2) throw e2;
    state.people = people || [];
  } catch (e) {
    state.people = [];
  }

  try {
    const { data: avoir, error: e3 } = await sb.from("a_voir").select("*").order("created_at", { ascending: true });
    if (e3) throw e3;
    state.aVoirCatalogue = avoir || []; // CATALOGUE COMMUN d'envies suggérées
  } catch (e) {
    console.error("A voir load error", e);
    state.aVoirCatalogue = [];
  }

  // Couche personnelle (Modèle B) : visionnages et envies propres à
  // l'utilisateur connecté. Vide si personne n'est connecté.
  await chargerMesVisionnages();
  await chargerMesAVoir();
  await chargerTousLesVisionnages();

  // Modules sociaux : chargés après le catalogue de base, car certains
  // (tierlists notamment) s'appuient sur state.entries pour proposer un
  // pool d'éléments par défaut. Chaque chargement est indépendant et ne
  // doit pas faire échouer les autres en cas d'erreur réseau ponctuelle.
  await Promise.allSettled([
    loadCommunaute(),
    loadTierlists(),
    loadQuizDuJour(),
    loadLeaderboardQuiz(),
    loadOstLeaderboard(),
  ]);

  state.loading = false;
  render();
}

// ---- couche personnelle : visionnages (Modèle B) ----
// Produit un tableau dans le MÊME FORMAT que l'ancien state.entries
// (mêmes clés : titre, acteur, actrice, note, episodes, duree...), où
// `note` et `date_visionnage` viennent de `mes_visionnages` (perso) et
// le reste vient du catalogue `dramas` (factuel, partagé). Ainsi
// computeTrends(), getStats() et le reste du moteur de Tendances
// continuent de fonctionner sans aucune modification : on change
// seulement CE QU'ON LEUR PASSE en argument.
async function chargerMesVisionnages() {
  if (!isLoggedIn()) { state.mesVisionnages = []; state.mesEntries = []; return; }
  try {
    const { data, error } = await sb
      .from("mes_visionnages")
      .select("*, dramas(*)")
      .eq("user_id", currentUserId());
    if (error) throw error;
    state.mesVisionnages = data || [];
    state.mesEntries = (data || [])
      .filter((v) => v.dramas) // ignore les visionnages dont le drama aurait été supprimé du catalogue
      .map((v) => ({ ...v.dramas, note: v.note, date_visionnage: v.date_visionnage, visionnage_id: v.id }));
  } catch (e) {
    console.error("Erreur chargement visionnages", e);
    state.mesVisionnages = [];
    state.mesEntries = [];
  }
}

// ---- couche personnelle : à voir (Modèle B) ----
async function chargerMesAVoir() {
  if (!isLoggedIn()) { state.mesAVoirIds = []; state.aVoir = []; return; }
  try {
    const { data, error } = await sb

}

// ============== IMAGE UPLOAD ==============
function resizeImageFile(file, maxDim, quality) {
  maxDim = maxDim || 480;
  quality = quality || 0.8;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Lecture impossible."));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Image illisible."));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) {
          height = Math.round((height * maxDim) / width);
          width = maxDim;
        } else if (height > maxDim) {
          width = Math.round((width * maxDim) / height);
          height = maxDim;
        }
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => resolve(blob), "image/jpeg", quality);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadImage(file, pathPrefix) {
  const blob = await resizeImageFile(file);
  const fileName = `${pathPrefix}/${Date.now()}.jpg`;
  const { error } = await sb.storage.from(BUCKET).upload(fileName, blob, { contentType: "image/jpeg", upsert: true });
  if (error) throw error;
  const { data } = sb.storage.from(BUCKET).getPublicUrl(fileName);
  return data.publicUrl;
}

// ============== TRENDS CALCULATIONS ==============
function splitPeople(s) {
  if (!s) return [];
  return String(s).replace(/ et /g, ",").split(",").map((p) => p.trim()).filter(Boolean);
}

function computeTrends(entries) {
  if (!entries || entries.length === 0) return null;

  const titles = entries.map((d) => {
    const people = [];
    if (d.acteur) people.push([d.acteur.trim(), "acteur"]);
    splitPeople(d.actrice).forEach((n) => people.push([n, "actrice"]));
    splitPeople(d.scenariste).forEach((n) => people.push([n, "scenariste"]));
    splitPeople(d.realisateur).forEach((n) => people.push([n, "realisateur"]));
    const note = d.note === null || d.note === undefined || d.note === "" ? null : Number(d.note);
    return { ...d, note, people };
  });

  const rated = titles.filter((t) => t.note !== null);
  const withEp = titles.filter((t) => t.episodes && Number(t.episodes) >= 2);

  const KNOWN_RELEASE_DATES = {
    "Boyfriend on Demand": 20260306,
    "Can this love be translated ?": 20260116,
    "Perfect Crown": 20260410,
    "We are all trying here": 20260418,
  };
  const sortKey = (t) => KNOWN_RELEASE_DATES[t.titre] || (t.annee ? t.annee * 10000 : 0);

  const records = rated.length
    ? {
        best: rated.reduce((a, b) => (b.note > a.note ? b : a)),
        worst: rated.reduce((a, b) => (b.note < a.note ? b : a)),
        oldest: titles.reduce((a, b) => (b.annee && (!a.annee || sortKey(b) < sortKey(a)) ? b : a)),
        newest: titles.reduce((a, b) => (b.annee && (!a.annee || sortKey(b) > sortKey(a)) ? b : a)),
        longest: withEp.length ? withEp.reduce((a, b) => (Number(b.episodes) > Number(a.episodes) ? b : a)) : null,
        shortest: withEp.length ? withEp.reduce((a, b) => (Number(b.episodes) < Number(a.episodes) ? b : a)) : null,
      }
    : null;

  const distribution = {};
  for (let n = 0; n <= 10; n++) distribution[n] = 0;
  rated.forEach((t) => { const r = Math.round(t.note); distribution[r] = (distribution[r] || 0) + 1; });
  const coupsDeCoeur = rated.filter((t) => t.note >= 9).length;
  const deceptions = rated.filter((t) => t.note <= 4).length;
  const avgNote = rated.length ? rated.reduce((s, t) => s + t.note, 0) / rated.length : null;

  const profileMap = new Map();
  titles.forEach((t) => {
    t.people.forEach(([name, role]) => {
      const key = name + "||" + role;
      if (!profileMap.has(key)) profileMap.set(key, { name, role, titles: [] });
      profileMap.get(key).titles.push({ titre: t.titre, note: t.note, annee: t.annee });
    });
  });
  const peopleProfiles = Array.from(profileMap.values()).map((p) => {
    const notes = p.titles.map((t) => t.note).filter((n) => n !== null);
    const avg_note = notes.length ? notes.reduce((s, n) => s + n, 0) / notes.length : null;
    let variance = null;
    if (notes.length >= 2) {
      const m = avg_note;
      variance = Math.sqrt(notes.reduce((s, n) => s + (n - m) * (n - m), 0) / notes.length);
    }
    return { ...p, count: p.titles.length, avg_note, variance };
  });

  const collabMap = new Map();
  titles.forEach((t) => {
    const ppl = t.people;
    for (let i = 0; i < ppl.length; i++) {
      for (let j = i + 1; j < ppl.length; j++) {
        const [n1, r1] = ppl[i], [n2, r2] = ppl[j];
        const pair = [{ name: n1, role: r1 }, { name: n2, role: r2 }].sort((a, b) => (a.name + a.role).localeCompare(b.name + b.role));
        const key = pair.map((p) => p.name + "||" + p.role).join("::");
        if (!collabMap.has(key)) collabMap.set(key, { p1: pair[0].name, role1: pair[0].role, p2: pair[1].name, role2: pair[1].role, titles: [] });
        collabMap.get(key).titles.push({ titre: t.titre, note: t.note });
      }
    }
  });
  const allCollabs = Array.from(collabMap.values()).map((c) => {
    const notes = c.titles.map((t) => t.note).filter((n) => n !== null);
    const avg_note = notes.length ? notes.reduce((s, n) => s + n, 0) / notes.length : null;
    return { ...c, count: c.titles.length, avg_note };
  });
  const recurringCollabs = allCollabs.filter((c) => c.count >= 2).sort((a, b) => b.count - a.count);

  const byYear = new Map();
  titles.forEach((t) => {
    if (!t.annee) return;
    if (!byYear.has(t.annee)) byYear.set(t.annee, []);
    byYear.get(t.annee).push(t);
  });
  const yearStats = Array.from(byYear.entries())
    .map(([annee, list]) => {
      const notes = list.map((t) => t.note).filter((n) => n !== null);
      return { annee, count: list.length, avg_note: notes.length ? notes.reduce((s, n) => s + n, 0) / notes.length : null };
    })
    .sort((a, b) => a.annee - b.annee);
  const yearsWithNotes = yearStats.filter((y) => y.avg_note !== null);
  const mostGenerousYear = yearsWithNotes.length ? yearsWithNotes.reduce((a, b) => (b.avg_note > a.avg_note ? b : a)) : null;
  const mostSevereYear = yearsWithNotes.length ? yearsWithNotes.reduce((a, b) => (b.avg_note < a.avg_note ? b : a)) : null;

  const efficiency = titles
    .filter((t) => t.note !== null && t.episodes && t.duree && Number(t.episodes) >= 2)
    .map((t) => {
      const totalMin = Number(t.episodes) * Number(t.duree);
      return { titre: t.titre, note: t.note, total_min: totalMin, score: (t.note / totalMin) * 1000, poster_url: t.poster_url };
    })
    .sort((a, b) => b.score - a.score);

  const withFormat = titles.filter((t) => t.note !== null && t.episodes && t.duree);
  const shortFormat = withFormat.filter((t) => Number(t.episodes) <= 12);
  const longFormat = withFormat.filter((t) => Number(t.episodes) > 12);
  const avgOf = (arr) => (arr.length ? arr.reduce((s, t) => s + t.note, 0) / arr.length : null);

  // Acting duos only (acteur + actrice pairs), separate from writer/director collaborations.
  const actingDuos = allCollabs
    .filter((c) => (c.role1 === "acteur" && c.role2 === "actrice") || (c.role1 === "actrice" && c.role2 === "acteur"))
    .sort((a, b) => b.count - a.count || (b.avg_note || 0) - (a.avg_note || 0));

  // Personal taste profile: dominant actor/actress, favorite scenariste, format leaning.
  const topActor = peopleProfiles.filter((p) => p.role === "acteur").sort((a, b) => b.count - a.count)[0] || null;
  const topActress = peopleProfiles.filter((p) => p.role === "actrice").sort((a, b) => b.count - a.count)[0] || null;
  const topScenariste = peopleProfiles.filter((p) => p.role === "scenariste" && p.count >= 2 && p.avg_note !== null).sort((a, b) => b.avg_note - a.avg_note)[0] || null;
  const formatLean = (shortFormat.length || 0) >= (longFormat.length || 0) ? "courts" : "longs";

  // Viewing history based on date_visionnage (when available).
  const withViewDate = titles.filter((t) => t.date_visionnage);
  const monthCounts = {};
  const moisNoms = ["janvier", "février", "mars", "avril", "mai", "juin", "juillet", "août", "septembre", "octobre", "novembre", "décembre"];
  withViewDate.forEach((t) => {
    const m = Number(t.date_visionnage.split("-")[1]) - 1;
    monthCounts[m] = (monthCounts[m] || 0) + 1;
  });
  let busiestMonth = null;
  Object.keys(monthCounts).forEach((m) => {
    if (!busiestMonth || monthCounts[m] > monthCounts[busiestMonth]) busiestMonth = m;
  });
  const viewingStats = withViewDate.length >= 2
    ? { busiestMonthName: busiestMonth !== null ? moisNoms[busiestMonth] : null, busiestMonthCount: busiestMonth !== null ? monthCounts[busiestMonth] : 0, totalWithDate: withViewDate.length }
    : null;

  return {
    records, distribution, coupsDeCoeur, deceptions, avgNote, peopleProfiles, allCollabs, recurringCollabs,
    yearStats, mostGenerousYear, mostSevereYear, efficiency,
    formats: { short: { avg: avgOf(shortFormat), count: shortFormat.length }, long: { avg: avgOf(longFormat), count: longFormat.length } },
    totalPeople: peopleProfiles.length,
    actingDuos,
    tasteProfile: { topActor, topActress, topScenariste, formatLean },
    viewingStats,
  };
}

function findProfile(trends, name, role) {
  return trends ? trends.peopleProfiles.find((p) => p.name === name && p.role === role) || null : null;
}
function findCollabsFor(trends, name, role) {
  if (!trends) return [];
  return trends.allCollabs.filter((c) => (c.p1 === name && c.role1 === role) || (c.p2 === name && c.role2 === role)).sort((a, b) => b.count - a.count);
}

// ---- liens cliquables vers une fiche personne ----
// `splitPeople` (déjà défini plus bas, gère "X, Y" et "X et Y") est

// distincts. `data-stop-propagation` empêche le clic de se propager à
// une carte parente cliquable (ouverture/fermeture de détail), comme
// déjà utilisé pour `.card-detail`.
function personLinkHtml(nom, role) {
  if (!nom) return "";
  return `<span data-stop-propagation="1" data-person-name="${esc(nom)}" data-person-role="${esc(role)}" style="cursor:pointer; color:var(--blue-deep); font-weight:600;">${esc(nom)}</span>`;
}
function castingLinksHtml(champ, role, separateur) {
  if (!champ) return "";
  const noms = splitPeople(champ);
  return noms.map((n) => personLinkHtml(n, role)).join(separateur || ", ");
}

   Email + mot de passe via Supabase Auth.

// ---- état additionnel (à fusionner dans l'objet `state` global) ----
// ---- initialisation : récupère la session existante au chargement ----
async function initAuth() {
  const { data } = await sb.auth.getSession();
  state.session = data.session || null;
  if (state.session) {
    await loadProfilCourant();
  }

  // Écoute les changements (connexion, déconnexion, refresh token).
  // On recharge systématiquement la couche personnelle (visionnages,
  // à-voir) car elle dépend entièrement de qui est connecté : sans ce
  // rechargement, "Ma liste" resterait vide après une connexion tant
  // que la page n'est pas rafraîchie manuellement.
  sb.auth.onAuthStateChange(async (_event, session) => {
    state.session = session;
    if (session) {
      await loadProfilCourant();
    } else {
      state.profil = null;
    }
    if (!state.loading) {
      await chargerMesVisionnages();

function updateAuthForm(patch) {

function switchAuthScreen(screen) {
  setState({ authScreen: screen, authError: null, authForm: { email: "", password: "", pseudo: "" } });
}

async function handleSignup() {
  const { email, password, pseudo } = state.authForm;
  if (!email.trim() || !password.trim() || !pseudo.trim()) {
    setState({ authError: "Tous les champs sont obligatoires." });
    return;
  }
  if (password.length < 6) {
    setState({ authError: "Le mot de passe doit faire au moins 6 caractères." });
    return;
  }
  // Le pseudo ne doit contenir que des caractères simples pour éviter
  // les soucis d'affichage / d'URL de profil public.
  if (!/^[a-zA-Z0-9_\-]{3,20}$/.test(pseudo.trim())) {
    setState({ authError: "Le pseudo doit faire 3 à 20 caractères (lettres, chiffres, _ ou -)." });
    return;
  }

  setState({ authLoading: true, authError: null });
  try {
    const { data, error } = await sb.auth.signUp({
      email: email.trim(),
      password,
      options: { data: { pseudo: pseudo.trim() } },
    });
    if (error) throw error;

    // Si la confirmation email est activée sur le projet Supabase,
    // `data.session` sera null ici : il faut le signaler à l'utilisateur.
    if (!data.session) {
      showToast("Compte créé ! Vérifie ta boîte mail pour confirmer ton inscription.");
      setState({ authLoading: false, authScreen: "login" });
      return;
    }

    state.session = data.session;
    await loadProfilCourant();
    showToast(`Bienvenue, ${pseudo} !`);
    setState({ authLoading: false, showAuthModal: false });
  } catch (e) {
    console.error(e);
    let msg = "Inscription impossible.";
    if (e.message && e.message.toLowerCase().includes("already registered")) {
      msg = "Cet email est déjà utilisé.";
    } else if (e.message) {
      msg = e.message;
    }
    setState({ authLoading: false, authError: msg });
  }
}

async function handleLogin() {
  const { email, password } = state.authForm;
  if (!email.trim() || !password.trim()) {
    setState({ authError: "Indique ton email et ton mot de passe." });
    return;
  }
  setState({ authLoading: true, authError: null });
  try {
    const { data, error } = await sb.auth.signInWithPassword({
      email: email.trim(),
      password,
    });
    if (error) throw error;
    state.session = data.session;
    await loadProfilCourant();
    setState({ authLoading: false, showAuthModal: false });
    showToast(`Content de te revoir${state.profil ? ", " + state.profil.pseudo : ""} !`);
  } catch (e) {
    console.error(e);
    const msg = e.message && e.message.toLowerCase().includes("invalid")
      ? "Email ou mot de passe incorrect."
      : "Connexion impossible.";
    setState({ authLoading: false, authError: msg });
  }
}

async function handleLogout() {
  await sb.auth.signOut();
  setState({ session: null, profil: null, activeTab: "tendances" });
  showToast("À bientôt !");
}

// ---- état additionnel ----
// ---- chargement ----
async function loadCommunaute() {
  try {
    const { data, error } = await sb
      .from("avis")
      .select("*, profils(pseudo, avatar_url), dramas(titre, titre_kr, poster_url, annee)")
      .order("created_at", { ascending: false })
      .limit(200);
    if (error) throw error;
    state.avis = data || [];
  } catch (e) {
    console.error("Erreur chargement avis", e);
    state.avis = [];
  }

  // Activités "veut voir" : alimentent le fil au même titre que les
  // avis (cf. demande : "X veut voir Y" doit apparaître dans le fil),
  // mais restent une source de données distincte de `avis` — pas de
  // like/suppression depuis le fil pour ces cartes, l'envie se gère
  // depuis l'onglet À voir comme avant.
  try {
    const { data, error } = await sb
      .from("mes_a_voir")
      .select("*, profils(pseudo, avatar_url), a_voir(titre, titre_kr, poster_url, annee)")
      .order("created_at", { ascending: false })
      .limit(200);
    if (error) throw error;
    state.activitesAVoir = data || [];
  } catch (e) {
    console.error("Erreur chargement activités à voir", e);
    state.activitesAVoir = [];
  }

  try {
    const { data, error } = await sb.from("abonnements").select("*");
    if (error) throw error;
    state.abonnements = data || [];
  } catch (e) {
    console.error("Erreur chargement abonnements", e);
    state.abonnements = [];
  }

  // Compte des likes par avis (requête groupée légère : on charge tout
  // et on compte côté client, le volume restant modeste pour cet usage).
  try {
    const { data, error } = await sb.from("avis_likes").select("avis_id, user_id");
    if (error) throw error;
    state.avisLikes = data || [];
  } catch (e) {
    state.avisLikes = [];
  }
}

function getLikeCount(avisId) {
  return (state.avisLikes || []).filter((l) => l.avis_id === avisId).length;
}
function hasLiked(avisId) {
  const uid = currentUserId();
  if (!uid) return false;
  return (state.avisLikes || []).some((l) => l.avis_id === avisId && l.user_id === uid);
}
function isFollowing(profilId) {
  const uid = currentUserId();
  if (!uid) return false;
  return state.abonnements.some((a) => a.follower_id === uid && a.followed_id === profilId);
}
function getFollowerCount(profilId) {
  return state.abonnements.filter((a) => a.followed_id === profilId).length;
}
function getFollowingCount(profilId) {
  return state.abonnements.filter((a) => a.follower_id === profilId).length;
}

// ---- actions : avis ----
function openComposer(dramaId) {
  // Pré-remplit si l'utilisateur a déjà un avis sur ce drama (édition).
  const existant = state.avis.find((a) => a.drama_id === dramaId && a.user_id === currentUserId());
  setState({
    composerOpen: true,
    composerDramaId: dramaId || "",
    composerNote: existant ? String(existant.note ?? "") : "",
    composerCommentaire: existant ? (existant.commentaire || "") : "",
  });
}
function closeComposer() {
  setState({ composerOpen: false, composerDramaId: "", composerNote: "", composerCommentaire: "" });
}

async function publierAvis() {
  if (!isLoggedIn()) { showToast("Connecte-toi pour publier un avis."); return; }
  const dramaId = state.composerDramaId;
  if (!dramaId) { showToast("Choisis un drama."); return; }
  const note = state.composerNote === "" ? null : Number(state.composerNote);
  if (note !== null && (note < 0 || note > 10)) { showToast("La note doit être entre 0 et 10."); return; }

  const payload = {
    user_id: currentUserId(),
    drama_id: dramaId,
    note,
    commentaire: state.composerCommentaire.trim() || null,
  };
  try {
    // upsert : un seul avis par utilisateur et par drama (contrainte unique en base)
    const { error } = await sb.from("avis").upsert(payload, { onConflict: "user_id,drama_id" });
    if (error) throw error;
    await loadCommunaute();
    closeComposer();
    showToast("Avis publié.");
    render();
  } catch (e) {
    console.error(e);
    showToast("Publication impossible.");
  }
}

async function supprimerAvis(avisId) {
  try {
    const { error } = await sb.from("avis").delete().eq("id", avisId);
    if (error) throw error;
    await loadCommunaute();
    showToast("Avis supprimé.");
    render();
  } catch (e) {
    console.error(e);
    showToast("Suppression impossible.");
  }
}

async function toggleLikeAvis(avisId) {
  if (!isLoggedIn()) { showToast("Connecte-toi pour aimer un avis."); return; }
  const uid = currentUserId();
  try {
    if (hasLiked(avisId)) {
      const { error } = await sb.from("avis_likes").delete().eq("avis_id", avisId).eq("user_id", uid);
      if (error) throw error;
    } else {
      const { error } = await sb.from("avis_likes").insert([{ avis_id: avisId, user_id: uid }]);
      if (error) throw error;
    }
    await loadCommunaute();
    render();
  } catch (e) {
    console.error(e);
    showToast("Action impossible.");
  }
}

// ---- actions : abonnements ----
async function toggleFollow(profilId) {
  if (!isLoggedIn()) { showToast("Connecte-toi pour suivre quelqu'un."); return; }
  const uid = currentUserId();
  if (uid === profilId) return;
  try {
    if (isFollowing(profilId)) {
      const { error } = await sb.from("abonnements").delete().eq("follower_id", uid).eq("followed_id", profilId);
      if (error) throw error;
      showToast("Tu ne suis plus cette personne.");
    } else {
      const { error } = await sb.from("abonnements").insert([{ follower_id: uid, followed_id: profilId }]);
      if (error) throw error;
      showToast("Abonnement ajouté.");
    }
    await loadCommunaute();
    render();
  } catch (e) {
    console.error(e);
    showToast("Action impossible.");
  }
}

// ---- profil public ----
async function openProfilPublic(profilId) {
  setState({ profilPublicId: profilId, profilPublicData: null, activeTab: "profil" });
  try {
    const { data: profil, error: e1 } = await sb.from("profils").select("*").eq("id", profilId).single();
    if (e1) throw e1;
    const avisDuProfil = state.avis.filter((a) => a.user_id === profilId);
    const { data: tierlistsDuProfil, error: e2 } = await sb
      .from("tierlists")
      .select("*")
      .eq("user_id", profilId)
      .eq("est_publique", true)
      .order("created_at", { ascending: false });
    if (e2) throw e2;

    // Ses dramas vus (jointure visionnages + catalogue, même format
    // que state.mesEntries pour pouvoir réutiliser computeTrends/getStats).
    const { data: visionnagesData, error: e3 } = await sb
      .from("mes_visionnages")
      .select("*, dramas(*)")
      .eq("user_id", profilId);
    if (e3) throw e3;
    const entriesDuProfil = (visionnagesData || [])
      .filter((v) => v.dramas)
      .map((v) => ({ ...v.dramas, note: v.note, date_visionnage: v.date_visionnage }));

    // Sa liste à voir (jointure mes_a_voir + catalogue a_voir).
    const { data: aVoirData, error: e4 } = await sb
      .from("mes_a_voir")
      .select("*, a_voir(*)")
      .eq("user_id", profilId);
    if (e4) throw e4;
    const aVoirDuProfil = (aVoirData || []).filter((m) => m.a_voir).map((m) => m.a_voir);

    const trendsDuProfil = computeTrends(entriesDuProfil);

    setState({
      profilPublicData: {
        profil, avisDuProfil, tierlistsDuProfil: tierlistsDuProfil || [],
        entriesDuProfil, aVoirDuProfil, trendsDuProfil,
        profilSubTab: "vus", // "vus" | "a-voir" | "tendances" | "avis" | "tierlists"
      },
    });
  } catch (e) {
    console.error(e);
    showToast("Profil introuvable.");
  }
}

// ---- rendu : fil d'activité ----
// Fusionne trois sources hétérogènes (avis publiés, envies "à voir"
// ajoutées, tierlists publiques créées) en une liste d'activités
// triée par date, normalisée avec un champ `type` pour savoir quel
// gabarit de carte appliquer.
function getFeedEntries() {
  const uid = currentUserId();

  const activitesAvis = state.avis.map((a) => ({ type: "avis", date: a.created_at, data: a }));
  const activitesAVoir = (state.activitesAVoir || []).map((m) => ({ type: "a_voir", date: m.created_at, data: m }));
  const activitesTierlist = (state.tierlists || [])
    .filter((t) => t.est_publique)
    .map((t) => ({ type: "tierlist", date: t.created_at, data: t }));

  let list = [...activitesAvis, ...activitesAVoir, ...activitesTierlist].sort((x, y) => new Date(y.date) - new Date(x.date));

  if (state.feedFilter === "suivis" && uid) {
    const suivis = new Set(state.abonnements.filter((a) => a.follower_id === uid).map((a) => a.followed_id));
    suivis.add(uid); // on voit aussi sa propre activité dans son fil
    list = list.filter((entry) => suivis.has(entry.data.user_id));
  }
  return list;
}

function attachCommunauteListeners() {
  document.querySelectorAll("[data-feed-filter]").forEach((btn) => {
    btn.addEventListener("click", () => setState({ feedFilter: btn.dataset.feedFilter }));
  });
  document.querySelectorAll("[data-toggle-like]").forEach((btn) => {
    btn.addEventListener("click", () => toggleLikeAvis(btn.dataset.toggleLike));
  });
  document.querySelectorAll("[data-delete-avis]").forEach((btn) => {
    btn.addEventListener("click", () => supprimerAvis(btn.dataset.deleteAvis));
  });
  document.querySelectorAll("[data-open-profil]").forEach((el) => {
    el.addEventListener("click", () => openProfilPublic(el.dataset.openProfil));
  });
  document.querySelectorAll("[data-follow-id]").forEach((btn) => {
    btn.addEventListener("click", () => toggleFollow(btn.dataset.followId));
  });
  document.querySelectorAll("[data-profil-subtab]").forEach((btn) => {
    btn.addEventListener("click", () => {
      if (!state.profilPublicData) return;
      setState({ profilPublicData: { ...state.profilPublicData, profilSubTab: btn.dataset.profilSubtab } });
    });
  });
  const logoutBtn = document.getElementById("logoutBtn");
  if (logoutBtn) logoutBtn.addEventListener("click", handleLogout);
  const avatarUploadInput = document.getElementById("avatarUploadInput");
  if (avatarUploadInput) {
    avatarUploadInput.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) uploadAvatar(file);
    });
  }
  const goToAuthBtn = document.getElementById("goToAuthBtn");
  if (goToAuthBtn) goToAuthBtn.addEventListener("click", () => setState({ showAuthModal: true }));

  // Composer
  const composerOverlay = document.getElementById("composerOverlay");
  if (composerOverlay) composerOverlay.addEventListener("click", (e) => { if (e.target === composerOverlay) closeComposer(); });
  const composerClose = document.getElementById("composerClose");
  if (composerClose) composerClose.addEventListener("click", closeComposer);
  const composerCancel = document.getElementById("composerCancel");
  if (composerCancel) composerCancel.addEventListener("click", closeComposer);
  const composerSave = document.getElementById("composerSave");
  if (composerSave) composerSave.addEventListener("click", publierAvis);
  const composerDrama = document.getElementById("composer-drama");
  if (composerDrama) composerDrama.addEventListener("change", (e) => { state.composerDramaId = e.target.value; });
  const composerNote = document.getElementById("composer-note");
  if (composerNote) composerNote.addEventListener("input", (e) => { state.composerNote = e.target.value; });
  const composerCommentaire = document.getElementById("composer-commentaire");
  if (composerCommentaire) composerCommentaire.addEventListener("input", (e) => { state.composerCommentaire = e.target.value; });
}

const NIVEAU_COLORS = { S: "var(--seal)", A: "var(--gold)", B: "var(--celadon)", C: "var(--ink-soft)", D: "var(--ink-faint)" };

// ---- chargement ----
async function loadTierlists() {
  try {
    let query = sb.from("tierlists").select("*, profils(pseudo, avatar_url)").order("created_at", { ascending: false });
    const { data, error } = await query;
    if (error) throw error;
    // RLS filtre déjà : publiques pour tous + privées si propriétaire.
    state.tierlists = data || [];
  } catch (e) {
    console.error("Erreur chargement tierlists", e);
    state.tierlists = [];
  }
  try {
    const { data, error } = await sb.from("tierlist_likes").select("tierlist_id, user_id");
    if (error) throw error;
    state.tierlistLikes = data || [];
  } catch (e) {
    state.tierlistLikes = [];
  }
}

async function loadItemsForTierlist(tierlistId) {
  try {
    const { data, error } = await sb.from("tierlist_items").select("*").eq("tierlist_id", tierlistId).order("position", { ascending: true });
    if (error) throw error;
    return data || [];
  } catch (e) {
    console.error(e);
    return [];
  }
}

function getTierlistLikeCount(tierlistId) {
  return state.tierlistLikes.filter((l) => l.tierlist_id === tierlistId).length;
}
function hasLikedTierlist(tierlistId) {
  const uid = currentUserId();
  if (!uid) return false;
  return state.tierlistLikes.some((l) => l.tierlist_id === tierlistId && l.user_id === uid);
}

// ---- commentaires de tierlist ----
async function chargerTierlistComments(tierlistId) {
  try {
    const { data, error } = await sb
      .from("tierlist_comments")
      .select("*, profils(pseudo, avatar_url)")
      .eq("tierlist_id", tierlistId)
      .order("created_at", { ascending: false });
    if (error) throw error;
    state.tierlistComments = data || [];
  } catch (e) {
    console.error("Erreur chargement commentaires tierlist", e);
    state.tierlistComments = [];
  }
  try {
    const { data, error } = await sb.from("tierlist_comment_likes").select("comment_id, user_id");
    if (error) throw error;
    state.tierlistCommentLikes = data || [];
  } catch (e) {
    state.tierlistCommentLikes = [];
  }
  // `tierlistViewerHtml` est une chaîne HTML pré-calculée (pas régénérée
  // automatiquement à chaque render, contrairement aux autres vues) :
  // on doit explicitement la reconstruire ici, sinon les nouveaux
  // commentaires/likes resteraient invisibles jusqu'à la prochaine
  // ouverture de la modal.
  if (state.tierlistViewerOpen && tierlistId) {
    state.tierlistViewerHtml = await renderTierlistViewer(tierlistId);
  }
  render();
}

function getTierlistCommentLikeCount(commentId) {
  return state.tierlistCommentLikes.filter((l) => l.comment_id === commentId).length;
}
function hasLikedTierlistComment(commentId) {
  const uid = currentUserId();
  if (!uid) return false;
  return state.tierlistCommentLikes.some((l) => l.comment_id === commentId && l.user_id === uid);
}

async function publierTierlistComment() {
  if (!isLoggedIn()) { showToast("Connecte-toi pour commenter."); return; }
  const tierlistId = state.tierlistViewerId;
  if (!tierlistId) return;
  const texte = state.tierlistCommentDraft.trim();
  if (!texte) { showToast("Écris un commentaire avant de publier."); return; }
  const note = state.tierlistCommentNote === "" ? null : Number(state.tierlistCommentNote);
  if (note !== null && (note < 0 || note > 10)) { showToast("La note doit être entre 0 et 10."); return; }

  try {
    const { error } = await sb.from("tierlist_comments").insert([{
      tierlist_id: tierlistId,
      user_id: currentUserId(),
      note,
      commentaire: texte,
    }]);
    if (error) throw error;
    setState({ tierlistCommentDraft: "", tierlistCommentNote: "" });
    await chargerTierlistComments(tierlistId);
    showToast("Commentaire publié.");
  } catch (e) {
    console.error(e);
    showToast("Publication impossible.");
  }
}

async function supprimerTierlistComment(commentId) {
  try {
    const { error } = await sb.from("tierlist_comments").delete().eq("id", commentId);
    if (error) throw error;
    await chargerTierlistComments(state.tierlistViewerId);
    showToast("Commentaire supprimé.");
  } catch (e) {
    console.error(e);
    showToast("Suppression impossible.");
  }
}

async function toggleLikeTierlistComment(commentId) {
  if (!isLoggedIn()) { showToast("Connecte-toi pour aimer un commentaire."); return; }
  const uid = currentUserId();
  try {
    if (hasLikedTierlistComment(commentId)) {
      await sb.from("tierlist_comment_likes").delete().eq("comment_id", commentId).eq("user_id", uid);
    } else {
      await sb.from("tierlist_comment_likes").insert([{ comment_id: commentId, user_id: uid }]);
    }
    await chargerTierlistComments(state.tierlistViewerId);
  } catch (e) {
    console.error(e);
    showToast("Action impossible.");
  }
}

async function creerTierlist() {
  if (!isLoggedIn()) { showToast("Connecte-toi pour créer une tierlist."); return; }
  const d = state.tierlistDraft;
  if (!d.titre.trim()) { showToast("Le titre est obligatoire."); return; }

  try {
    const { data, error } = await sb.from("tierlists").insert([{
      user_id: currentUserId(),
      titre: d.titre.trim(),
      theme: d.theme.trim() || null,
      description: d.description.trim() || null,

// ---- builder (glisser-déposer) ----
async function openTierlistBuilder(tierlistId, sourceType) {
  const items = await loadItemsForTierlist(tierlistId);
  let pool = [];

  if (items.length === 0) {
    // Première ouverture : on propose un pool basé sur les données existantes.
    if (sourceType === "drama" || !sourceType) {
      pool = state.entries.map((d) => ({
        element_type: "drama", element_id: d.id, element_label: d.titre, element_image_url: d.poster_url,
      }));
    } else if (sourceType === "acteur") {
      const noms = new Set();
      state.entries.forEach((d) => { if (d.acteur) noms.add(d.acteur); });
      pool = Array.from(noms).map((nom) => ({
        element_type: "acteur", element_id: null, element_label: nom, element_image_url: findPersonPhoto(nom, "acteur"),
      }));
    } else if (sourceType === "actrice") {
      const noms = new Set();
      state.entries.forEach((d) => { if (d.actrice) splitPeople(d.actrice).forEach((n) => noms.add(n)); });
      pool = Array.from(noms).map((nom) => ({
        element_type: "actrice", element_id: null, element_label: nom, element_image_url: findPersonPhoto(nom, "actrice"),
      }));
    }
  } else {
    // Reprise d'une tierlist déjà construite : pool = vide, tout est déjà placé.
    pool = [];
  }

  // Les niveaux personnalisés sont stockés sur la tierlist elle-même en
  // base (colonne `niveaux`) — on les relit depuis state.tierlists plutôt
  // que de dépendre d'un paramètre, pour couvrir création/édition/duplication.
  const tierlistEnBase = state.tierlists.find((t) => t.id === tierlistId);
  const niveauxPerso = (tierlistEnBase && tierlistEnBase.niveaux) || null;

  setState({
    editingTierlistId: tierlistId,
    editingTierlistNiveaux: niveauxPerso,
    builderItems: items.map((it) => ({ ...it })),
    builderPool: pool,
    activeTab: "tierlist-builder",
  });
}

function closeTierlistBuilder() {
  setState({ editingTierlistId: null, editingTierlistNiveaux: null, builderItems: [], builderPool: [], builderSearchQuery: "", activeTab: "communaute" });
}

function moveItemToNiveau(item, niveau, fromPool) {
  if (fromPool) {
    state.builderPool = state.builderPool.filter((p) => p !== item);
  } else {
    state.builderItems = state.builderItems.filter((it) => it !== item);
  }
  const itemsInNiveau = state.builderItems.filter((it) => it.niveau === niveau).length;
  state.builderItems.push({ ...item, niveau, position: itemsInNiveau, tierlist_id: state.editingTierlistId });
  render();
}

function moveItemBackToPool(item) {
  state.builderItems = state.builderItems.filter((it) => it !== item);
  state.builderPool.push(item);
  render();
}

async function sauvegarderTierlistBuilder() {
  try {
    // Stratégie simple et robuste : on supprime tous les items existants
    // de cette tierlist puis on réinsère l'état courant du builder.
    // Le volume par tierlist est faible (quelques dizaines d'items max),
    // donc le coût de ce remplacement complet est négligeable.
    const { error: delError } = await sb.from("tierlist_items").delete().eq("tierlist_id", state.editingTierlistId);
    if (delError) throw delError;

    if (state.builderItems.length > 0) {
      const payload = state.builderItems.map((it, i) => ({
        tierlist_id: state.editingTierlistId,
        element_type: it.element_type,
        element_id: it.element_id || null,
        element_label: it.element_label,
        element_image_url: it.element_image_url || null,
        niveau: it.niveau,
        position: it.position ?? i,
      }));
      const { error: insError } = await sb.from("tierlist_items").insert(payload);
      if (insError) throw insError;
    }
    showToast("Tierlist enregistrée.");
    await loadTierlists();
    closeTierlistBuilder();
  } catch (e) {
    console.error(e);
    showToast("Enregistrement impossible.");
  }
}

async function dupliquerTierlist(tierlistId) {
  if (!isLoggedIn()) { showToast("Connecte-toi pour dupliquer une tierlist."); return; }
  try {
    const original = state.tierlists.find((t) => t.id === tierlistId);
    if (!original) return;
    const items = await loadItemsForTierlist(tierlistId);
    const { data: newTierlist, error } = await sb.from("tierlists").insert([{
      user_id: currentUserId(),
      titre: `${original.titre} (copie)`,
      theme: original.theme,
      description: original.description,
      est_publique: false,
      niveaux: original.niveaux || null,
    }]).select().single();
    if (error) throw error;
    if (items.length > 0) {
      const payload = items.map((it) => ({
        tierlist_id: newTierlist.id, element_type: it.element_type, element_id: it.element_id,
        element_label: it.element_label, element_image_url: it.element_image_url,
        niveau: it.niveau, position: it.position,
      }));
      await sb.from("tierlist_items").insert(payload);
    }
    await loadTierlists();
    showToast("Tierlist dupliquée dans tes brouillons (privée).");
    openTierlistBuilder(newTierlist.id, null);
  } catch (e) {
    console.error(e);
    showToast("Duplication impossible.");
  }
}

// Normalise les niveaux d'une tierlist : soit S/A/B/C/D classiques (avec
// NIVEAU_COLORS), soit une liste personnalisée [{emoji, coreen, romanise,
// fr, desc}] stockée sur la tierlist, à laquelle on attribue une couleur
// de la palette générique dans l'ordre. `value` est ce qui est réellement
// stocké en base dans `tierlist_items.niveau` — on utilise le mot coréen
// comme identifiant pour les niveaux personnalisés (unique au sein d'un
// même modèle), et la lettre pour S/A/B/C/D.
function getNiveauxDeTierlist(niveauxPerso) {
  if (niveauxPerso && niveauxPerso.length > 0) {
    return niveauxPerso.map((n, i) => ({
      value: n.coreen,
      emoji: n.emoji || "",
      coreen: n.coreen,
      romanise: n.romanise || "",
      fr: n.fr || "",
      desc: n.desc || "",
      color: PALETTE_NIVEAUX_PERSO[i % PALETTE_NIVEAUX_PERSO.length],
    }));
  }
  return NIVEAUX.map((niv) => ({ value: niv, emoji: "", coreen: niv, romanise: "", fr: "", desc: "", color: NIVEAU_COLORS[niv] }));
}

// Génère le HTML interne d'un label de niveau : pour les niveaux
// personnalisés, emoji + coréen + romanisation, puis séparateur et
// traduction française ; pour S/A/B/C/D classiques, juste la lettre.
function niveauLabelHtml(niv) {
  if (!niv.romanise && !niv.fr) return esc(niv.coreen);
  return `
    ${niv.emoji ? `<span class="niveau-emoji">${esc(niv.emoji)}</span>` : ""}
    <span class="niveau-coreen">${esc(niv.coreen)}</span>
    ${niv.romanise ? `<span class="niveau-romanise">${esc(niv.romanise)}</span>` : ""}
    ${niv.fr ? `<span class="niveau-fr">${esc(niv.fr)}</span>` : ""}
  `;
}

// ---- rendu : builder (drag and drop) ----
function renderTierlistBuilder() {
  const t = state.tierlists.find((x) => x.id === state.editingTierlistId);
  const niveaux = getNiveauxDeTierlist(state.editingTierlistNiveaux);
  return `<div class="trends-wrap">
    <section class="tr-section">
      <h2 class="tr-title">${t ? esc(t.titre) : "Construis ta tierlist"}</h2>
      <p class="tr-note">Touche un élément du réservoir, puis touche le niveau où le placer. Touche un élément déjà placé pour le renvoyer dans le réservoir.</p>

      ${niveaux.map((niv) => {

/* ============================================================
   MODULE QUIZ QUOTIDIEN
   Questions générées depuis les dramas existants, une tentative/jour,
   points + bonus, leaderboard jour/semaine/mois.
   ============================================================ */

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

// ---- génération de questions à partir des données existantes ----
// Ces questions sont générées côté client à la demande (pas stockées
// par défaut, cf. note dans schema.sql sur les policies d'écriture de
// `questions`). Si vous voulez les persister pour que tout le monde
// ait le MÊME quiz un jour donné, il faut soit :
//  - les insérer manuellement une fois par jour dans l'éditeur SQL, soit
//  - ouvrir temporairement une policy INSERT authenticated sur `questions`
//    et appeler `genererEtSauvegarderQuizDuJour()` une fois.
function genererQuestionsDepuisCatalogue(entries, n) {
  n = n || 6;
  const candidats = entries.filter((d) => d.acteur || d.actrice || d.realisateur || d.scenariste);
  if (candidats.length < 4) return [];

  const shuffled = [...candidats].sort(() => Math.random() - 0.5);
  const questions = [];
  const typesUtilises = [];

  function pickWrongAnswers(correctValue, pool, count) {
    const wrongs = pool.filter((v) => v && v !== correctValue);
    const unique = Array.from(new Set(wrongs));
    const shuffled2 = unique.sort(() => Math.random() - 0.5);
    return shuffled2.slice(0, count);
  }

  for (const d of shuffled) {
    if (questions.length >= n) break;
    const typeRoll = Math.floor(Math.random() * 3);

    if (typeRoll === 0 && d.acteur) {
      const wrongs = pickWrongAnswers(d.acteur, entries.map((x) => x.acteur), 3);
      if (wrongs.length < 3) continue;
      const options = shuffleWithCorrect(d.acteur, wrongs);
      questions.push({
        texte: `Quel acteur a joué dans "${d.titre}" ?`,
        options: options.choices,
        bonne_reponse: options.correctIndex + 1,
        categorie: "casting",
      });
    } else if (typeRoll === 1 && d.annee) {
      const wrongAnnees = pickWrongAnswers(String(d.annee), entries.map((x) => String(x.annee)), 3);
      if (wrongAnnees.length < 3) continue;
      const options = shuffleWithCorrect(String(d.annee), wrongAnnees);
      questions.push({
        texte: `En quelle année est sorti "${d.titre}" ?`,
        options: options.choices,
        bonne_reponse: options.correctIndex + 1,
        categorie: "annee",
      });
    } else if (d.realisateur) {
      const wrongs = pickWrongAnswers(d.realisateur, entries.map((x) => x.realisateur), 3);
      if (wrongs.length < 3) continue;
      const options = shuffleWithCorrect(d.realisateur, wrongs);
      questions.push({
        texte: `Qui a réalisé "${d.titre}" ?`,
        options: options.choices,
        bonne_reponse: options.correctIndex + 1,
        categorie: "realisation",
      });
    }
  }
  return questions.slice(0, n);
}

// Persiste le quiz du jour en base, pour que TOUS les utilisateurs
// voient exactement les mêmes questions ce jour-là (au lieu d'un quiz
// généré indépendamment dans chaque navigateur, comme le fait le repli
// local de loadQuizDuJour()).
//
// Pré-requis : la table `questions` n'a aucune policy INSERT ouverte
// par défaut (cf. schema.sql) pour éviter que n'importe quel compte
// authentifié ne puisse écrire le quiz de tout le monde. Pour utiliser
// cette fonction vous devez donc, une fois :
//   1) Exécuter dans l'éditeur SQL Supabase :
//        create policy "Admin insere les questions du jour"
//          on public.questions for insert to authenticated
//          with check (true);
//   2) Appeler genererEtSauvegarderQuizDuJour() une fois par jour
//      (manuellement depuis la console du navigateur, ou via un appel
//      programmé), avec un compte authentifié.
//   3) Idéalement, retirer ensuite cette policy et migrer vers une
//      Edge Function planifiée (cron) utilisant la service_role key,
//      pour ne plus dépendre d'un compte utilisateur classique.
async function genererEtSauvegarderQuizDuJour(nombreDeQuestions) {
  const date = todayISO();

  // Évite d'écraser un quiz déjà généré aujourd'hui.
  const { data: existantes, error: errCheck } = await sb.from("questions").select("id").eq("date_quiz", date);
  if (errCheck) {
    console.error(errCheck);
    showToast("Impossible de vérifier le quiz existant.");
    return;
  }
  if (existantes && existantes.length > 0) {
    showToast(`Un quiz existe déjà pour le ${date} (${existantes.length} questions).`);
    return;
  }

  const questions = genererQuestionsDepuisCatalogue(state.entries, nombreDeQuestions || 6);
  if (questions.length === 0) {
    showToast("Pas assez de données dans le catalogue pour générer un quiz.");
    return;
  }

  const payload = questions.map((q) => ({
    texte: q.texte,
    choix1: q.options[0], choix2: q.options[1], choix3: q.options[2], choix4: q.options[3],
    bonne_reponse: q.bonne_reponse,
    categorie: q.categorie,
    date_quiz: date,
  }));

  try {
    const { error } = await sb.from("questions").insert(payload);
    if (error) throw error;
    showToast(`Quiz du ${date} enregistré (${payload.length} questions).`);
    await loadQuizDuJour();
    render();
  } catch (e) {
    console.error(e);
    showToast("Enregistrement du quiz impossible (policy INSERT manquante sur `questions` ?).");
  }
}

function shuffleWithCorrect(correctValue, wrongValues) {
  const all = [correctValue, ...wrongValues];
  // mélange Fisher-Yates simple
  for (let i = all.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [all[i], all[j]] = [all[j], all[i]];
  }
  return { choices: all, correctIndex: all.indexOf(correctValue) };
}

// ---- chargement du quiz du jour (depuis la table `questions`) ----
async function loadQuizDuJour() {
  try {
    const { data, error } = await sb.from("questions").select("*").eq("date_quiz", todayISO());
    if (error) throw error;
    if (data && data.length > 0) {
      state.questionsAujourdhui = data;
    } else {
      // Repli : génération à la volée côté client si rien n'est en base
      // pour aujourd'hui (cf. note ci-dessus sur la persistance).
      const generees = genererQuestionsDepuisCatalogue(state.entries, 6);
      state.questionsAujourdhui = generees.map((q, i) => ({
        id: `local-${todayISO()}-${i}`,
        texte: q.texte,
        choix1: q.options[0], choix2: q.options[1], choix3: q.options[2], choix4: q.options[3],
        bonne_reponse: q.bonne_reponse,
        categorie: q.categorie,
        date_quiz: todayISO(),
        _local: true, // ces questions ne peuvent pas être référencées par reponses_quiz (pas de vraie ligne en base)
      }));
    }
  } catch (e) {
    console.error("Erreur chargement quiz", e);
    state.questionsAujourdhui = [];
  }

  if (isLoggedIn()) {
    try {
      const { data, error } = await sb.from("scores_quiz").select("*").eq("user_id", currentUserId()).eq("date_quiz", todayISO()).maybeSingle();
      if (error) throw error;
      state.quizScoreDuJour = data || null;
    } catch (e) {
      state.quizScoreDuJour = null;
    }
  }
}

// Charge le détail des réponses données aujourd'hui, pour permettre de
// revoir bonne/mauvaise réponse après coup (sans pouvoir rejouer — la
// contrainte unique sur scores_quiz empêche toujours un 2e essai noté).
async function loadReponsesDuJour() {
  if (!isLoggedIn()) { state.quizReponsesDuJour = null; return; }
  const idsQuestionsDuJour = state.questionsAujourdhui.filter((q) => !q._local).map((q) => q.id);
  if (idsQuestionsDuJour.length === 0) { state.quizReponsesDuJour = []; return; }
  try {
    const { data, error } = await sb
      .from("reponses_quiz")
      .select("*")
      .eq("user_id", currentUserId())
      .in("question_id", idsQuestionsDuJour);
    if (error) throw error;
    state.quizReponsesDuJour = data || [];
  } catch (e) {
    console.error("Erreur chargement réponses du jour", e);
    state.quizReponsesDuJour = null;
  }
}

async function loadLeaderboardQuiz() {
  try {
    let dateMin;
    const now = new Date();
    if (state.leaderboardPeriode === "jour") {
      dateMin = todayISO();
    } else if (state.leaderboardPeriode === "semaine") {
      const d = new Date(now); d.setDate(d.getDate() - 7);
      dateMin = d.toISOString().slice(0, 10);
    } else {
      const d = new Date(now); d.setMonth(d.getMonth() - 1);
      dateMin = d.toISOString().slice(0, 10);
    }
    const { data, error } = await sb
      .from("scores_quiz")
      .select("*, profils(pseudo, avatar_url)")
      .gte("date_quiz", dateMin)
      .order("score_total", { ascending: false })
      .limit(20);
    if (error) throw error;
    state.leaderboardQuiz = data || [];
  } catch (e) {
    console.error(e);
    state.leaderboardQuiz = [];
  }
}

// ---- déroulement du quiz ----
function startQuiz() {
  if (state.quizScoreDuJour) { showToast("Tu as déjà fait le quiz d'aujourd'hui !"); return; }
  setState({ quizEnCours: true, quizIndex: 0, quizReponses: [], quizChoixActuel: null, quizTermine: false });
}

function answerQuizQuestion(choixIndex) {
  if (state.quizChoixActuel !== null) return; // déjà répondu, on attend la transition automatique
  const q = state.questionsAujourdhui[state.quizIndex];
  const correcte = choixIndex === q.bonne_reponse;
  state.quizReponses.push({ question_id: q.id, reponse_donnee: choixIndex, correcte, isLocal: !!q._local });
  setState({ quizChoixActuel: choixIndex });

  setTimeout(() => {
    if (state.quizIndex + 1 >= state.questionsAujourdhui.length) {
      finishQuiz();
    } else {
      setState({ quizIndex: state.quizIndex + 1, quizChoixActuel: null });
    }
  }, 1400);
}

async function finishQuiz() {
  const bonnes = state.quizReponses.filter((r) => r.correcte).length;
  const total = state.quizReponses.length;
  let score = bonnes * 10;
  if (bonnes === total && total > 0) score += 20; // bonus sans faute

  setState({ quizTermine: true, quizEnCours: false });

  if (!isLoggedIn()) {
    showToast(`Score : ${score} pts — connecte-toi pour l'enregistrer au classement !`);
    return;
  }

  try {
    const { data, error } = await sb.from("scores_quiz").upsert({
      user_id: currentUserId(),
      date_quiz: todayISO(),
      score_total: score,
      bonnes_reponses: bonnes,
      total_questions: total,
    }, { onConflict: "user_id,date_quiz" }).select().single();
    if (error) throw error;
    state.quizScoreDuJour = data;

    // Enregistre aussi le détail des réponses (utile pour ne pas pouvoir
    // retenter — la contrainte unique en base le garantit déjà, ceci est
    // surtout pour historique/statistiques futures). On ignore les
    // questions générées localement (pas de vraie ligne `questions`).
    const reponsesAEnregistrer = state.quizReponses.filter((r) => !r.isLocal);
    if (reponsesAEnregistrer.length > 0) {
      await sb.from("reponses_quiz").insert(
        reponsesAEnregistrer.map((r) => ({ user_id: currentUserId(), question_id: r.question_id, reponse_donnee: r.reponse_donnee }))
      );
    }
    showToast(`Quiz terminé : ${score} points !`);
    await loadLeaderboardQuiz();
    render();
  } catch (e) {
    console.error(e);
    showToast("Score calculé mais non enregistré (déjà joué aujourd'hui ?).");
  }
}

// ---- rendu ----
function renderQuizView() {
  if (state.quizEnCours) return renderQuizEnCours();
  if (state.quizTermine) return renderQuizResultat();

  const dejaJoue = !!state.quizScoreDuJour;
  return `<div class="trends-wrap">
    <section class="tr-section">
      <h2 class="tr-title">Quiz du jour</h2>
      <div class="tr-highlight">
        <p class="tr-hc-names">${state.questionsAujourdhui.length} questions</p>
        <p class="tr-hc-detail">10 points par bonne réponse, +20 points bonus si tu fais un sans-faute.</p>
      </div>

function renderQuizEnCours() {
  const q = state.questionsAujourdhui[state.quizIndex];

  const choisi = state.quizChoixActuel;
  const aRepondu = choisi !== null;
  return `<div class="trends-wrap">
    <section class="tr-section">
      <p class="tr-note">Question ${state.quizIndex + 1} / ${state.questionsAujourdhui.length}</p>

function renderQuizResultat() {

function renderQuizRecap(reponses, inclureLocales) {
  if (reponses === null) return `<p class="tr-note" style="margin-top:10px;">Chargement de tes réponses…</p>`;

  if (questionsAvecReponse.length === 0) return `<p class="tr-note" style="margin-top:10px;">Pas de détail disponible pour ce quiz.</p>`;
  return `<div style="margin-top:12px; display:flex; flex-direction:column; gap:12px;">
    ${questionsAvecReponse.map((q, i) => {
      const rep = reponses.find((r) => r.question_id === q.id);
      const choisi = rep ? rep.reponse_donnee : null;
      const choix = [q.choix1, q.choix2, q.choix3, q.choix4];
      return `<div class="tr-card">
        <p class="tr-rk-title" style="font-size:13.5px; margin-bottom:10px;">${i + 1}. ${esc(q.texte)}</p>
        <div style="display:flex; flex-direction:column; gap:7px;">
          ${choix.map((c, idx) => {
            const num = idx + 1;
            let etat = "";
            if (num === q.bonne_reponse) etat = "quiz-correct";
            else if (num === choisi) etat = "quiz-incorrect";
            const icone = etat === "quiz-correct" ? `<span class="quiz-answer-icon">✓</span>` : etat === "quiz-incorrect" ? `<span class="quiz-answer-icon">✕</span>` : "";
            return `<button class="ghost-btn quiz-answer-btn ${etat}" style="text-align:left; padding:10px;" disabled>${esc(c)}${icone}</button>`;
          }).join("")}

}

// Le mode "widget intégré" (iframe avec liste masquée et minuteur)
// a été retiré : le widget.deezer.com appelle lui-même api.deezer.com
// en interne pour charger sa tracklist, et cet appel est bloqué par
// CORS (confirmé en conditions réelles, pas seulement en théorie).
// C'est une limitation du widget Deezer lui-même, hors de notre
// contrôle — pas un bug réparable côté app.
//
// À la place : un simple lien qui ouvre la playlist normalement sur
// Deezer (lecture complète, gratuite, sans jeu). Fiable à 100% car
// ça ne fait qu'ouvrir une page Deezer standard dans un nouvel onglet.

function extractDeezerPlaylistId(lien) {
  const match = lien.match(/playlist\/(\d+)/);
  return match ? match[1] : null;
}

function ecouterPlaylistDeezer(lien) {
  const playlistId = extractDeezerPlaylistId(lien);
  if (!playlistId) {
    setState({ ostError: "Lien de playlist Deezer invalide. Format attendu : https://www.deezer.com/playlist/XXXXXXXXX" });
    return;
  }
  setState({ ostError: null });
  window.open(`https://www.deezer.com/playlist/${playlistId}`, "_blank", "noopener");
}

// Widget Deezer intégré, sans aucune option ajoutée (pas de
// tracklist=false, pas de minuteur) — version la plus simple
// possible, identique à celle que Deezer affiche sur sa propre page
// de génération de widget. Testé en conditions réelles avec le mode
// "widget + tracklist masquée + minuteur" précédent, qui a échoué par
// CORS : cette version minimale n'a pas encore été testée par nous —
// à vérifier directement dans l'app une fois ce code en place.
function chargerWidgetSimple(lien) {
  const playlistId = extractDeezerPlaylistId(lien);
  if (!playlistId) {
    setState({ ostError: "Lien de playlist Deezer invalide. Format attendu : https://www.deezer.com/playlist/XXXXXXXXX" });
    return;
  }
  setState({ ostError: null, widgetSimplePlaylistId: playlistId });
}

  { chanson: "I Love You", artiste: "MAMAMOO (Wheein)", drama: "Hotel del Luna" },
  { chanson: "Carmen", artiste: "Diana Lee", drama: "Hotel del Luna" },
];

function genererQuestionsOstCorrespondance(data, n) {
  n = Math.min(n || 6, data.length);
  const shuffled = [...data].sort(() => Math.random() - 0.5).slice(0, n);
  return shuffled.map((item) => {
    const autres = data.filter((x) => x.drama !== item.drama).sort(() => Math.random() - 0.5).slice(0, 3);
    const { choices, correctIndex } = shuffleWithCorrect(item.drama, autres.map((a) => a.drama));
    return { item, choices, correctIndex };
  });
}
