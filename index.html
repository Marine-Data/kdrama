<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#3f5f96">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>내 드라마 일지 — Mon carnet de k-dramas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="wrap" id="app">
  <div class="loading-screen">
    <div class="app-seal"><svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="27"/><circle cx="30" cy="30" r="22"/></svg></div>
    <p>Ouverture du carnet…</p>
  </div>
</div>

<!--
  Mini-lecteur Deezer persistant : volontairement EN DEHORS de #app.
  render() reconstruit #app en entier à chaque setState() (innerHTML),
  ce qui détruirait une iframe Deezer placée à l'intérieur et couperait
  le son chaque fois qu'on change d'onglet ou tape dans un champ
  n'importe où dans l'app. Ce bloc est rempli/mis à jour séparément par
  renderDeezerMiniPlayer(), jamais par render(), pour que l'iframe ne
  soit jamais recréée sauf action explicite (ouvrir/fermer, changer de
  playlist).
-->
<div id="deezer-mini-player"></div>

<script type="module" src="./main.js"></script>
</body>
</html>
