<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#3f5f96">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>내 드라마 일지 — Mon carnet de k-dramas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="wrap" id="app">
  <div class="loading-screen">
    <div class="app-seal"><svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="27"/><circle cx="30" cy="30" r="22"/></svg></div>
    <p>Ouverture du carnet…</p>
  </div>
</div>

<!--
  Mini-lecteur Deezer persistant : volontairement EN DEHORS de #app.
  render() reconstruit #app en entier à chaque setState() (innerHTML),
  ce qui détruirait une iframe Deezer placée à l'intérieur et couperait
  le son chaque fois qu'on change d'onglet ou tape dans un champ
  n'importe où dans l'app. Ce bloc est rempli/mis à jour séparément par
  renderDeezerMiniPlayer(), jamais par render(), pour que l'iframe ne
  soit jamais recréée sauf action explicite (ouvrir/fermer, changer de
  playlist).
-->
<div id="deezer-mini-player"></div>

<!--
  DIAGNOSTIC TEMPORAIRE — à retirer une fois le blocage sur l'écran de
  chargement résolu. Affiche l'erreur réelle directement dans l'écran
  "Ouverture du carnet…" (au lieu qu'elle ne reste visible que dans une
  console qu'on ne peut pas consulter sur téléphone), et signale un
  blocage silencieux (aucune erreur, mais requête réseau qui ne répond
  jamais) si rien ne s'est passé après 8 secondes.
-->
<script>
(function () {
  function afficher(msg) {
    var p = document.querySelector('.loading-screen p');
    if (!p) return;
    p.textContent = msg;
    p.style.fontSize = '11px';
    p.style.lineHeight = '1.5';
    p.style.padding = '0 24px';
    p.style.wordBreak = 'break-word';
  }
  window.addEventListener('error', function (e) {
    afficher('Erreur JS : ' + e.message + (e.filename ? ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')' : ''));
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    var r = e.reason;
    var msg = (r && r.message) ? r.message : String(r);
    afficher('Erreur promesse non gérée : ' + msg);
  });
  setTimeout(function () {
    var p = document.querySelector('.loading-screen p');
    if (p && p.textContent.indexOf('Ouverture') === 0) {
      afficher('Toujours bloqué après 8 secondes, sans erreur détectée : probable requête réseau qui ne répond jamais (Supabase ou autre). Fais une capture de cet écran pour Claude.');
    }
  }, 8000);
})();
</script>

<script type="module" src="./main.js"></script>
</body>
</html>
